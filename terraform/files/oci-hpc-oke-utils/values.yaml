labeler:
  enabled: true
  image:
    repository: ghcr.io/astral-sh/uv
    tag: "0.7.12-python3.12-bookworm-slim"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  tolerations:
    - operator: Exists
  nodeSelector: {}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu
                operator: Exists
          - matchExpressions:
              - key: amd.com/gpu
                operator: Exists
  podAnnotations: {}
  podLabels: {}
  interval: 300
  hostInterval: 900
  labelMappings: {}
  # Example:
  # labelMappings:
  #   gpu-fabric-racks.csv: |
  #     oci.oraclecloud.com/host.gpu_memory_fabric_id,oci.oraclecloud.com/host.internal_rack_id
  #     ocid1.computegpumemoryfabric...bq,sk-e6df6e21-5b1d-492e-a5b1-145abbbdaa1b
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

prepuller:
  enabled: false
  image:
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  tolerations:
    - operator: Exists
  nodeSelector: {}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu
                operator: Exists
          - matchExpressions:
              - key: amd.com/gpu
                operator: Exists
  podAnnotations: {}
  podLabels: {}
  pauseImage: registry.k8s.io/pause:3.10
  initResources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  pauseResources:
    requests:
      cpu: 1m
      memory: 16Mi
    limits:
      cpu: 10m
      memory: 16Mi
  groups:
    nvidia:
      nodeSelector:
        nvidia.com/gpu: "true"
      images:
        - iad.ocir.io/idxzjcdglx2s/nccl-tests:cuda-13.1.1-ubuntu-24.04-nccl-2.29.3-020926.1
    amd:
      nodeSelector:
        amd.com/gpu: "true"
      images:
        - iad.ocir.io/idxzjcdglx2s/rccl-tests:rocm-7.1.1-ubuntu22.04-rccl-2.27.7-012126.1

hostexec:
  enabled: false
  imagePullSecrets: []
  hostRootPath: /
  interval: 30
  priorityClassName: system-node-critical
  tolerations:
    - operator: Exists
  nodeSelector: {}
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  image:
    repository: docker.io/debian
    tag: bookworm-slim
    pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  script: |
    #!/usr/bin/env bash
    set -euo pipefail

    if ! modinfo lnet >/dev/null 2>&1; then
      echo "lnet kernel module is not available on this node; skipping"
      exit 0
    fi

    if ! grep -q '^lnet ' /proc/modules 2>/dev/null; then
      echo "LNet not loaded, loading..."
      modprobe lnet
    fi

    lnet_output="$(lnetctl net show 2>&1 || true)"

    if printf '%s\n' "$lnet_output" | grep -q "LNet stack down"; then
      lnetctl lnet configure
      DEFAULT_IFACE=$(ip route show default | awk '/default/ {print $5}')
      lnetctl net add --net tcp --if "$DEFAULT_IFACE" --peer-timeout 180 --peer-credits 120 --credits 1024
      echo "LNet configured successfully"
    fi
