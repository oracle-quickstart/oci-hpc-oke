{{- if .Values.labeler.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "oci-hpc-oke-utils.fullname" . }}-labeler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oci-hpc-oke-utils.labels" . | nindent 4 }}
    app.kubernetes.io/component: labeler
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "25%"
  selector:
    matchLabels:
      {{- include "oci-hpc-oke-utils.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: labeler
  template:
    metadata:
      labels:
        {{- include "oci-hpc-oke-utils.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: labeler
        {{- with .Values.labeler.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/labeler-configmap.yaml") . | sha256sum }}
        {{- if .Values.labeler.labelMappings }}
        checksum/mapping: {{ include (print $.Template.BasePath "/labeler-mapping-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.labeler.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: true  # Required for Kubernetes API access
      serviceAccountName: {{ include "oci-hpc-oke-utils.fullname" . }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      {{- with .Values.labeler.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.labeler.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.labeler.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.labeler.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: script
          configMap:
            name: {{ include "oci-hpc-oke-utils.fullname" . }}-labeler-script
        - name: uv-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.labeler.labelMappings }}
        - name: label-mapping
          configMap:
            name: {{ include "oci-hpc-oke-utils.fullname" . }}-labeler-mapping
        {{- end }}
        - name: gpu-info
          emptyDir: {}
        - name: host-usr
          hostPath:
            path: /usr
            type: Directory
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
      initContainers:
        - name: gpu-info
          image: "{{ .Values.labeler.gpuInfoImage | default "docker.io/debian:bookworm-slim" }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -x /host/usr/bin/nvidia-smi ]; then
                /host/usr/bin/nvidia-smi -q 2>/dev/null | grep -m1 'Tray Index' | awk -F': ' '{print $2}' | tr -d ' ' > /tmp/gpu-info/tray_index
                echo "GPU info: tray=$(cat /tmp/gpu-info/tray_index)"
              else
                echo "nvidia-smi not found on host, skipping GPU info"
              fi
          volumeMounts:
            - name: gpu-info
              mountPath: /tmp/gpu-info
            - name: host-usr
              mountPath: /host/usr
              readOnly: true
            - name: host-dev
              mountPath: /dev
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: labeler
          image: "{{ .Values.labeler.image.repository }}:{{ .Values.labeler.image.tag }}"
          imagePullPolicy: {{ .Values.labeler.image.pullPolicy }}
          command: ["uv", "run", "/scripts/labeler.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: uv-cache
              mountPath: /tmp/uv-cache
            - name: tmp
              mountPath: /tmp/health
            {{- if .Values.labeler.labelMappings }}
            - name: label-mapping
              mountPath: /etc/label-mapping
              readOnly: true
            {{- end }}
            - name: gpu-info
              mountPath: /tmp/gpu-info
              readOnly: true
          env:
            - name: UV_CACHE_DIR
              value: /tmp/uv-cache
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: INTERVAL
              value: {{ .Values.labeler.interval | quote }}
            - name: HOST_INTERVAL
              value: {{ .Values.labeler.hostInterval | quote }}
            {{- if .Values.labeler.labelMappings }}
            - name: LABEL_MAPPING_DIR
              value: /etc/label-mapping
            {{- end }}
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/health/alive"]
            initialDelaySeconds: 180
            periodSeconds: 120
            failureThreshold: 5
          resources:
            {{- toYaml .Values.labeler.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}
