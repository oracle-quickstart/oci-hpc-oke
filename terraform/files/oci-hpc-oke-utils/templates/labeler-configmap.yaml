{{- if .Values.labeler.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oci-hpc-oke-utils.fullname" . }}-labeler-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oci-hpc-oke-utils.labels" . | nindent 4 }}
data:
  labeler.py: |
    # /// script
    # requires-python = ">=3.12"
    # dependencies = [
    #     "kubernetes>=31.0.0",
    #     "oci>=2.169.0",
    #     "requests>=2.32.0",
    # ]
    # ///

    import csv
    import json
    import logging
    import os
    import random
    import re
    import time
    from datetime import datetime, timezone
    from pathlib import Path

    import oci
    import requests
    from kubernetes import client, config

    HEALTH_FILE = Path("/tmp/health/alive")

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(message)s",
        datefmt="%Y-%m-%d %H:%M:%S",
    )
    log = logging.getLogger("labeler")

    IMDS_BASE = "http://169.254.169.254/opc/v2"
    IMDS_HEADERS = {"Authorization": "Bearer Oracle"}
    NO_IMDS = "no-imds-data"
    GPU_MEMORY_FABRIC_SHAPES = ("GB200", "GB300")

    FALLBACK_LABELS = {
        "oci.oraclecloud.com/rdma.hpc_island_id": NO_IMDS,
        "oci.oraclecloud.com/rdma.host_id": NO_IMDS,
        "oci.oraclecloud.com/rdma.local_block_id": NO_IMDS,
        "oci.oraclecloud.com/rdma.network_block_id": NO_IMDS,
    }

    # Cached after first list+paginate lookup
    _cached_compute_host_id: str | None = None


    def _imds_get(path: str) -> requests.Response | None:
        try:
            return requests.get(
                f"{IMDS_BASE}{path}",
                headers=IMDS_HEADERS,
                timeout=10,
            )
        except requests.RequestException:
            log.warning("IMDS request failed for %s%s", IMDS_BASE, path)
            return None


    def _is_throttled(exc: Exception) -> bool:
        """Check if an OCI exception is a 429 TooManyRequests."""
        return isinstance(exc, oci.exceptions.ServiceError) and exc.status == 429


    def _oci_call_with_backoff(func, *args, max_retries: int = 3, **kwargs):
        """Call an OCI SDK function with exponential backoff on throttling."""
        for attempt in range(max_retries + 1):
            try:
                return func(*args, **kwargs)
            except Exception as exc:
                if _is_throttled(exc) and attempt < max_retries:
                    wait = (2 ** attempt) + random.uniform(0, 1)
                    log.warning("OCI API throttled (429), retrying in %.1fs (attempt %d/%d)", wait, attempt + 1, max_retries)
                    time.sleep(wait)
                    continue
                raise


    def _find_compute_host(compute_client: oci.core.ComputeClient, tenant_id: str, instance_id: str) -> tuple[str | None, bool | None]:
        """Find the compute host for this instance by paginating through list_compute_hosts.
        Returns (host_id, has_impacted_components). has_impacted_components is only
        available on the summary model from list, not from get.
        The host ID is cached after first lookup, but has_impacted_components is
        refreshed on every call since it can change."""
        global _cached_compute_host_id

        if _cached_compute_host_id:
            # Host ID is stable, but re-list to refresh has_impacted_components
            page = None
            while True:
                kwargs = {"compartment_id": tenant_id, "limit": 100}
                if page:
                    kwargs["page"] = page
                result = _oci_call_with_backoff(compute_client.list_compute_hosts, **kwargs)
                for h in result.data.items:
                    if h.id == _cached_compute_host_id:
                        return h.id, h.has_impacted_components
                page = result.next_page
                if not page:
                    break
            # Host disappeared -- clear cache
            _cached_compute_host_id = None
            return None, None

        page = None
        while True:
            kwargs = {"compartment_id": tenant_id, "limit": 100}
            if page:
                kwargs["page"] = page
            result = _oci_call_with_backoff(compute_client.list_compute_hosts, **kwargs)
            for h in result.data.items:
                if h.instance_id == instance_id:
                    _cached_compute_host_id = h.id
                    return h.id, h.has_impacted_components
            page = result.next_page
            if not page:
                break
        return None, None


    def _firmware_bundle_labels(compute_client: oci.core.ComputeClient, firmware_bundle_id: str, host_platform: str) -> dict[str, str]:
        """Fetch firmware component versions from the firmware bundle and return as labels."""
        try:
            bundle = _oci_call_with_backoff(compute_client.get_firmware_bundle, firmware_bundle_id=firmware_bundle_id).data
        except Exception:
            log.exception("Failed to get firmware bundle %s", firmware_bundle_id)
            return {}

        labels = {}

        # Bundle version from description (e.g. "Release for ...; update to 1.3.5; Passthrough")
        if bundle.description:
            m = re.search(r"update to (\S+)", bundle.description)
            if m:
                labels["oci.oraclecloud.com/host.fw.bundle_version"] = m.group(1).rstrip(";")

        # Component versions per platform
        for platform_entry in bundle.platforms or []:
            platform_name = platform_entry.platform or ""
            is_switch = platform_name != host_platform

            for cv in platform_entry.versions or []:
                component = cv.component_type.lower()
                if not cv.version:
                    continue
                version = "_".join(cv.version)

                if is_switch:
                    key = f"oci.oraclecloud.com/host.fw.switch.{component}"
                else:
                    key = f"oci.oraclecloud.com/host.fw.{component}"

                labels[key] = version

        return labels


    def _fetch_instance_metadata() -> dict | None:
        """Fetch and return the full instance metadata from IMDS, or None on failure."""
        resp = _imds_get("/instance/")
        if not resp or not resp.ok:
            log.warning("Cannot get instance metadata from IMDS")
            return None
        try:
            return resp.json()
        except requests.exceptions.JSONDecodeError:
            log.warning("IMDS returned non-JSON for /instance/")
            return None


    def compute_host_labels(compute_client: oci.core.ComputeClient | None, instance_meta: dict | None = None) -> dict[str, str]:
        """Fetch labels from the OCI ComputeHost API using instance principals.
        Returns empty dict when data is unavailable -- nodes simply won't get these labels."""
        if compute_client is None or instance_meta is None:
            return {}

        instance_id = instance_meta.get("id")
        tenant_id = instance_meta.get("tenantId")
        if not instance_id or not tenant_id:
            log.warning("Missing instance id or tenant id from IMDS")
            return {}

        try:
            host_id, has_impacted = _find_compute_host(compute_client, tenant_id, instance_id)
        except Exception:
            log.exception("Failed to list compute hosts for instance %s", instance_id)
            return {}
        if not host_id:
            log.warning("Compute host not found for instance %s", instance_id)
            return {}

        try:
            host = _oci_call_with_backoff(compute_client.get_compute_hosts, compute_host_id=host_id).data
        except Exception:
            log.exception("Failed to get compute host %s", host_id)
            return {}

        labels = {}

        if host.platform:
            labels["oci.oraclecloud.com/host.platform"] = host.platform
        if host.health:
            labels["oci.oraclecloud.com/host.health"] = host.health
        if host.lifecycle_state:
            labels["oci.oraclecloud.com/host.lifecycle_state"] = host.lifecycle_state
        # has_impacted_components is only on the summary model (from list), not the full model (from get)
        if has_impacted is not None:
            labels["oci.oraclecloud.com/host.has_impacted_components"] = str(has_impacted).lower()
        if host.capacity_reservation_id:
            labels["oci.oraclecloud.com/host.capacity_reservation_id"] = host.capacity_reservation_id[-11:]
        if host.compute_host_group_id:
            labels["oci.oraclecloud.com/host.compute_host_group_id"] = host.compute_host_group_id[-11:]

        # Active fault IDs from impacted components
        icd = host.impacted_component_details or {}
        components = icd.get("impactedComponents", {}).get("v1", {}).get("components", [])
        faults_by_type: dict[str, set[str]] = {}
        for comp in components:
            if comp.get("impacting") and comp.get("faultId"):
                ct = comp.get("componentType", "unknown").lower()
                faults_by_type.setdefault(ct, set()).add(comp["faultId"])
        for ct, fault_ids in faults_by_type.items():
            sorted_ids = sorted(fault_ids)
            if len(sorted_ids) == 1:
                value = sorted_ids[0]
            else:
                value = f"{len(sorted_ids)}x_{sorted_ids[0]}"
            labels[f"oci.oraclecloud.com/host.fault.{ct}"] = value

        recycle = host.recycle_details
        if recycle and recycle.recycle_level:
            labels["oci.oraclecloud.com/host.recycle_level"] = recycle.recycle_level

        # Firmware bundle labels
        if host.firmware_bundle_id:
            fw_labels = _firmware_bundle_labels(compute_client, host.firmware_bundle_id, host.platform or "")
            labels.update(fw_labels)

        return labels


    MAINTENANCE_CONDITION_TYPE = "oci.oraclecloud.com/MaintenanceFault"
    ACTIVE_MAINTENANCE_STATES = ("SCHEDULED", "IN_PROGRESS")


    def maintenance_event_labels(compute_client: oci.core.ComputeClient | None, instance_meta: dict | None = None) -> dict[str, str]:
        """Return labels for active maintenance events on this instance."""
        if compute_client is None or instance_meta is None:
            return {}

        instance_id = instance_meta.get("id")
        compartment_id = instance_meta.get("compartmentId")
        if not instance_id or not compartment_id:
            return {}

        try:
            events = _oci_call_with_backoff(
                compute_client.list_instance_maintenance_events,
                compartment_id=compartment_id,
                instance_id=instance_id,
            ).data
        except Exception:
            log.exception("Failed to list maintenance events for instance %s", instance_id)
            return {}

        labels = {}
        for event in events:
            if event.lifecycle_state not in ACTIVE_MAINTENANCE_STATES:
                continue
            labels["oci.oraclecloud.com/host.maintenance.reason"] = event.maintenance_reason or "UNKNOWN"
            labels["oci.oraclecloud.com/host.maintenance.action"] = event.instance_action or "NONE"
            labels["oci.oraclecloud.com/host.maintenance.state"] = event.lifecycle_state
            break  # One active event is enough for labels

        return labels


    def maintenance_event_conditions(compute_client: oci.core.ComputeClient | None, instance_meta: dict | None = None) -> list[dict]:
        """Return node conditions for active maintenance events with fault details."""
        if compute_client is None or instance_meta is None:
            return []

        instance_id = instance_meta.get("id")
        compartment_id = instance_meta.get("compartmentId")
        if not instance_id or not compartment_id:
            return []

        try:
            events = _oci_call_with_backoff(
                compute_client.list_instance_maintenance_events,
                compartment_id=compartment_id,
                instance_id=instance_id,
            ).data
        except Exception:
            log.exception("Failed to list maintenance events for instance %s", instance_id)
            return []

        active_events = [e for e in events if e.lifecycle_state in ACTIVE_MAINTENANCE_STATES]
        if not active_events:
            return []

        # Get full details for the first active event to extract fault info
        event = active_events[0]
        try:
            full_event = _oci_call_with_backoff(
                compute_client.get_instance_maintenance_event,
                instance_maintenance_event_id=event.id,
            ).data
        except Exception:
            log.exception("Failed to get maintenance event %s", event.id)
            # Fall back to summary data
            return [{
                "reason": event.maintenance_reason or "MaintenanceScheduled",
                "message": event.description or "Maintenance event scheduled",
                "fault_id": None,
            }]

        # Parse fault details from additional_details
        fault_details_str = (full_event.additional_details or {}).get("faultDetails", "[]")
        try:
            faults = json.loads(fault_details_str) if isinstance(fault_details_str, str) else fault_details_str
        except (json.JSONDecodeError, TypeError):
            faults = []

        if faults:
            return [{
                "reason": fault.get("faultId", event.maintenance_reason or "MaintenanceScheduled"),
                "message": fault.get("customerDescription", event.description or ""),
                "fault_id": fault.get("faultId"),
            } for fault in faults]

        return [{
            "reason": event.maintenance_reason or "MaintenanceScheduled",
            "message": event.description or "Maintenance event scheduled",
            "fault_id": None,
        }]


    def _apply_maintenance_conditions(v1: client.CoreV1Api, node_name: str, conditions: list[dict]):
        """Set or clear the MaintenanceFault node condition."""
        now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

        try:
            node = v1.read_node_status(node_name)
            existing_conditions = node.status.conditions or []
        except Exception:
            log.exception("Failed to read node status for %s", node_name)
            return

        # Find existing maintenance condition
        has_existing = any(c.type == MAINTENANCE_CONDITION_TYPE for c in existing_conditions)

        if conditions:
            # Build message from all faults
            messages = []
            fault_ids = []
            for c in conditions:
                if c.get("fault_id"):
                    fault_ids.append(c["fault_id"])
                messages.append(c["message"])
            reason = conditions[0]["reason"]
            message = "; ".join(messages)
            if fault_ids:
                reason = "_".join(fault_ids[:3])  # Keep reason short

            new_condition = {
                "type": MAINTENANCE_CONDITION_TYPE,
                "status": "True",
                "reason": reason,
                "message": message[:1024],  # K8s message limit
                "lastHeartbeatTime": now,
                "lastTransitionTime": now,
            }

            if has_existing:
                # Preserve lastTransitionTime if status hasn't changed
                for c in existing_conditions:
                    if c.type == MAINTENANCE_CONDITION_TYPE and c.status == "True":
                        new_condition["lastTransitionTime"] = c.last_transition_time.strftime("%Y-%m-%dT%H:%M:%SZ")
                        break

            patch = {"status": {"conditions": [new_condition]}}
            try:
                v1.patch_node_status(node_name, patch)
                log.info("Set MaintenanceFault condition on %s: %s - %s", node_name, reason, message[:100])
            except Exception:
                log.exception("Failed to set maintenance condition on %s", node_name)

        elif has_existing:
            # Only clear if currently True (avoid repeated patches when already False)
            currently_true = any(
                c.type == MAINTENANCE_CONDITION_TYPE and c.status == "True"
                for c in existing_conditions
            )
            if currently_true:
                clear_condition = {
                    "type": MAINTENANCE_CONDITION_TYPE,
                    "status": "False",
                    "reason": "Resolved",
                    "message": "No active maintenance events",
                    "lastHeartbeatTime": now,
                    "lastTransitionTime": now,
                }
                patch = {"status": {"conditions": [clear_condition]}}
                try:
                    v1.patch_node_status(node_name, patch)
                    log.info("Cleared MaintenanceFault condition on %s", node_name)
                except Exception:
                    log.exception("Failed to clear maintenance condition on %s", node_name)


    def label_mapping_labels(existing_labels: dict[str, str]) -> tuple[dict[str, str], set[str]]:
        """Read CSV files from the label mapping directory and return additional labels
        based on matching existing node labels. Each CSV has a header where the first
        column is the label key to match and remaining columns are label keys to add.
        Data rows contain the value to match (suffix match supported) and the values to set.
        Returns (matched_labels, all_managed_keys) where all_managed_keys is the set of
        all label keys defined in CSV headers, used for stale label cleanup."""
        mapping_dir = os.environ.get("LABEL_MAPPING_DIR", "")
        if not mapping_dir or not os.path.isdir(mapping_dir):
            return {}, set()

        labels = {}
        all_managed_keys: set[str] = set()

        for filename in os.listdir(mapping_dir):
            if not filename.endswith(".csv"):
                continue
            filepath = os.path.join(mapping_dir, filename)
            try:
                with open(filepath, "r") as f:
                    reader = csv.reader(f)
                    header = next(reader, None)
                    if not header or len(header) < 2:
                        log.warning("Skipping %s: needs at least 2 columns", filename)
                        continue

                    match_key = header[0].strip()
                    new_keys = [h.strip() for h in header[1:]]
                    all_managed_keys.update(new_keys)
                    node_value = existing_labels.get(match_key, "")

                    if not node_value:
                        continue

                    for row in reader:
                        if not row or len(row) < 2:
                            continue
                        csv_value = row[0].strip()
                        # Suffix match: the CSV value ends with the label value or vice versa
                        if csv_value.endswith(node_value) or node_value.endswith(csv_value):
                            for i, key in enumerate(new_keys):
                                if i + 1 < len(row) and row[i + 1].strip():
                                    labels[key] = row[i + 1].strip()
                            log.info("Label mapping %s matched %s=%s", filename, match_key, node_value)
                            break
            except Exception:
                log.exception("Failed to parse label mapping %s", filename)

        return labels, all_managed_keys


    GPU_INFO_DIR = "/tmp/gpu-info"


    def gpu_info_labels() -> dict[str, str]:
        """Read GPU platform info written by the init container."""
        labels = {}
        filepath = os.path.join(GPU_INFO_DIR, "tray_index")
        try:
            value = Path(filepath).read_text().strip()
            if value:
                labels["oci.oraclecloud.com/host.tray_index"] = value
        except FileNotFoundError:
            pass
        return labels


    def rdma_topology_labels() -> dict[str, str]:
        resp = _imds_get("/host/rdmaTopologyData")

        if resp is None or resp.status_code != 200 or not resp.text.strip():
            return dict(FALLBACK_LABELS)

        try:
            data = resp.json()
        except requests.exceptions.JSONDecodeError:
            log.warning("IMDS returned non-JSON response for /host/rdmaTopologyData")
            return dict(FALLBACK_LABELS)

        keys = [
            ("oci.oraclecloud.com/rdma.hpc_island_id", "customerHPCIslandId"),
            ("oci.oraclecloud.com/rdma.host_id", "customerHostId"),
            ("oci.oraclecloud.com/rdma.local_block_id", "customerLocalBlock"),
            ("oci.oraclecloud.com/rdma.network_block_id", "customerNetworkBlock"),
        ]

        shape_resp = _imds_get("/instance/shape")
        shape = shape_resp.text.strip() if shape_resp and shape_resp.ok else ""
        is_gpu_memory_fabric = any(s in shape for s in GPU_MEMORY_FABRIC_SHAPES)

        if is_gpu_memory_fabric:
            keys.append(
                ("oci.oraclecloud.com/host.gpu_memory_fabric_id", "customerGpuMemoryFabric"),
            )

        labels = {}
        for label_key, imds_key in keys:
            value = data.get(imds_key)
            labels[label_key] = value[-11:] if value else NO_IMDS

        if is_gpu_memory_fabric:
            instance_resp = _imds_get("/instance/")
            if instance_resp and instance_resp.ok:
                try:
                    instance_data = instance_resp.json()
                except requests.exceptions.JSONDecodeError:
                    log.warning("IMDS returned non-JSON response for /instance/")
                    instance_data = {}
                cluster_ocid = instance_data.get("freeformTags", {}).get(
                    "oci:compute:gpumemorycluster"
                )
                labels["oci.oraclecloud.com/host.gpu_memory_cluster_id"] = (
                    cluster_ocid[-11:] if cluster_ocid else NO_IMDS
                )
            else:
                labels["oci.oraclecloud.com/host.gpu_memory_cluster_id"] = NO_IMDS

        return labels


    def _create_compute_client() -> oci.core.ComputeClient | None:
        """Create an OCI ComputeClient with instance principals. Returns None on failure."""
        try:
            signer = oci.auth.signers.InstancePrincipalsSecurityTokenSigner()
            return oci.core.ComputeClient(config={}, signer=signer)
        except Exception:
            log.exception("Failed to create OCI ComputeClient with instance principals")
            return None


    # Label prefixes that are dynamically added/removed based on current state
    MANAGED_LABEL_PREFIXES = ("oci.oraclecloud.com/host.fault.", "oci.oraclecloud.com/host.maintenance.")


    def _apply_labels(v1: client.CoreV1Api, node_name: str, desired: dict[str, str],
                       clean_managed: bool = False, managed_keys: set[str] | None = None):
        """Compare desired labels with existing and patch the node if needed.
        When clean_managed is True, removes stale labels under MANAGED_LABEL_PREFIXES.
        Labels in managed_keys are always cleaned up (they come from local CSV, not OCI API)."""
        try:
            node = v1.read_node(node_name)
            existing = node.metadata.labels or {}
        except Exception:
            log.exception("Failed to read node %s", node_name)
            return

        updates = {}
        for k, v in desired.items():
            current = existing.get(k)
            if current == v:
                continue
            # Don't overwrite real data with fallback when IMDS is temporarily unavailable
            if v == NO_IMDS and current is not None and current != NO_IMDS:
                log.info("Keeping existing label %s=%s (source unavailable)", k, current)
                continue
            updates[k] = v

        # Remove stale labels that are no longer in desired
        _managed_keys = managed_keys or set()
        for k in existing:
            if k in desired:
                continue
            # Prefix-based managed labels (fault, maintenance) only clean when OCI API is healthy
            if clean_managed and any(k.startswith(p) for p in MANAGED_LABEL_PREFIXES):
                updates[k] = None
                log.info("Removing stale label %s from %s", k, node_name)
            # CSV mapping labels always clean (local data source, no API dependency)
            elif k in _managed_keys:
                updates[k] = None
                log.info("Removing stale mapping label %s from %s", k, node_name)

        if updates:
            try:
                v1.patch_node(node_name, {"metadata": {"labels": updates}})
                log.info("Applied labels to %s:", node_name)
                for k, v in updates.items():
                    if v is not None:
                        log.info("  %s=%s", k, v)
            except Exception:
                log.exception("Failed to patch node %s", node_name)
        else:
            log.info("%s already labeled, skipping", node_name)


    def main():
        config.load_incluster_config()
        v1 = client.CoreV1Api()

        node_name = os.environ["NODE_NAME"]
        interval = int(os.environ.get("INTERVAL", "300"))
        host_interval = int(os.environ.get("HOST_INTERVAL", "900"))

        # Stagger startup so nodes don't all hit the OCI API at the same time
        startup_jitter = random.uniform(0, 120)
        log.info("Node: %s | IMDS interval: %ds | Host API interval: %ds | Startup jitter: %.1fs",
                 node_name, interval, host_interval, startup_jitter)
        time.sleep(startup_jitter)

        compute_client = _create_compute_client()
        if compute_client is None:
            log.warning("OCI ComputeClient unavailable, host labels will use fallback values")

        # GPU info labels are static (from init container), read once
        static_gpu_labels = gpu_info_labels()
        if static_gpu_labels:
            log.info("GPU info labels: %s", static_gpu_labels)

        last_host_check = 0.0
        cached_host_labels: dict[str, str] = {}
        cached_maintenance_labels: dict[str, str] = {}
        cached_maintenance_conditions: list[dict] | None = None  # None = never polled
        host_labels_healthy = False
        all_seen_mapping_keys: set[str] = set()  # Accumulates all keys ever seen from CSVs

        while True:
            now = time.monotonic()

            # Refresh compute host and maintenance labels on a separate, longer interval
            if now - last_host_check >= host_interval:
                instance_meta = _fetch_instance_metadata()

                new_labels = compute_host_labels(compute_client, instance_meta)
                if new_labels:
                    cached_host_labels = new_labels
                    host_labels_healthy = True
                else:
                    host_labels_healthy = False

                new_maint_labels = maintenance_event_labels(compute_client, instance_meta)
                new_maint_conditions = maintenance_event_conditions(compute_client, instance_meta)
                # Both functions return empty on failure AND no-events.
                # Gate on host_labels_healthy as baseline (OCI API reachable),
                # but also accept empty results when host API succeeded --
                # if we can reach compute hosts, maintenance API should work too.
                if host_labels_healthy:
                    cached_maintenance_labels = new_maint_labels
                    cached_maintenance_conditions = new_maint_conditions

                last_host_check = now

            desired = rdma_topology_labels()
            desired.update(static_gpu_labels)
            desired.update(cached_host_labels)
            desired.update(cached_maintenance_labels)

            # Apply label mappings from user-provided CSV ConfigMap
            # Use existing node labels as base, then overlay desired -- but skip fallback
            # values so transient IMDS failures don't break CSV matching
            mapping_read_ok = False
            try:
                node = v1.read_node(node_name)
                all_labels = dict(node.metadata.labels or {})
                for k, v in desired.items():
                    if v != NO_IMDS:  # Don't overwrite real labels with fallback values
                        all_labels[k] = v
                mapping_labels, current_mapping_keys = label_mapping_labels(all_labels)
                all_seen_mapping_keys.update(current_mapping_keys)
                desired.update(mapping_labels)
                mapping_read_ok = True
            except Exception:
                pass  # read_node failure is handled in _apply_labels

            # Only pass managed_keys for cleanup when we successfully read mappings
            _apply_labels(v1, node_name, desired, clean_managed=host_labels_healthy,
                          managed_keys=all_seen_mapping_keys if mapping_read_ok else None)
            # Only reconcile maintenance conditions after at least one successful poll
            if cached_maintenance_conditions is not None:
                _apply_maintenance_conditions(v1, node_name, cached_maintenance_conditions)

            HEALTH_FILE.touch()
            time.sleep(interval)


    if __name__ == "__main__":
        main()
{{- end }}
