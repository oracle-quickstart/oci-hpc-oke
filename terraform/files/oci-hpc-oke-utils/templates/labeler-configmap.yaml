{{- if .Values.labeler.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oci-hpc-oke-utils.fullname" . }}-labeler-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oci-hpc-oke-utils.labels" . | nindent 4 }}
data:
  labeler.py: |
    # /// script
    # requires-python = ">=3.12"
    # dependencies = [
    #     "kubernetes>=31.0.0",
    #     "requests>=2.32.0",
    # ]
    # ///

    import csv
    import logging
    import os
    import time
    from pathlib import Path

    import requests
    from kubernetes import client, config

    HEALTH_FILE = Path("/tmp/health/alive")
    READY_FILE = Path("/tmp/health/ready")

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(message)s",
        datefmt="%Y-%m-%d %H:%M:%S",
    )
    log = logging.getLogger("labeler")

    IMDS_BASE = "http://169.254.169.254/opc/v2"
    IMDS_HEADERS = {"Authorization": "Bearer Oracle"}
    NO_IMDS = "no-imds-data"
    GPU_MEMORY_FABRIC_SHAPES = ("GB200", "GB300")


    def _imds_get(path: str) -> requests.Response | None:
        try:
            return requests.get(f"{IMDS_BASE}{path}", headers=IMDS_HEADERS, timeout=10)
        except requests.RequestException:
            log.warning("IMDS request failed for %s%s", IMDS_BASE, path)
            return None


    def _extract_rdma_fields(host_data: dict) -> dict[str, str | None]:
        # Shape-agnostic mapping of a /host/ response to the RDMA locality
        # fields (plus the GB-only GPU memory fabric). When rdmaTopologyData is
        # embedded, prefer its original customer* OCIDs. Other RDMA shapes only
        # expose networkBlockId/rackId/id; with no HPC island reported, reuse
        # the network block as the island so the controller's island-required
        # validity check still passes (the top tier just collapses onto it).
        embedded = host_data.get("rdmaTopologyData") or {}
        if embedded:
            return {
                "island": embedded.get("customerHPCIslandId"),
                "netblock": embedded.get("customerNetworkBlock"),
                "localblock": embedded.get("customerLocalBlock"),
                "host_id": embedded.get("customerHostId"),
                "gpu_memory_fabric_id": embedded.get("customerGpuMemoryFabric"),
            }
        netblock = host_data.get("networkBlockId")
        return {
            "island": netblock,
            "netblock": netblock,
            "localblock": host_data.get("rackId"),
            "host_id": host_data.get("id"),
            "gpu_memory_fabric_id": None,
        }


    def _read_rdma_topology() -> dict | None:
        # Prefer the compact topology projection, then fall back to the
        # complete /host document, which embeds the same data when available.
        for path in ("/host/rdmaTopologyData", "/host"):
            resp = _imds_get(path)
            if resp is None or resp.status_code != 200 or not resp.text.strip():
                continue
            try:
                data = resp.json()
            except requests.exceptions.JSONDecodeError:
                continue
            # The projection returns customer* fields at its top level; /host
            # embeds them under rdmaTopologyData.
            if path == "/host/rdmaTopologyData":
                data = {"rdmaTopologyData": data}
            fields = _extract_rdma_fields(data)
            if any(v for v in fields.values()):
                return fields
        return None


    def rdma_fabric_labels() -> dict[str, str]:
        fallback = {
            "oci.oraclecloud.com/rdma.ipv6": NO_IMDS,
            "oci.oraclecloud.com/rdma.planes": NO_IMDS,
        }

        resp = _imds_get("/host")
        if resp is None or resp.status_code != 200 or not resp.text.strip():
            return fallback
        try:
            fabric = resp.json().get("rdmaFabricData") or {}
        except requests.exceptions.JSONDecodeError:
            return fallback

        ipv6 = fabric.get("ipv6")
        planes = fabric.get("planes")
        return {
            "oci.oraclecloud.com/rdma.ipv6": str(ipv6).lower() if ipv6 is not None else NO_IMDS,
            "oci.oraclecloud.com/rdma.planes": str(planes) if planes is not None else NO_IMDS,
        }


    def rdma_topology_labels() -> dict[str, str]:
        fallback = {
            "oci.oraclecloud.com/rdma.hpc_island_id": NO_IMDS,
            "oci.oraclecloud.com/rdma.host_id": NO_IMDS,
            "oci.oraclecloud.com/rdma.local_block_id": NO_IMDS,
            "oci.oraclecloud.com/rdma.network_block_id": NO_IMDS,
        }

        shape_resp = _imds_get("/instance/shape")
        shape = shape_resp.text.strip() if shape_resp and shape_resp.ok else ""
        is_gpu_memory_fabric = any(s in shape for s in GPU_MEMORY_FABRIC_SHAPES)

        fields = _read_rdma_topology()
        if fields is None:
            if is_gpu_memory_fabric:
                fallback["oci.oraclecloud.com/host.gpu_memory_fabric_id"] = NO_IMDS
                fallback["oci.oraclecloud.com/host.gpu_memory_cluster_id"] = NO_IMDS
            return fallback

        label_map = {
            "oci.oraclecloud.com/rdma.hpc_island_id": fields.get("island"),
            "oci.oraclecloud.com/rdma.network_block_id": fields.get("netblock"),
            "oci.oraclecloud.com/rdma.local_block_id": fields.get("localblock"),
            "oci.oraclecloud.com/rdma.host_id": fields.get("host_id"),
        }

        if is_gpu_memory_fabric:
            label_map["oci.oraclecloud.com/host.gpu_memory_fabric_id"] = fields.get("gpu_memory_fabric_id")
            instance_resp = _imds_get("/instance/")
            cluster_ocid = ""
            if instance_resp and instance_resp.ok:
                try:
                    cluster_ocid = instance_resp.json().get("freeformTags", {}).get("oci:compute:gpumemorycluster", "")
                except requests.exceptions.JSONDecodeError:
                    pass
            label_map["oci.oraclecloud.com/host.gpu_memory_cluster_id"] = cluster_ocid or None

        return {k: (v[-11:] if v else NO_IMDS) for k, v in label_map.items()}


    def gpu_info_labels() -> dict[str, str]:
        labels = {}
        shape_resp = _imds_get("/instance/shape")
        shape = shape_resp.text.strip() if shape_resp and shape_resp.ok else ""
        if not any(s in shape for s in GPU_MEMORY_FABRIC_SHAPES):
            return labels
        try:
            value = Path("/tmp/gpu-info/tray_index").read_text().strip()
            if value:
                labels["oci.oraclecloud.com/host.tray_index"] = value
        except FileNotFoundError:
            pass
        return labels


    def label_mapping_labels(existing_labels: dict[str, str]) -> tuple[dict[str, str], set[str]]:
        mapping_dir = os.environ.get("LABEL_MAPPING_DIR", "")
        if not mapping_dir or not os.path.isdir(mapping_dir):
            return {}, set()

        labels = {}
        all_managed_keys: set[str] = set()

        for filename in os.listdir(mapping_dir):
            if not filename.endswith(".csv"):
                continue
            filepath = os.path.join(mapping_dir, filename)
            try:
                with open(filepath, "r") as f:
                    reader = csv.reader(f)
                    header = next(reader, None)
                    if not header or len(header) < 2:
                        continue
                    match_key = header[0].strip()
                    new_keys = [h.strip() for h in header[1:]]
                    all_managed_keys.update(new_keys)
                    node_value = existing_labels.get(match_key, "")
                    if not node_value:
                        continue
                    for row in reader:
                        if not row or len(row) < 2:
                            continue
                        csv_value = row[0].strip()
                        if csv_value.endswith(node_value) or node_value.endswith(csv_value):
                            for i, key in enumerate(new_keys):
                                if i + 1 < len(row) and row[i + 1].strip():
                                    labels[key] = row[i + 1].strip()
                            log.info("Label mapping %s matched %s=%s", filename, match_key, node_value)
                            break
            except Exception:
                log.exception("Failed to parse label mapping %s", filename)

        return labels, all_managed_keys


    def _apply_labels(v1: client.CoreV1Api, node_name: str, desired: dict[str, str],
                       managed_keys: set[str] | None = None) -> bool:
        try:
            node = v1.read_node(node_name)
            existing = node.metadata.labels or {}
        except Exception:
            log.exception("Failed to read node %s", node_name)
            return False

        updates = {}
        for k, v in desired.items():
            current = existing.get(k)
            if current == v:
                continue
            if v == NO_IMDS and current is not None and current != NO_IMDS:
                log.info("Keeping existing label %s=%s (source unavailable)", k, current)
                continue
            updates[k] = v

        _managed_keys = managed_keys or set()
        for k in existing:
            if k not in desired and k in _managed_keys:
                updates[k] = None
                log.info("Removing stale mapping label %s from %s", k, node_name)

        if updates:
            try:
                v1.patch_node(node_name, {"metadata": {"labels": updates}})
                log.info("Applied labels to %s:", node_name)
                for k, v in updates.items():
                    if v is not None:
                        log.info("  %s=%s", k, v)
                return True
            except Exception:
                log.exception("Failed to patch node %s", node_name)
                return False
        else:
            log.info("%s already labeled, skipping", node_name)
            return True


    def main():
        READY_FILE.unlink(missing_ok=True)
        config.load_incluster_config()
        v1 = client.CoreV1Api()

        node_name = os.environ["NODE_NAME"]
        interval = int(os.environ.get("INTERVAL", "300"))

        log.info("Node: %s | Interval: %ds (OCI API labels handled by controller)", node_name, interval)

        static_gpu_labels = gpu_info_labels()
        if static_gpu_labels:
            log.info("GPU info labels: %s", static_gpu_labels)

        all_seen_mapping_keys: set[str] = set()

        # Reconciliation failures retry asynchronously and must not block Helm.
        READY_FILE.touch()
        while True:
            desired = rdma_topology_labels()
            desired.update(rdma_fabric_labels())
            desired.update(static_gpu_labels)

            mapping_read_ok = False
            try:
                node = v1.read_node(node_name)
                all_labels = dict(node.metadata.labels or {})
                for k, v in desired.items():
                    if v != NO_IMDS:
                        all_labels[k] = v
                mapping_labels, current_mapping_keys = label_mapping_labels(all_labels)
                all_seen_mapping_keys.update(current_mapping_keys)
                desired.update(mapping_labels)
                mapping_read_ok = True
            except Exception:
                log.exception("Failed to reconcile label mappings for node %s", node_name)

            _apply_labels(v1, node_name, desired,
                          managed_keys=all_seen_mapping_keys if mapping_read_ok else None)
            HEALTH_FILE.touch()
            time.sleep(interval)


    if __name__ == "__main__":
        main()
{{- end }}
