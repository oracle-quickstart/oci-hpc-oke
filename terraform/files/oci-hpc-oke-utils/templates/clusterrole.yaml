{{- if or .Values.labeler.enabled .Values.annotator.enabled .Values.topology.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "oci-hpc-oke-utils.fullname" . }}
  labels:
    {{- include "oci-hpc-oke-utils.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
  {{- if .Values.labeler.enabled }}
  # Only the labeler patches node status; the annotator needs metadata only.
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get", "patch"]
  {{- end }}
  {{- if .Values.topology.enabled }}
  # The topology generator patches the slurm chart's extra-config ConfigMap.
  # ClusterRole instead of a namespaced Role: the utils chart installs before
  # the Slurm namespace exists.
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ .Values.topology.configMapName | quote }}]
    verbs: ["get", "patch"]
  {{- end }}
{{- end }}
