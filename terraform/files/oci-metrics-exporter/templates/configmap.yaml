apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oci-metrics-exporter.fullname" . }}
  labels:
    {{- include "oci-metrics-exporter.labels" . | nindent 4 }}
data:
  telegraf.conf: |
    
    [agent]
      ## Default data collection interval for all inputs
      interval = "10s"
      ## Rounds collection interval to 'interval'
      ## ie, if interval="10s" then always collect on :00, :10, :20, etc.
      round_interval = false
    
      ## Telegraf will send metrics to outputs in batches of at most
      ## metric_batch_size metrics.
      ## This controls the size of writes that Telegraf sends to output plugins.
      metric_batch_size = 2000
    
      ## Maximum number of unwritten metrics per output.  Increasing this value
      ## allows for longer periods of output downtime without dropping metrics at the
      ## cost of higher maximum memory usage.
      metric_buffer_limit = 20000
    
      ## Collection jitter is used to jitter the collection by a random amount.
      ## Each plugin will sleep for a random time within jitter before collecting.
      ## This can be used to avoid many plugins querying things like sysfs at the
      ## same time, which can have a measurable effect on the system.
      collection_jitter = "0s"
    
      ## Default flushing interval for all outputs. Maximum flush_interval will be
      ## flush_interval + flush_jitter
      flush_interval = "10s"
      ## Jitter the flush interval by a random amount. This is primarily to avoid
      ## large write spikes for users running a large number of telegraf instances.
      ## ie, a jitter of 5s and interval 10s means flushes will happen every 10-15s
      flush_jitter = "3s"
    
      ## By default or when set to "0s", precision will be set to the same
      ## timestamp order as the collection interval, with the maximum being 1s.
      ##   ie, when interval = "10s", precision will be "1s"
      ##       when interval = "250ms", precision will be "1ms"
      ## Precision will NOT be used for service inputs. It is up to each individual
      ## service input to set the timestamp at the appropriate precision.
      ## Valid time units are "ns", "us" (or "µs"), "ms", "s".
      precision = ""
    
      ## Log at debug level.
      # debug = false
      ## Log only error level messages.
      # quiet = false
    
      ## Log target controls the destination for logs and can be one of "file",
      ## "stderr" or, on Windows, "eventlog".  When set to "file", the output file
      ## is determined by the "logfile" setting.
      # logtarget = "file"
    
      ## Name of the file to be logged to when using the "file" logtarget.  If set to
      ## the empty string then logs are written to stderr.
      # logfile = ""
    
      ## The logfile will be rotated after the time interval specified.  When set
      ## to 0 no time based rotation is performed.  Logs are rotated only when
      ## written to, if there is no log activity rotation may be delayed.
      # logfile_rotation_interval = "0d"
    
      ## The logfile will be rotated when it becomes larger than the specified
      ## size.  When set to 0 no size based rotation is performed.
      # logfile_rotation_max_size = "0MB"
    
      ## Maximum number of rotated archives to keep, any older logs are deleted.
      ## If set to -1, no archives are removed.
      # logfile_rotation_max_archives = 5
    
      ## Override default hostname, if empty use os.Hostname()
      hostname = ""
      ## If set to true, do no set the "host" tag in the telegraf agent.
      omit_hostname = true
  input.conf: |
    # Run executable as long-running input plugin
    [[inputs.execd]]
      alias = "streaming"
      command = ["/uv-bin/uv", "run", "/scripts/oci_metrics_telegraf_streaming_input.py"]
      buffer_size = "2MiB"
      precision = "1ns"

    [[inputs.execd]]
      alias = "monitoring"
      command = ["/uv-bin/uv", "run", "/scripts/oci_metrics_telegraf_monitoring_input.py"]
      buffer_size = "2MiB"
      precision = "1ns"
  output.conf: |
    [[outputs.prometheus_client]]
      listen = ":{{ .Values.telegraf.prometheus_port }}"
      expiration_interval = "120s"
      collectors_exclude = ["gocollector", "process"]
      export_timestamp = true
  filter.conf: |
    
    [[processors.filter]]
      order = 1
      ## Default action if no rule applies
      default = "drop"
      alias = "filter"
    
      ## Rules to apply on the incoming metrics (multiple rules are possible)
      ## The rules are evaluated in order and the first matching rule is applied.
      ## In case no rule matches the "default" is applied.
      ## All filter criteria in a rule must apply for the rule to match the metric
      ## i.e. the criteria are combined by a logical AND. If a criterion is
      ## omitted it is NOT applied at all and ignored.
      [[processors.filter.rule]]
          ## List of metric names to match including glob expressions
          name = [
            "oci_blockstore:VolumeThrottledIOs",
            "oci_blockstore:VolumeReadOps",
            "oci_blockstore:VolumeWriteOps",
            "oci_blockstore:VolumeGuaranteedIOPS",
            "oci_blockstore:VolumeReadThroughput",
            "oci_blockstore:VolumeWriteThroughput",
            "oci_blockstore:VolumeGuaranteedThroughput",
            "oci_filestorage:FileSystemReadThroughput",
            "oci_filestorage:FileSystemWriteThroughput",
            "oci_filestorage:MetadataRequestAverageLatency",
            "oci_filestorage:MetadataIOPS",
            "oci_filestorage:FileSystemUsage",
            "oci_filestorage:MountTargetHealth",
            "oci_filestorage:MountTargetReadThroughput",
            "oci_filestorage:MountTargetWriteThroughput",
            "oci_filestorage:MountTargetConnections",
            "oci_lustrefilesystem:FileSystemCapacity",
            "oci_lustrefilesystem:FileSystemInodeCapacity",
            "oci_lustrefilesystem:ReadThroughput",
            "oci_lustrefilesystem:WriteThroughput",
            "oci_lustrefilesystem:DataReadOperations",
            "oci_lustrefilesystem:DataWriteOperations",
            "oci_lustrefilesystem:MetadataOperations",
            "oci_objectstorage:ObjectCount",
            "oci_objectstorage:StoredBytes",
            "oci_objectstorage:AllRequests",
            "oci_objectstorage:ClientErrors",
            "oci_objectstorage:EnabledOLM",
            "oci_objectstorage:FirstByteLatency",
            "oci_objectstorage:PostRequests",
            "oci_objectstorage:PutRequests",
            "oci_objectstorage:TotalRequestLatency",
            "oci_objectstorage:UncommittedParts",
            "oci_objectstorage:ListRequests",
            "oci_objectstorage:GetRequests",
            "oci_objectstorage:HeadRequests",
            "oci_objectstorage:DeleteRequests",
            "oci_objectstorage:CopyRequests",
            "oci_objectstorage:RenameRequests",
            "oci_objectstorage:ArchiveRequests",
            "oci_dynamic_routing_gateway:BytesToDrgAttachment",
            "oci_dynamic_routing_gateway:BytesFromDrgAttachment",
            "oci_dynamic_routing_gateway:PacketsToDrgAttachment",
            "oci_dynamic_routing_gateway:PacketsFromDrgAttachment",
            "oci_dynamic_routing_gateway:PacketDropsToDrgAttachment",
            "oci_dynamic_routing_gateway:PacketDropsFromDrgAttachment",
            "oci_internet_gateway:BytesToIgw",
            "oci_internet_gateway:BytesFromIgw",
            "oci_internet_gateway:PacketsToIgw",
            "oci_internet_gateway:PacketsFromIgw",
            "oci_internet_gateway:PacketDropsToIgw",
            "oci_internet_gateway:PacketDropsFromIgw",
            "oci_nat_gateway:BytesToNATgw",
            "oci_nat_gateway:BytesFromNATgw",
            "oci_nat_gateway:PacketsToNATgw",
            "oci_nat_gateway:PacketsFromNATgw",
            "oci_nat_gateway:DropsToNATgw",
            "oci_service_gateway:packetsToService",
            "oci_service_gateway:packetsFromService",
            "oci_service_gateway:bytesToService",
            "oci_service_gateway:bytesFromService",
            "oci_service_gateway:sgwDropsToService",
            "oci_service_gateway:sgwDropsFromService",
            "oci_vcn:VnicConntrackIsFull",
            "oci_vcn:VnicConntrackUtilPercent",
            "oci_vcn:VnicEgressDropsThrottle",
            "oci_vcn:VnicIngressDropsThrottle",
            "oci_vcn:VnicToNetworkBytes",
            "oci_vcn:VnicFromNetworkBytes",
            "oci_vcn:VnicToNetworkPacket",
            "oci_vcn:VnicFromNetworkPacket",
            "oci_vcn:SmartnicBufferDropsFromHost",
            "oci_vcn:SmartnicBufferDropsFromNetwork",
            "oci_fastconnect:BitsReceived",
            "oci_fastconnect:BitsSent",
            "oci_fastconnect:PacketsReceived",
            "oci_fastconnect:PacketsSent",
            "oci_fastconnect:PacketsDiscarded",
            "oci_fastconnect:PacketsError",
            "oci_fastconnect:ConnectionState",
            "gpu_infrastructure_health:GpuUtilization",
            "gpu_infrastructure_health:GpuMemoryUtilization",
            "gpu_infrastructure_health:GpuPowerDraw",
            "gpu_infrastructure_health:GpuTemperature",
            "gpu_infrastructure_health:GpuEccSingleBitErrors",
            "gpu_infrastructure_health:GpuEccDoubleBitErrors",
            "gpu_infrastructure_health:Fault",
            "rdma_infrastructure_health:RdmaTxBytes",
            "rdma_infrastructure_health:RdmaRxBytes",
            "rdma_infrastructure_health:RdmaTxPackets",
            "rdma_infrastructure_health:RdmaRxPackets",
            "rdma_infrastructure_health:RdmaLinkSpeedFault",
            "rdma_infrastructure_health:RdmaPcieAddressFault",
            "rdma_infrastructure_health:RdmaPcieBerCheckFault",
            "rdma_infrastructure_health:RdmaPcieCableFlapFault",
            "rdma_infrastructure_health:RdmaPcieCablePlugFault",
            "rdma_infrastructure_health:RdmaPcieCableStateFault"
          ]
    
          ## List of tag key/values pairs to match including glob expressions
          ## ALL given tags keys must exist and at least one value must match
          ## for the metric to match the rule.
          # tags = {}
    
          ## List of field keys to match including glob expressions
          ## At least one field must exist for the metric to match the rule.
          # fields = []
    
          ## Action to apply for this rule
          ## "pass" will keep the metric and pass it on, while "drop" will remove
          ## the metric
          action = "pass"
    
    [[processors.execd]]
      order = 2
      alias = "metrics_enrich"
      command = ["/uv-bin/uv", "run", "/scripts/oci_metrics_telegraf_filter.py"]
      environment = ["ENRICH_METRICS=true"]
  oci_metrics_telegraf_streaming_input.py: |
    #!/usr/bin/env python3
    # /// script
    # requires-python = ">=3.12"
    # dependencies = [
    #   "oci",
    #   "influx-line-protocol",
    # ]
    # ///
    """
    OCI Streaming to Telegraf InfluxDB Line Protocol Converter
    
    This script continuously consumes metrics from an Oracle Cloud Infrastructure (OCI) Streaming stream
    and outputs them in the Telegraf InfluxDB line protocol format for consumption by Telegraf.
    
    The script implements a multi-threaded consumer architecture that:
    - Reads raw metrics from one or more stream partitions
    - Aggregates metrics by minute intervals with configurable windows
    - Applies appropriate aggregation functions (sum, mean, count) per metric type
    - Outputs aggregated metrics to stdout in InfluxDB line protocol format
    
    Architecture:
        1. Consumer threads read messages from OCI Streaming partitions
        2. Raw metrics are placed in a shared queue
        3. Aggregator thread processes metrics from the queue
        4. Metrics are aggregated by timestamp minute and dimensions
        5. Aggregated metrics are emitted when they fall outside the aggregation window
        6. Timeout mechanism ensures stale metrics are emitted
    
    Environment Variables:
        OCI_CONFIG_PATH: Path to OCI configuration file (optional). If not set, instance principal
                         authentication will be attempted.
        OCI_PROFILE: OCI profile name to use from config file (default: "DEFAULT")
        GROUP_NAME: Consumer group name for stream consumption (default: "telegraf")
        MESSAGES_ENDPOINT: Streaming service endpoint URL (optional, auto-discovered if not set)
        STREAM_OCID: OCID of the stream to consume from (default: Jinja2 template variable)
        OCI_REGION: OCI region identifier. If not set, will be auto-detected from instance metadata.
        METRIC_AGGREGATION_WINDOW_MINUTES: Window size for metric aggregation in minutes (default: 2)
        METRIC_AGGREGATION_TIMEOUT: Timeout for emitting stale metrics in minutes (default: 10)
        STREAM_READ_INTERVAL: Seconds to wait between stream reads (default: 0.5)
    
    Usage:
        Run as a standalone script (typically invoked by Telegraf exec input plugin):
            $ python3 oci_metrics_telegraf_streaming_input.py
    
        The script outputs metrics to stdout in InfluxDB line protocol format:
            <measurement>,<tag_key>=<tag_value> <field_key>=<field_value> <timestamp_ns>
    
    Metric Aggregation:
        Different metrics use different aggregation functions:
        - Sum: Counters and cumulative metrics (e.g., bytes, packets, operations)
        - Mean: Gauges and averages (e.g., throughput, utilization percentages)
        - Count: Event counts (e.g., number of operations)
    
        The metric_stats dictionary defines the aggregation function for each metric type.
    
    Graceful Shutdown:
        - SIGHUP signal triggers graceful shutdown
        - Ctrl+C (KeyboardInterrupt) also triggers graceful shutdown
    """
    
    import json
    import logging
    import os
    import signal
    import sys
    import time
    import traceback
    import uuid
    from typing import Dict, Any, Optional, List, Tuple

    from base64 import b64decode
    from collections import defaultdict
    from datetime import datetime, timedelta, timezone
    from queue import Queue, Empty
    from threading import Thread, Event
    from urllib.request import Request, urlopen

    from influx_line_protocol import Metric

    # Disable OCI SDK service imports to speed up initialization
    os.environ["OCI_PYTHON_SDK_NO_SERVICE_IMPORTS"] = "1"
    from oci.streaming import StreamClient, StreamAdminClient
    from oci.streaming.models import CreateGroupCursorDetails, UpdateGroupDetails
    from oci.exceptions import ServiceError
    from oci.retry import DEFAULT_RETRY_STRATEGY

    # ============================================================================
    # Configuration from environment variables
    # See module docstring for details on each variable
    # ============================================================================
    OCI_CONFIG_PATH = os.environ.get("OCI_CONFIG_PATH", "")
    OCI_PROFILE = os.environ.get("OCI_PROFILE", "DEFAULT")
    GROUP_NAME = os.environ.get("GROUP_NAME", "telegraf")
    MESSAGES_ENDPOINT = os.environ.get("MESSAGES_ENDPOINT", None)
    STREAM_OCID = os.environ.get("STREAM_OCID")
    OCI_REGION = os.environ.get("OCI_REGION", None)
    METRIC_AGGREGATION_WINDOW_MINUTES = int(os.environ.get("METRIC_AGGREGATION_WINDOW_MINUTES", 2))
    METRIC_AGGREGATION_TIMEOUT = int(os.environ.get("METRIC_AGGREGATION_TIMEOUT", 10))
    STREAM_READ_INTERVAL = float(os.environ.get("STREAM_READ_INTERVAL", 0.5))

    # ============================================================================
    # Metric Aggregation Configuration
    # Maps metric names to their aggregation function: "sum", "mean", or "count"
    # ============================================================================
