apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nvidia-dcgm-exporter-oke
  namespace: gpu-operator
  labels:
    release: kube-prometheus-stack
spec:
  attachMetadata:
    node: true
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  namespaceSelector:
    matchNames:
      - gpu-operator
  endpoints:
    - port: gpu-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 15s
      honorLabels: false
      relabelings:
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: hostname
        - action: replace
          sourceLabels:
            - __meta_kubernetes_node_label_node_kubernetes_io_instance_type
          targetLabel: instance_shape
        - action: replace
          sourceLabels:
            - __meta_kubernetes_node_label_oci_oraclecloud_com_host_serial_number
          targetLabel: host_serial_number
        - action: replace
          sourceLabels:
            - __meta_kubernetes_node_label_displayName
          targetLabel: oci_name
