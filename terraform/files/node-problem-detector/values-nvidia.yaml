nameOverride: gpu-rdma-node-problem-detector-nvidia
fullnameOverride: gpu-rdma-node-problem-detector-nvidia

settings:
  custom_monitor_definitions:
    oke-nvidia-fast.json: |
      {
        "plugin": "custom",
        "pluginConfig": {
          "invoke_interval": "60s",
          "timeout": "60s",
          "max_output_length": 512,
          "concurrency": 2,
          "enable_message_change_based_condition_update": true,
          "skip_initial_status": true
        },
        "source": "oke-nvidia-fast",
        "metricsReporting": true,
        "conditions": [
          {"type": "GpuEcc", "reason": "GpuEccHasNoIssues", "message": "No ECC issues detected with GPUs"},
          {"type": "GpuRowRemap", "reason": "GpuRowRemapHasNoIssues", "message": "No row remapping issues detected with GPUs"},
          {"type": "GpuBus", "reason": "GpuBusHasNoIssues", "message": "No GPU bus issues detected"},
          {"type": "GpuCount", "reason": "GpuCountHasNoIssues", "message": "Node has the expected number of GPUs"},
          {"type": "GpuPcie", "reason": "GpuPcieHasNoIssues", "message": "Node has the expected PCIe bandwidth"},
          {"type": "GpuFabricMgr", "reason": "GpuFabricMgrHasNoIssues", "message": "Fabric Manager is running"},
          {"type": "GpuXid", "reason": "GpuXidHasNoIssues", "message": "No GPU Xid errors detected"},
          {"type": "RdmaLink", "reason": "RdmaLinkHasNoIssues", "message": "All RDMA links are up"},
          {"type": "RdmaLinkFlapping", "reason": "RdmaLinkFlappingHasNoIssues", "message": "No flapping RDMA links"},
          {"type": "RdmaWpaAuth", "reason": "RdmaWpaAuthHasNoIssues", "message": "All RDMA links are authenticated"},
          {"type": "RdmaRttcc", "reason": "RdmaRttccHasNoIssues", "message": "RTTCC is disabled on all RDMA interfaces"},
          {"type": "IpAddress", "reason": "IpAddressHasNoIssues", "message": "All required interfaces have an IP address"}
        ],
        "rules": [
          {"type": "permanent", "condition": "GpuEcc", "reason": "GpuEccHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["ecc-err", "60"], "timeout": "45s"},
          {"type": "permanent", "condition": "GpuRowRemap", "reason": "GpuRowRemapHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["rowremap-err", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "GpuBus", "reason": "GpuBusHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["bus-stat", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "GpuCount", "reason": "GpuCountHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["gpu-count", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "GpuPcie", "reason": "GpuPcieHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["gpu-pcie", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "GpuFabricMgr", "reason": "GpuFabricMgrHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["fabric-mgr", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "GpuXid", "reason": "GpuXidHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["xid-err", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "RdmaLink", "reason": "RdmaLinkHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["rdmalink-stat", "60"], "timeout": "45s"},
          {"type": "permanent", "condition": "RdmaLinkFlapping", "reason": "RdmaLinkFlappingHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["rdmalink-flap", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "RdmaWpaAuth", "reason": "RdmaWpaAuthHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["wpa-auth", "60"], "timeout": "40s"},
          {"type": "permanent", "condition": "RdmaRttcc", "reason": "RdmaRttccHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["rttcc-stat", "60"], "timeout": "30s"},
          {"type": "permanent", "condition": "IpAddress", "reason": "IpAddressHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["ip-address", "60"], "timeout": "30s"}
        ]
      }
    oke-nvidia-slow.json: |
      {
        "plugin": "custom",
        "pluginConfig": {
          "invoke_interval": "300s",
          "timeout": "120s",
          "max_output_length": 512,
          "concurrency": 1,
          "enable_message_change_based_condition_update": true,
          "skip_initial_status": true
        },
        "source": "oke-nvidia-slow",
        "metricsReporting": true,
        "conditions": [
          {"type": "OcaVersion", "reason": "OcaVersionHasNoIssues", "message": "OCA version is up to date"},
          {"type": "CpuProfile", "reason": "CpuProfileHasNoIssues", "message": "CPU profile is set to performance"},
          {"type": "NvlinkSpeed", "reason": "NvlinkSpeedHasNoIssues", "message": "NVLink speeds are as expected"},
          {"type": "DcgmiHealth", "reason": "DcgmiHealthHasNoIssues", "message": "DCGMI health check passed"},
          {"type": "RdmaVfRoutes", "reason": "RdmaVfRoutesHasNoIssues", "message": "RDMA VF routes are configured"},
          {"type": "RdmaVfCounters", "reason": "RdmaVfCountersHasNoIssues", "message": "RDMA VF counters have no fatal errors"},
          {"type": "GpuImex", "reason": "GpuImexHasNoIssues", "message": "NVIDIA IMEX is ready"}
        ],
        "rules": [
          {"type": "permanent", "condition": "OcaVersion", "reason": "OcaVersionHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["oca-ver", "300"], "timeout": "30s"},
          {"type": "permanent", "condition": "CpuProfile", "reason": "CpuProfileHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["cpu-profile", "300"], "timeout": "45s"},
          {"type": "permanent", "condition": "NvlinkSpeed", "reason": "NvlinkSpeedHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["nvlink-speed", "300"], "timeout": "90s"},
          {"type": "permanent", "condition": "DcgmiHealth", "reason": "DcgmiHealthHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["dcgmi-health", "300"], "timeout": "90s"},
          {"type": "permanent", "condition": "RdmaVfRoutes", "reason": "RdmaVfRoutesHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["rdma-vf-routes", "300"], "timeout": "45s"},
          {"type": "permanent", "condition": "RdmaVfCounters", "reason": "RdmaVfCountersHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["rdma-vf-counters", "300"], "timeout": "45s"},
          {"type": "permanent", "condition": "GpuImex", "reason": "GpuImexHasIssues", "path": "./custom-config/oke_healthcheck.sh", "args": ["imex", "300"], "timeout": "45s"}
        ]
      }
  custom_plugin_monitors:
    - /custom-config/oke-nvidia-fast.json
    - /custom-config/oke-nvidia-slow.json

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - BM.GPU.A100-v2.8
                - BM.GPU.B4.8
                - BM.GPU4.8
                - BM.GPU.H100.8
                - BM.GPU.L40S-NC.4
                - BM.GPU.A10.4
                - VM.GPU.A10.1
                - VM.GPU.A10.2
                - VM.GPU.A100.80G.1
                - BM.GPU.H200.8
                - BM.GPU.B200.8
                - BM.GPU.B300.8
                - BM.GPU.GB200.4
                - BM.GPU.GB200-v2.4
                - BM.GPU.GB200-v3.4
                - BM.GPU.GB300.4
