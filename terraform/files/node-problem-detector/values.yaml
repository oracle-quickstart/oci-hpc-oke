    oke_healthcheck.sh: |
        #!/bin/bash

        readonly OK=0
        readonly NONOK=1
        readonly UNKNOWN=2

        healthcheck_type=${1:-}
        expected_interval=${2:-60}
        case "$healthcheck_type" in
            ecc-err|rowremap-err|bus-stat|gpu-count|gpu-pcie|fabric-mgr|bad-page)
                ;;
            rdmalink-stat|rdmalink-flap|wpa-auth|rttcc-stat|oca-ver|cpu-profile)
                ;;
            xid-err|ip-address|nvlink-speed|dcgmi-health|rocminfo-check)
                ;;
            rdma-vf-routes|rdma-vf-counters|imex)
                ;;
            *)
                echo "Unsupported NPD check: $healthcheck_type"
                exit "$UNKNOWN"
                ;;
        esac
        case "$expected_interval" in
            *[!0-9]*|"")
                echo "Invalid NPD interval: $expected_interval"
                exit "$UNKNOWN"
                ;;
        esac

        umask 077
        start_time=$(date +%s)
        run_dir=/host/var/lib/oke-npd/run
        cache_dir=/host/var/cache/oke-npd/uv
        log_dir=/host/var/log/oke-npd
        metrics_dir=/host/var/lib/node_exporter/textfile_collector
        healthcheck_log_file=$log_dir/latest-${healthcheck_type}.log
        metrics_file=$metrics_dir/oke_npd_${healthcheck_type}.prom

        publish_metrics() {
            metric_timestamp=$1
            metric_duration=$2
            metric_status=$3
            metrics_tmp=$metrics_dir/.oke_npd_${healthcheck_type}.$$.prom
            if ! {
                printf 'oke_npd_check_last_run_timestamp_seconds{check="%s"} %s\n' "$healthcheck_type" "$metric_timestamp"
                printf 'oke_npd_check_expected_interval_seconds{check="%s"} %s\n' "$healthcheck_type" "$expected_interval"
                printf 'oke_npd_check_duration_seconds{check="%s"} %s\n' "$healthcheck_type" "$metric_duration"
                printf 'oke_npd_check_status_code{check="%s"} %s\n' "$healthcheck_type" "$metric_status"
            } >"$metrics_tmp"
            then
                rm -f "$metrics_tmp"
                return 1
            fi
            chmod 0644 "$metrics_tmp" && mv -f "$metrics_tmp" "$metrics_file"
        }

        install -d -m 0700 "$run_dir" "$cache_dir" "$log_dir" || exit "$UNKNOWN"
        install -d -m 0755 "$metrics_dir" || exit "$UNKNOWN"
        work_dir=$(mktemp -d "$run_dir/${healthcheck_type}.XXXXXX") || exit "$UNKNOWN"
        trap 'rm -rf "$work_dir"' EXIT

        if ! cp \
            /config/check_gpu_setup.py \
            /config/gpu_bw_test.py \
            /config/rdma_link_flapping.py \
            /config/shared_logging.py \
            /config/xid_checker.py \
            /config/xid_catalog_data.json \
            "$work_dir/"
        then
            echo "Unable to stage NPD health-check files"
            exit "$UNKNOWN"
        fi
        if ! cp /root/.local/bin/uv "$work_dir/uv"; then
            echo "Unable to stage the NPD Python runner"
            exit "$UNKNOWN"
        fi
        chmod 0700 "$work_dir/uv"

        if ! publish_metrics "$start_time" 0 "$UNKNOWN"; then
            echo "Unable to publish NPD start metrics"
            exit "$UNKNOWN"
        fi

        host_work_dir=${work_dir#/host}
        work_log="$work_dir/output.log"
        if nsenter -n/host/proc/1/ns/net \
            chroot /host \
            env UV_CACHE_DIR=/var/cache/oke-npd/uv \
            "$host_work_dir/uv" run \
            "$host_work_dir/check_gpu_setup.py" \
            --dry-run \
            "--$healthcheck_type" >"$work_log" 2>&1
        then
            command_rc=$OK
        else
            command_rc=$?
        fi

        log_tmp=$(mktemp "$log_dir/.latest-${healthcheck_type}.XXXXXX") || exit "$UNKNOWN"
        if ! cp "$work_log" "$log_tmp" || ! chmod 0640 "$log_tmp" || ! mv -f "$log_tmp" "$healthcheck_log_file"; then
            rm -f "$log_tmp"
            echo "Unable to publish the NPD health-check log"
            exit "$UNKNOWN"
        fi

        if [ "$command_rc" -eq "$NONOK" ] && ! grep -q "Healthcheck::" "$work_log"; then
            result=$UNKNOWN
        elif [ "$command_rc" -eq "$OK" ] || [ "$command_rc" -eq "$NONOK" ]; then
            result=$command_rc
        else
            result=$UNKNOWN
        fi

        end_time=$(date +%s)
        duration=$((end_time - start_time))
        if ! publish_metrics "$end_time" "$duration" "$result"; then
            result=$UNKNOWN
            command_rc=$UNKNOWN
        fi

        case "$result" in
            "$OK")
                echo "No errors found"
                ;;
            "$NONOK")
                grep "Healthcheck::" "$work_log" | head -c 512
                ;;
            *)
                unknown_msg=$(grep "HealthcheckUnknown::" "$work_log" | head -c 512)
                if [ -n "$unknown_msg" ]; then
                    echo "$unknown_msg"
                else
                    echo "$healthcheck_type execution failed with exit code $command_rc"
                fi
                ;;
        esac
        exit "$result"


  log_monitors:
