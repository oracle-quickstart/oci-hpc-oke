  worker_rdma_host_group_id:
    title: Compute Host Group OCID
    description: Optional Compute Host Group used with the GPU + RDMA managed node pool.
    type: ocid
    required: false
    visible: ${worker_rdma_enabled}
  worker_rdma_boot_volume_size:
    title: Boot volume size (GB)
    type: integer
    visible: ${worker_rdma_enabled}
  worker_rdma_boot_volume_vpus_per_gb:
    title: Boot volume performance (VPUs/GB)
    type: integer
    visible: false
  worker_rdma_image_type:
    title: Image type
    description: Whether to use an OKE, Platform, Custom, or imported image for GPU worker nodes.
    type: enum
    default: Custom
    enum: [Custom]
    required: true
    visible: false
  worker_rdma_image_os:
    title: Operating system
    type: enum
    default: "Ubuntu"
    enum: ["Ubuntu"]
    required: true
    visible:
      and:
        - ${worker_rdma_enabled}
        - or:
          - eq: [worker_rdma_image_type, OKE]
          - eq: [worker_rdma_image_type, Platform]
  worker_rdma_image_os_version:
    title: Operating system version
    type: enum
    default: "22.04"
    enum: ["22.04"]
    required: true
    visible:
      and:
        - ${worker_rdma_enabled}
        - or:
          - eq: [worker_rdma_image_type, OKE]
          - eq: [worker_rdma_image_type, Platform]
  worker_rdma_image_platform_id:
    title: Image
    type: ocid
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}
      operatingSystem: ${worker_image_os}
      operatingSystemVersion: ${worker_image_os_version}
      shape: ${worker_shape_name}
    visible:
      and:
        - ${worker_rdma_enabled}
        - eq: [worker_rdma_image_type, Platform]
  worker_rdma_image_use_uri:
    title: Import custom image from URI
    type: boolean
    visible: ${worker_rdma_enabled}
  worker_rdma_image_custom_uri:
    title: Image URI
    type: string
    visible:
      and:
        - eq: [worker_rdma_image_type, Custom]
        - ${worker_rdma_enabled}
        - ${worker_rdma_image_use_uri}
  worker_rdma_image_compartment:
    title: "GPU + RDMA worker pool image compartment"
    type: oci:identity:compartment:id
    required: true
    default: ${compartment_ocid}
    visible:
      and:
        - eq: [worker_rdma_image_type, Custom]
        - ${worker_rdma_enabled}
        - not: [worker_rdma_image_use_uri]
  worker_rdma_image_custom_id:
    title: Image
    description: Only Ubuntu custom images are supported with GPU & RDMA worker pools. Oracle Linux images are not supported.
    type: oci:core:image:id
    required: true
    dependsOn:
      compartmentId: ${worker_rdma_image_compartment}
    visible:
      and:
        - eq: [worker_rdma_image_type, Custom]
        - ${worker_rdma_enabled}
        - not: [worker_rdma_image_use_uri]
  worker_rdma_kubernetes_version:
    title: Kubernetes version
    description: Kubernetes version for the GPU + RDMA worker pool. Defaults to the cluster version.
    type: enum
    required: false
    default: ${kubernetes_version}
    visible: ${worker_rdma_enabled}
    enum:
      - "v1.35.2"
      - "v1.34.2"
      - "v1.33.10"
  worker_rdma_secondary_vnic_enabled:
    title: Configure secondary VNIC for pod IPs
    description: Add a GVA secondary VNIC profile to the GPU + RDMA node pool.
    type: boolean
    default: false
    visible: ${worker_rdma_enabled}
  worker_rdma_secondary_vnic_subnet_cidr:
    title: Advanced secondary subnet range
    description: >-
      Hidden advanced Terraform input. The Resource Manager UI uses derived two-CIDR-block defaults for new VCNs, or an existing subnet selection for existing VCNs.
    type: string
    required: false
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-2]?[0-9])|(?:3[0-2])$"
    visible: false
  worker_rdma_secondary_vnic_subnet_id:
    title: Existing secondary VNIC subnet
    description: >-
      For an existing VCN, select a subnet for the GPU + RDMA pool secondary VNIC. The subnet should already have two IPv4 CIDR blocks: a smaller first block for normal VNIC private IPs and a larger second block for private IP CIDR allocation. Leave blank when creating a new VCN so Terraform creates the default two-CIDR-block subnet.
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
        - ${worker_rdma_enabled}
        - ${worker_rdma_secondary_vnic_enabled}
        - { not: [create_vcn] }
  worker_rdma_secondary_vnic_ip_count:
    title: Pod IPs per secondary VNIC
    description: Number of pod IPs allocated on each secondary VNIC.
    type: enum
    enum: [1, 2, 4, 8, 16, 32, 64, 128, 256]
    default: 32
    visible:
      and:
        - ${worker_rdma_enabled}
        - ${worker_rdma_secondary_vnic_enabled}
  worker_rdma_max_pods_per_node:
    title: Maximum pods per node
    description: Kubelet maximum pods per GPU + RDMA node. Tune this with the secondary VNIC pod IP count.
    type: integer
    minimum: 1
    maximum: 110
    default: 64
    visible:
      and:
        - ${worker_rdma_enabled}
        - ${worker_rdma_secondary_vnic_enabled}
  worker_rdma_secondary_vnic_nsg_ids:
    title: Secondary VNIC NSG OCIDs
    description: Optional network security group OCIDs to attach to the GPU + RDMA pool secondary VNIC.
    type: array
    items:
      type: string
    unique_items: true
    minItems: 0
    visible:
      and:
        - ${worker_rdma_enabled}
        - ${worker_rdma_secondary_vnic_enabled}

  # Workers - GPU Memory Cluster
  worker_gmc_enabled:
    title: Create GPU Memory Cluster pool
    type: boolean
    description: "Create a self-managed GPU Memory Cluster worker pool. Note: your tenancy must be whitelisted for the GMC declarative size feature. Please work with your cloud engineer to get it whitelisted."
  worker_gmc_ad:
    title: Availability domain
    type: oci:identity:availabilitydomain:name
    required: true
    default: worker_ops_ad
    visible: ${worker_gmc_enabled}
    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_gmc_shape:
    title: Shape
    type: oci:core:instanceshape:name
    pattern: "^BM\\.GPU\\.GB(200|300).*$"
    required: true
    visible: ${worker_gmc_enabled}
    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_gmc_gpu_memory_fabric_ids:
    title: GPU Memory Fabric OCIDs
    description: Enter one GPU Memory Fabric OCID per line. One GPU Memory Cluster is created for each fabric.
    type: text
    multiline: true
    required: true
    visible: ${worker_gmc_enabled}
  worker_gmc_boot_volume_size:
    title: Boot volume size (GB)
    type: integer
    visible: ${worker_gmc_enabled}
  worker_gmc_boot_volume_vpus_per_gb:
    title: Boot volume performance (VPUs/GB)
    type: integer
    visible: false
  worker_gmc_kubernetes_version:
    title: Kubernetes version
    description: Kubernetes version for the GPU Memory Cluster worker pool. Defaults to the cluster version.
    type: enum
    required: false
    default: ${kubernetes_version}
    visible: ${worker_gmc_enabled}
    enum:
      - "v1.35.2"
      - "v1.34.2"
      - "v1.33.10"
  worker_gmc_image_id:
    title: Image
    description: Custom image OCID for the GPU Memory Cluster worker pool.
    type: oci:core:image:id
    required: true
    visible: ${worker_gmc_enabled}
    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_gmc_advanced_options:
    title: GPU Memory Cluster advanced options
    description: Show advanced GPU Memory Cluster scaling options.
    type: boolean
    default: false
    required: false
    visible: ${worker_gmc_enabled}
  worker_gmc_scale_target_size:
    title: Target size
    description: Target size for the GPU Memory Cluster scale config (number of nodes per GPU Memory Cluster).
    type: number
    default: 18
    required: true
    visible:
      and:
        - ${worker_gmc_enabled}
        - ${worker_gmc_advanced_options}
  worker_gmc_scale_is_upsize_enabled:
    title: Enable upsizing
    description: Allow the OCI control plane to upsize the GPU Memory Cluster.
    type: boolean
    default: true
    required: false
    visible:
      and:
        - ${worker_gmc_enabled}
        - ${worker_gmc_advanced_options}
  worker_gmc_scale_is_downsize_enabled:
    title: Enable downsizing
    description: Allow the OCI control plane to downsize the GPU Memory Cluster.
    type: boolean
    default: true
    required: false
    visible:
      and:
        - ${worker_gmc_enabled}
        - ${worker_gmc_advanced_options}

  # Kueue
  install_kueue:
    title: Install Kueue
    description: "Install Kueue with Topology Aware Scheduling (TAS) and create a Topology, ResourceFlavor, ClusterQueue, and LocalQueue for the active GPU worker pool."
    type: boolean
    default: true
  install_rdma_labeler:
    title: Install RDMA Topology Labeler
    visible: false
  kueue_chart_version:
    title: Kueue Helm chart version
    type: string
    default: "0.17.2"
    required: true
    visible: false
  kueue_local_queue_default_namespace:
    title: LocalQueue namespace
    description: "The namespace where the Kueue default LocalQueue will be created."
    type: string
    default: "default"
    pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
    required: true
    visible: ${install_kueue}

  # MPI Operator
  install_mpi_operator:
    title: Install MPI Operator
    description: Install MPI Operator for running MPIJob workloads.
    type: boolean
    default: true

  # NVIDIA DRA Driver
  install_nvidia_dra_driver:
    title: Install NVIDIA DRA Driver
    description: Install the NVIDIA DRA driver Helm chart for GPU Memory Cluster compute domains.
    type: boolean
    default: true
    visible: ${worker_gmc_enabled}
  nvidia_dra_driver_chart_version:
    title: NVIDIA DRA Driver Helm chart version
    type: string
    default: "0.4.0"
    visible: false

  # OCI HPC OKE Utils
  install_oci_hpc_oke_utils:
    title: Install OCI HPC OKE Utils
    description: Install the OCI HPC OKE Utils Helm chart, including the node labeler, image prepuller, and hostexec. The node labeler adds RDMA topology, compute host health, firmware version, and maintenance event labels.
    type: boolean
    default: true

  # SSH access to the nodes
  ssh_public_key:
    title: SSH public key
    description: "The SSH public key to access the bastion, operator, and worker nodes. Warning: if omitted, you will have no SSH access to any node (kubectl will still work)."
    type: oci:core:ssh:publickey
    pattern: "((^(ssh-rsa AAAAB3NzaC1yc2|ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNT|ecdsa-sha2-nistp384 AAAAE2VjZHNhLXNoYTItbmlzdHAzODQAAAAIbmlzdHAzOD|ecdsa-sha2-nistp521 AAAAE2VjZHNhLXNoYTItbmlzdHA1MjEAAAAIbmlzdHA1Mj|ssh-ed25519 AAAAC3NzaC1lZDI1NTE5|ssh-dss AAAAB3NzaC1kc3)[0-9A-Za-z+\/]+[=]{0,3})( [^,]*)?)(,((ssh-rsa AAAAB3NzaC1yc2|ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNT|ecdsa-sha2-nistp384 AAAAE2VjZHNhLXNoYTItbmlzdHAzODQAAAAIbmlzdHAzOD|ecdsa-sha2-nistp521 AAAAE2VjZHNhLXNoYTItbmlzdHA1MjEAAAAIbmlzdHA1Mj|ssh-ed25519 AAAAC3NzaC1lZDI1NTE5|ssh-dss AAAAB3NzaC1kc3)[0-9A-Za-z+\/]+[=]{0,3})( [^,]*)?)*$"
    required: false

outputGroups:
  - title: Terraform
    outputs:
      - state_id
      - stack_version

  - title: Network
    outputs:
      - vcn_id
      - vcn_name
      - ig_route_table_id
      - nat_route_table_id

  - title: Bastion instance
    outputs:
      - bastion_id
      - bastion_subnet_id
      - bastion_subnet_cidr
      - bastion_nsg_id
      - bastion_public_ip
      - bastion_ssh_command
      - bastion_ssh_secret_id

  - title: Bastion Service
    outputs:
      - bastion_service_id
      - bastion_service_subnet_id
      - bastion_service_subnet_cidr
      - oke_private_endpoint_ip
      - bastion_service_session_command
      - bastion_service_worker_ssh_command

  - title: Operator instance
    outputs:
      - operator_id
      - operator_subnet_id
      - operator_subnet_cidr
      - operator_nsg_id
      - operator_private_ip
      - operator_ssh_command

#  - title: File Storage Service (FSS)
#    outputs:
#      - fss_ad
#      - fss_subnet_id
#      - fss_nsg_id
#      - fss_volume_name
#      - fss_filesystem_id
#      - fss_mount_target_id
#      - fss_mount_target_ip
#      - fss_export_set_id

  - title: Cluster
    outputs:
      - cluster_name
      - cluster_id
      - cluster_ca_cert
      - cluster_public_endpoint
      - cluster_private_endpoint
      - control_plane_subnet_id
      - control_plane_subnet_cidr
      - control_plane_nsg_id
      - access_k8s_public_endpoint
      - access_k8s_private_endpoint

  - title: Load balancers
    outputs:
      - int_lb_subnet_id
      - int_lb_subnet_cidr
      - int_lb_nsg_id
      - pub_lb_subnet_id
      - pub_lb_subnet_cidr
      - pub_lb_nsg_id

  - title: Workers
    outputs:
      - worker_subnet_id
      - worker_subnet_cidr
      - worker_nsg_id
      - worker_ops_pool_id
      - worker_ops_image_id
      - worker_cpu_pool_id
      - worker_cpu_image_id
      - worker_gpu_pool_id
      - worker_gpu_image_id
      - worker_rdma_pool_id
      - worker_rdma_image_id

  - title: Monitoring
    outputs:
      - grafana_url
      - grafana_admin_username
      - grafana_admin_password
      - grafana_port_forward
      - grafana_fetch_endpoint_command
      - prom_server_port_forward
      - prom_pushgateway_port_forward
      - prom_pushgateway_port_forward
      - prometheus_pushgateway_version
      - prometheus_adapter_version
      - metrics_server_version
      - dcgm_exporter_version
      
outputs:
  # Terraform
  state_id:
    title: State ID
    type: copyableString
  stack_version:
    title: Stack Version
    type: copyableString

  # Network
  vcn_id:
    title: VCN
    type: ocid
  vcn_name:
    title: VCN name
    type: string
  ig_route_table_id:
    title: Internet gateway route table
    type: ocid
  nat_route_table_id:
    title: NAT gateway route table
    type: ocid
  subnet_cidrs:
    visible: false
  subnet_ids:
    visible: false
  network_security_rules:
    visible: false

  # Bastion
  bastion_id:
    title: Instance
    type: ocid
  bastion_subnet_id:
    title: Subnet
    type: ocid
  bastion_subnet_cidr:
    title: Subnet CIDR
    type: string
  bastion_nsg_id:
    title: Network security group
    type: ocid
  bastion_public_ip:
    title: Address
    type: copyableString
  bastion_ssh_command:
    title: SSH command
    type: copyableString

# Bastion Service
  bastion_service_id:
    title: Bastion service
    type: ocid
  bastion_service_subnet_id:
    title: Bastion service subnet
    type: ocid
  bastion_service_subnet_cidr:
    title: Bastion service subnet CIDR
    type: string
  oke_private_endpoint_ip:
    title: OKE private endpoint IP
    type: string
  bastion_service_session_command:
    title: Bastion service Kubernetes endpoint session command
    type: copyableString
  bastion_service_worker_ssh_command:
    title: Bastion service worker SSH command
    type: copyableString

  # Operator
  operator_id:
    title: Instance
  operator_subnet_id:
    title: Subnet
    type: ocid
  operator_subnet_cidr:
    title: Subnet CIDR
    type: string
  operator_nsg_id:
    title: Network security group
    type: ocid
  operator_private_ip:
    title: Address
    type: copyableString
  operator_ssh_command:
    title: SSH command
    type: copyableString

  # Cluster
  cluster_id:
    title: Cluster ID
    type: ocid
  cluster_name:
    title: Cluster name
    type: string
  cluster_public_endpoint:
    title: Public endpoint
    type: copyableString
  cluster_private_endpoint:
    title: Private endpoint
    type: copyableString
  control_plane_subnet_id:
    title: Subnet
    type: ocid
  control_plane_subnet_cidr:
    title: Subnet CIDR
    type: string
  control_plane_nsg_id:
    title: Network security group
    type: ocid
  access_k8s_public_endpoint:
    title: OCI CLI command to access the kubeconfig for your cluster via the public endpoint
    type: copyableString
  access_k8s_private_endpoint:
    title: OCI CLI command to access the kubeconfig for your cluster via the private endpoint
    type: copyableString    

  # Load balancers
  int_lb_subnet_id:
    title: Internal subnet
    type: ocid
  int_lb_subnet_cidr:
    title: Internal CIDR
    type: string
  int_lb_nsg_id:
    title: Internal network security group
    type: ocid
  pub_lb_subnet_id:
    title: Public subnet
    type: ocid
  pub_lb_subnet_cidr:
    title: Public CIDR
    type: string
  pub_lb_nsg_id:
    title: Public network security group
    type: ocid

  # Workers
  worker_subnet_id:
    title: Subnet
    type: ocid
  worker_subnet_cidr:
    title: Subnet CIDR
    type: string
  worker_nsg_id:
    title: Network security group
    type: ocid
  worker_ops_pool_id:
  # Workers - System pool
    title: System pool
    type: ocid
  worker_cpu_pool_id:
    title: CPU pool
    type: ocid
    visible: ${worker_cpu_enabled}
  worker_gpu_pool_id:
    title: GPU pool
    type: ocid
    visible: worker_gpu_enabled
  worker_rdma_pool_id:
    title: RDMA pool
    type: ocid
    visible: ${worker_rdma_enabled}
  
  # Pods
  pod_subnet_id:
    title: Subnet
    type: ocid
    visible: false
  pod_subnet_cidr:
    title: Subnet CIDR
    type: string
    visible: false
  pod_nsg_id:
    title: Network security group
    type: ocid
    visible: false

  # Monitoring
  grafana_url:
      title: Grafana URL
      type: string
      visible:
        and:
        - install_node_problem_detector_kube_prometheus_stack
  grafana_fetch_endpoint_command:
      title: Command to get the Grafana endpoint
      type: string
      visible:
        and:
        - install_node_problem_detector_kube_prometheus_stack
  grafana_admin_username:
    title: Grafana admin username
    type: copyableString
    default: "admin"
    visible:
      and:
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana        
  grafana_admin_password:
    title: Grafana admin password
    type: copyableString
    visible:
      and:
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana
  grafana_port_forward:
     title: Grafana port forward command
     visible:
       and:
       - install_node_problem_detector_kube_prometheus_stack
       - install_grafana
  prom_server_port_forward:
      title: Prometheus server port forward command
      type: string
      visible:
        and:
        - install_node_problem_detector_kube_prometheus_stack
  prometheus_stack_chart_version:
      title: Prometheus stack chart version
      type: string
      visible: false
