        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_accounting_enabled}
  slinky_openldap_chart_version:
    title: OpenLDAP chart version
    type: string
    default: "4.3.3"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_openldap_admin_password:
    title: OpenLDAP admin password
