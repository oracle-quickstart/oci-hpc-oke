    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_rdma_pool_size:
    title: Number of RDMA worker nodes
    type: integer
    required: true
    visible: ${worker_rdma_enabled}
  worker_rdma_shape:
    title: Shape
    type: oci:core:instanceshape:name
    pattern: "^BM\\.(HPC|GPU|Optimized).*$"
    required: true
    visible: ${worker_rdma_enabled}
    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_rdma_boot_volume_size:
    title: Boot volume size (GB)
    type: integer
    visible: ${worker_rdma_enabled}
  worker_rdma_boot_volume_vpus_per_gb:
    title: Boot volume performance (VPUs/GB)
    type: integer
    visible: false
  worker_rdma_image_type:
    title: Image type
    description: Whether to use an OKE, Platform, Custom, or imported image for GPU worker nodes.
    type: enum
    default: Custom
    enum: [Custom]
    required: true
    visible: false
  worker_rdma_image_os:
    title: Operating system
    type: enum
    default: "Ubuntu"
    enum: ["Ubuntu"]
    required: true
    visible:
      and:
        - ${worker_rdma_enabled}
        - or:
          - eq: [worker_rdma_image_type, OKE]
          - eq: [worker_rdma_image_type, Platform]
  worker_rdma_image_os_version:
    title: Operating system version
    type: enum
    default: "22.04"
    enum: ["22.04"]
    required: true
    visible:
      and:
        - ${worker_rdma_enabled}
        - or:
          - eq: [worker_rdma_image_type, OKE]
          - eq: [worker_rdma_image_type, Platform]
  worker_rdma_image_platform_id:
    title: Image
    type: ocid
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}
      operatingSystem: ${worker_image_os}
      operatingSystemVersion: ${worker_image_os_version}
      shape: ${worker_shape_name}
    visible:
      and:
        - ${worker_rdma_enabled}
        - eq: [worker_rdma_image_type, Platform]
  worker_rdma_image_use_uri:
    title: Import custom image from URI
    type: boolean
    visible: ${worker_rdma_enabled}
  worker_rdma_image_custom_uri:
    title: Image URI
    type: string
    visible:
      and:
        - eq: [worker_rdma_image_type, Custom]
        - ${worker_rdma_enabled}
        - ${worker_rdma_image_use_uri}
  worker_rdma_image_compartment:
    title: "GPU + RDMA worker pool image compartment"
    type: oci:identity:compartment:id
    required: true
    default: ${compartment_ocid}
    visible:
      and:
        - eq: [worker_rdma_image_type, Custom]
        - ${worker_rdma_enabled}
        - not: [worker_rdma_image_use_uri]
  worker_rdma_image_custom_id:
    title: Image
    description: Only Ubuntu custom images are supported with GPU & RDMA worker pools. Oracle Linux images are not supported.
    type: oci:core:image:id
    required: true
    dependsOn:
      compartmentId: ${worker_rdma_image_compartment}
    visible:
      and:
        - eq: [worker_rdma_image_type, Custom]
        - ${worker_rdma_enabled}
        - not: [worker_rdma_image_use_uri]
  worker_rdma_kubernetes_version:
    title: Kubernetes version
    description: Kubernetes version for the GPU + RDMA worker pool. Defaults to the cluster version.
    type: enum
    required: false
    default: ${kubernetes_version}
    visible: ${worker_rdma_enabled}
    enum:
      - "v1.35.2"
      - "v1.34.2"
      - "v1.33.10"

  # Workers - GPU Memory Cluster
  worker_gmc_enabled:
    title: Create GPU Memory Cluster pool
    type: boolean
    description: "Create a self-managed GPU Memory Cluster worker pool. Note: your tenancy must be whitelisted for the GMC declarative size feature. Please work with your cloud engineer to get it whitelisted."
  worker_gmc_ad:
    title: Availability domain
    type: oci:identity:availabilitydomain:name
    required: true
    default: worker_ops_ad
    visible: ${worker_gmc_enabled}
    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_gmc_shape:
    title: Shape
    type: oci:core:instanceshape:name
    pattern: "^BM\\.GPU\\.GB(200|300).*$"
    required: true
    visible: ${worker_gmc_enabled}
    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_gmc_gpu_memory_fabric_ids:
    title: GPU Memory Fabric OCIDs
    description: Enter one GPU Memory Fabric OCID per line. One GPU Memory Cluster is created for each fabric.
    type: text
    multiline: true
    required: true
    visible: ${worker_gmc_enabled}
  worker_gmc_boot_volume_size:
    title: Boot volume size (GB)
    type: integer
    visible: ${worker_gmc_enabled}
  worker_gmc_boot_volume_vpus_per_gb:
    title: Boot volume performance (VPUs/GB)
    type: integer
    visible: false
  worker_gmc_kubernetes_version:
    title: Kubernetes version
    description: Kubernetes version for the GPU Memory Cluster worker pool. Defaults to the cluster version.
    type: enum
    required: false
    default: ${kubernetes_version}
    visible: ${worker_gmc_enabled}
    enum:
      - "v1.35.2"
      - "v1.34.2"
      - "v1.33.10"
  worker_gmc_image_id:
    title: Image
    description: Custom image OCID for the GPU Memory Cluster worker pool.
    type: oci:core:image:id
    required: true
    visible: ${worker_gmc_enabled}
    dependsOn:
      compartmentId: ${compartment_ocid}
  worker_gmc_advanced_options:
    title: GPU Memory Cluster advanced options
    description: Show advanced GPU Memory Cluster scaling options.
    type: boolean
    default: false
    required: false
    visible: ${worker_gmc_enabled}
  worker_gmc_scale_target_size:
    title: Target size
    description: Target size for the GPU Memory Cluster scale config (number of nodes per GPU Memory Cluster).
    type: number
    default: 18
    required: true
    visible:
      and:
        - ${worker_gmc_enabled}
        - ${worker_gmc_advanced_options}
  worker_gmc_scale_is_upsize_enabled:
    title: Enable upsizing
    description: Allow the OCI control plane to upsize the GPU Memory Cluster.
    type: boolean
    default: true
    required: false
    visible:
      and:
        - ${worker_gmc_enabled}
        - ${worker_gmc_advanced_options}
  worker_gmc_scale_is_downsize_enabled:
    title: Enable downsizing
    description: Allow the OCI control plane to downsize the GPU Memory Cluster.
    type: boolean
    default: true
    required: false
    visible:
      and:
        - ${worker_gmc_enabled}
        - ${worker_gmc_advanced_options}

  # Kueue
  install_kueue:
    title: Install Kueue
    description: "Install Kueue with Topology Aware Scheduling (TAS) and create a Topology, ResourceFlavor, ClusterQueue, and LocalQueue for the active GPU worker pool."
    type: boolean
    default: true
  install_rdma_labeler:
    title: Install RDMA Topology Labeler
    visible: false
  kueue_chart_version:
    title: Kueue Helm chart version
    type: string
    default: "0.18.2"
    required: true
    visible: false
  kueue_local_queue_default_namespace:
    title: LocalQueue namespace
    description: "The namespace where the Kueue default LocalQueue will be created."
    type: string
    default: "default"
    pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
    required: true
    visible: ${install_kueue}

  # MPI Operator
  install_mpi_operator:
    title: Install MPI Operator
    description: Install MPI Operator for running MPIJob workloads.
    type: boolean
    default: true

  deploy_nccl_rccl_param_configmap:
    title: Create NCCL/RCCL parameters ConfigMaps
    description: Create a shape-specific ConfigMap with the recommended NCCL/RCCL parameters for each enabled RDMA or GMC GPU shape. Names use oci-nccl-parameters-<shape> for NVIDIA and oci-rccl-parameters-<shape> for AMD, with the shape converted to lowercase and dots replaced by hyphens. NCCL_IB_HCA is set to 'mlx5' when SR-IOV virtual functions are enabled, otherwise the shape's full device list.
    type: boolean
    default: true
    visible:
      or:
        - worker_rdma_enabled
        - worker_gmc_enabled

  # NVIDIA DRA Driver
  install_nvidia_dra_driver:
    title: Install NVIDIA DRA Driver
    description: Install the NVIDIA DRA driver Helm chart for GPU Memory Cluster compute domains.
    type: boolean
    default: true
    visible: ${worker_gmc_enabled}
  nvidia_dra_driver_chart_version:
    title: NVIDIA DRA Driver Helm chart version
    type: string
    default: "0.4.0"
    visible: false

  # Slinky / Slurm Operator
  install_slinky:
    title: Install Slurm Operator
    description: "Deploy Slinky Slurm Operator, Slurm, HA OpenLDAP, SSSD integration, FSS-backed /home, Slurm accounting, and login service. Independent NodeSets are added for enabled CPU, standard GPU, GPU with RDMA, and GPU Memory Cluster worker pools."
    type: boolean
    default: false
  slinky_advanced_options:
    title: Advanced options
    type: boolean
    default: false
    required: false
    visible: ${install_slinky}
  hostname_override:
    title: Use hostnames instead of IP addresses as OKE worker node names
    description: Bootstrap worker nodes with kubelet --hostname-override so they register in Kubernetes by hostname instead of private IP address. When disabled for Slurm deployments, the oci-hpc-oke-utils annotator keeps Slurm node names on hostnames through the Slurm operator hostname-override node annotation.
    type: boolean
    default: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_install_slurm_cluster:
    title: Install Slurm cluster
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_image_profile:
    title: Slinky image profile
    description: "Selects the tested Slurm chart and container image set used by auto chart and image tag fields."
    type: enum
    enum:
      - 25.11.6-ubuntu24.04
      - 26.05-ubuntu24.04
      - 26.05.1-ubuntu26.04
    default: "26.05.1-ubuntu26.04"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_identity_enabled:
    title: Enable HA OpenLDAP and SSSD
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_home_enabled:
    title: Enable FSS-backed Slurm home directories
    description: "Creates a slurm-home PVC bound to the PersistentVolume named by slinky_home_pv_name. Enable create_fss to let the stack create fss-pv."
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_home_pv_name:
    title: Slurm home PersistentVolume name
    type: string
    default: "fss-pv"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_home_enabled}
  slinky_home_pvc_size:
    title: Slurm home PVC size
    type: string
    default: "50Gi"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_home_enabled}
  slinky_accounting_enabled:
    title: Enable Slurm accounting
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_openldap_namespace:
    title: OpenLDAP namespace
    type: string
    default: "identity"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_openldap_domain:
    title: LDAP domain
    type: string
    default: "example.org"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_openldap_base_dn:
    title: LDAP base DN
    type: string
    default: "dc=example,dc=org"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_slurm_namespace:
    title: Slurm namespace
    type: string
    default: "slurm"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_operator_namespace:
    title: Slinky operator namespace
    type: string
    default: "slinky"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_login_enabled:
    title: Enable Slurm login service
    description: "Deploy a LoginSet and LoadBalancer for LDAP users. Requires HA OpenLDAP and SSSD to be enabled."
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_worker_network_mode:
    title: GPU with RDMA Slurm network mode
    description: "Choose hostNetwork for direct host networking, or virtualFunctions for pod networking with SR-IOV RDMA VFs. Forced to virtualFunctions when the NVIDIA Network Operator add-on is installed. Standard GPU workers use pod networking and GMC workers use hostNetwork."
    type: enum
    enum:
      - hostNetwork
      - virtualFunctions
    default: "hostNetwork"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${worker_rdma_enabled}
  slinky_worker_mount_infiniband:
    title: Mount /dev/infiniband into GPU with RDMA Slurm workers
    description: GMC workers always mount /dev/infiniband; standard GPU workers do not.
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${worker_rdma_enabled}
  slinky_worker_ssh_enabled:
    title: Enable SSH on Slurm workers
    description: "Required when HA OpenLDAP and SSSD are enabled because Slinky couples worker identity configuration to SSH. Host-networked workers listen on port 2222."
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_worker_replicas:
    title: Slurm worker replicas
    description: "Only applies when overriding the worker NodeSet to StatefulSet. The generated default uses DaemonSet."
    type: integer
    required: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_gpus_per_node:
    title: GPUs per Slurm worker
    description: "Defaults independently to the final numeric component of each accelerator pool's GPU shape."
    type: integer
    required: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_worker_rdma_resource:
    title: Slurm worker RDMA VF resource
    description: "Extended resource requested by pod-networked Slinky RDMA workers."
    type: string
    default: "nvidia.com/rdma-vf"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - or:
            - eq: [slinky_worker_network_mode, virtualFunctions]
            - ${deploy_nvidia_network_operator}
  slinky_worker_rdma_vfs_per_node:
    title: Slurm worker RDMA VFs
    description: "Number of SR-IOV RDMA VFs requested by each pod-networked Slinky RDMA worker. Leave unset to derive the safe default from the selected worker shape."
    type: integer
    required: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - or:
            - eq: [slinky_worker_network_mode, virtualFunctions]
            - ${deploy_nvidia_network_operator}
  slinky_worker_rdma_network:
    title: Slurm worker RDMA network
    description: "Multus NetworkAttachmentDefinition for pod-networked Slinky RDMA workers. Use namespace/name when needed."
    type: string
    default: "default/rdma-vf"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - or:
            - eq: [slinky_worker_network_mode, virtualFunctions]
            - ${deploy_nvidia_network_operator}
  slinky_gpu_autodetect:
    title: Slurm GPU AutoDetect
    description: "Use auto to select rsmi for AMD shapes and nvml for NVIDIA shapes."
    type: enum
    enum:
      - auto
      - rsmi
      - nvml
      - nvidia
      - off
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_worker_image_repository:
    title: Slurm worker image repository
    type: string
    default: "iad.ocir.io/idxzjcdglx2s/slurm-operator"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_worker_image_tag:
    title: Slurm worker image tag
    description: "Use auto to select NVIDIA NCCL with Pyxis or AMD RCCL. All enabled accelerator pools must use the same GPU vendor."
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_operator_chart_version:
    title: Slinky operator chart version
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_slurm_chart_version:
    title: Slinky Slurm chart version
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_operator_cert_manager_enabled:
    title: Use cert-manager for Slinky webhook certificate
    type: boolean
    default: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_operator_values_override:
    title: Slinky operator values override
    type: string
    multiline: true
    default: ""
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_slurm_values_override:
    title: Slinky Slurm values override
    type: string
    multiline: true
    default: ""
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_mariadb_operator_chart_version:
    title: MariaDB Operator chart version
