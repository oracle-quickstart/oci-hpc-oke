    type: ocid

  # Workers
  worker_subnet_id:
    title: Worker subnet OCID
    type: ocid
  worker_subnet_cidr:
    title: Worker subnet CIDR
    type: string
  worker_nsg_id:
    title: Worker network security group OCID
    type: ocid
  worker_ops_pool_id:
  # Workers - System pool
    title: System worker node pool OCID
    type: ocid
