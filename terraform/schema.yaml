    required: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_openldap_config_password:
    title: OpenLDAP config password
    type: password
    description: Leave unset to generate a unique per-stack password.
    required: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_openldap_primary_replicas:
    title: OpenLDAP writable primary replicas
    type: integer
    default: 1
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_openldap_readonly_replicas:
    title: OpenLDAP read-only replicas
    type: integer
    default: 2
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_openldap_storage_size:
    title: OpenLDAP storage size
    type: string
    default: "8Gi"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_mariadb_storage_size:
    title: MariaDB storage size
    type: string
    default: "16Gi"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_accounting_enabled}
  slinky_accounting_image_repository:
    title: SlurmDBD image repository
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_accounting_enabled}
  slinky_accounting_image_tag:
    title: SlurmDBD image tag
    description: "Use auto to select the tag from the Slinky image profile."
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_accounting_enabled}
  slinky_restapi_image_repository:
    title: Slurm REST API image repository
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_restapi_image_tag:
    title: Slurm REST API image tag
    description: "Use auto to select the tag from the Slinky image profile."
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_login_image_repository:
    title: Slurm login image repository
    type: string
    default: "iad.ocir.io/idxzjcdglx2s/slurm-operator"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_login_image_tag:
    title: Slurm login image tag
    description: "Use auto to select the tag from the Slinky image profile."
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_controller_image_repository:
    title: Slurm controller image repository
    type: string
    default: "iad.ocir.io/idxzjcdglx2s/slurm-operator"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_controller_image_tag:
    title: Slurm controller image tag
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_sssd_image_repository:
    title: SSSD sidecar image repository
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_sssd_image_tag:
    title: SSSD sidecar image tag
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_identity_enabled}
  slinky_nodeset_name:
    title: Standard GPU Slurm NodeSet name
    type: string
    default: "gpu"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${worker_gpu_enabled}
  slinky_rdma_nodeset_name:
    title: GPU with RDMA Slurm NodeSet name
    type: string
    default: "rdma"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${worker_rdma_enabled}
  slinky_gmc_nodeset_name:
    title: GPU Memory Cluster Slurm NodeSet prefix
    description: A fabric suffix is added when multiple GPU memory fabrics are configured.
    type: string
    default: "gmc"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${worker_gmc_enabled}
  slinky_default_partition:
    title: Default Slurm partition
    description: auto prefers standard GPU, then RDMA, GMC, and CPU. With multiple GMC fabrics, gmc selects the aggregate gmc-all partition so jobs can span fabrics over RDMA. The all partition or an exact generated partition name is also accepted.
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_topology_enabled:
    title: Manage Slurm topology from RDMA network locality
    description: The oci-hpc-oke-utils annotator writes per-node dynamic topology annotations and its controller generates topology.yaml (tree, block, and flat) from the rdma.* node labels. Requires the OKE utilities chart, its RDMA labeler, and at least one enabled Slurm worker pool. Nodes without locality labels share a synthetic none unit.
    type: boolean
    default: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_topology_default:
    title: Default Slurm topology
    description: Topology marked cluster_default in the generated topology.yaml. Partitions without an explicit Topology parameter use it.
    type: enum
    enum:
      - tree
      - block
    default: "tree"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_topology_enabled}
  slinky_topology_block_sizes:
    title: Block topology block sizes
    description: auto derives block_sizes from current local block populations. Or a comma-separated list of positive integers where each successive value is a larger power-of-two multiple of the previous value, for example 8,16,32.
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_topology_enabled}
  slinky_cpu_worker_enabled:
    title: Run Slurm workers on the CPU worker pool
    description: Requires the CPU worker pool to be enabled.
    type: boolean
    default: false
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
  slinky_cpu_nodeset_name:
    title: CPU Slurm worker nodeset name
    type: string
    default: "cpu"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_cpu_worker_enabled}
  slinky_cpu_worker_image_repository:
    title: CPU Slurm worker image repository
    description: Empty uses the GPU Slurm worker image repository.
    type: string
    default: ""
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_cpu_worker_enabled}
  slinky_cpu_worker_image_tag:
    title: CPU Slurm worker image tag
    description: auto uses the same image as the GPU Slurm workers.
    type: string
    default: "auto"
    visible:
      and:
        - ${install_slinky}
        - ${slinky_advanced_options}
        - ${slinky_cpu_worker_enabled}

  # NVIDIA Network Operator
  deploy_nvidia_network_operator:
    title: Install NVIDIA Network Operator add-on
    type: boolean
    description: "Install the NVIDIA Network Operator OKE add-on with the SR-IOV Network Operator enabled. Requires the Node Feature Discovery add-on. Currently supported shapes: BM.GPU4.8, BM.GPU.A100-v2.8, BM.GPU.B4.8, BM.GPU.B200.8, BM.GPU.B300.8, BM.GPU.H100.8, BM.GPU.H200.8, BM.GPU.MI300X.8, BM.GPU.MI355X-v1.8."
    default: false
    visible:
      - deploy_node_feature_discovery
  nvidia_network_operator_addon_version:
    title: NVIDIA Network Operator add-on version
    type: enum
    description: Version of the NVIDIA Network Operator OKE add-on.
    default: "v25.10.0"
    required: true
    enum:
      - "v25.10.0"
    visible: ${deploy_nvidia_network_operator}
  nvidia_network_operator_configuration:
    title: NVIDIA Network Operator add-on configurations
    type: map(string)
    description: Configuration key-value pairs for the NVIDIA Network Operator OKE add-on.
    visible: false
  nvidia_network_operator_ipam_subnet:
    title: NVIDIA IPAM IP pool subnet
    type: string
    description: Subnet for the NVIDIA IPAM IP pool used by SR-IOV network interfaces.
    default: "192.168.0.0/16"
    visible: false
  nvidia_network_operator_ipam_gateway:
    title: NVIDIA IPAM IP pool gateway
    type: string
    description: Gateway for the NVIDIA IPAM IP pool used by SR-IOV network interfaces.
    default: "192.168.0.1"
    visible: false
  nvidia_network_operator_ipam_per_node_block_size:
    title: NVIDIA IPAM IPs per node
    type: integer
    description: Number of IPs allocated to each node from the NVIDIA IPAM IP pool.
    default: 100
    visible: false
  nvidia_network_operator_sriov_max_unavailable:
    title: SR-IOV maximum unavailable nodes
    type: string
    description: Percentage or number of nodes that can be drained or rebooted concurrently during SR-IOV VF configuration.
    default: "100%"
    visible: false

  # OCI HPC OKE Utils
  install_oci_hpc_oke_utils:
    title: Install OCI HPC OKE Utils
    description: Install the OCI HPC OKE Utils Helm chart, including the node labeler, image prepuller, and hostexec. The node labeler adds RDMA topology, compute host health, firmware version, and maintenance event labels.
    type: boolean
    default: true

  # SSH access to the nodes
  ssh_public_key:
    title: SSH public key
    description: "The SSH public key to access the bastion, operator, and worker nodes. Warning: if omitted, you will have no SSH access to any node (kubectl will still work)."
    type: oci:core:ssh:publickey
    pattern: "((^(ssh-rsa AAAAB3NzaC1yc2|ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNT|ecdsa-sha2-nistp384 AAAAE2VjZHNhLXNoYTItbmlzdHAzODQAAAAIbmlzdHAzOD|ecdsa-sha2-nistp521 AAAAE2VjZHNhLXNoYTItbmlzdHA1MjEAAAAIbmlzdHA1Mj|ssh-ed25519 AAAAC3NzaC1lZDI1NTE5|ssh-dss AAAAB3NzaC1kc3)[0-9A-Za-z+\/]+[=]{0,3})( [^,]*)?)(,((ssh-rsa AAAAB3NzaC1yc2|ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNT|ecdsa-sha2-nistp384 AAAAE2VjZHNhLXNoYTItbmlzdHAzODQAAAAIbmlzdHAzOD|ecdsa-sha2-nistp521 AAAAE2VjZHNhLXNoYTItbmlzdHA1MjEAAAAIbmlzdHA1Mj|ssh-ed25519 AAAAC3NzaC1lZDI1NTE5|ssh-dss AAAAB3NzaC1kc3)[0-9A-Za-z+\/]+[=]{0,3})( [^,]*)?)*$"
    required: false

