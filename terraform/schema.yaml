        - eq: [worker_ops_shape, "VM.Standard.A2.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.E4.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.E5.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.E6.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.x86.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.AMD.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.Ampere.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.Intel.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.E3.Flex"]
  worker_ops_memory:
    title: Memory (GB)
    type: integer
    required: true
    visible:
      or:
        - eq: [worker_ops_shape, "VM.Standard3.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.A1.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.A2.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.E4.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.E5.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.E6.Flex"]
        - eq: [worker_ops_shape, "VM.Standard.x86.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.AMD.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.Ampere.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.Intel.Generic"]
        - eq: [worker_ops_shape, "VM.Standard.E3.Flex"]
  worker_ops_boot_volume_size:
    title: Boot volume size (GB)
    type: integer      
  worker_ops_image_type:
    title: Image type
    default: Custom
    description: Whether to use an OKE, Platform, Custom, or imported image for worker nodes.
    type: enum
    enum: [Custom]
    required: true
    visible: false
  worker_ops_image_use_uri:
    title: Import custom image from URI
    type: boolean
  worker_ops_image_custom_uri:
    title: Image URI
    type: string
    visible:
      and:
        - eq: [worker_ops_image_type, Custom]
        - ${worker_ops_image_use_uri}
  worker_ops_image_compartment:
    title: "Operational worker pool image compartment"
    type: oci:identity:compartment:id
    required: true
    default: ${compartment_ocid}
    visible:
      and:
        - eq: [worker_ops_image_type, Custom]
        - not: [worker_ops_image_use_uri]
  worker_ops_image_custom_id:
    title: Image
    type: oci:core:image:id
    required: true
    dependsOn:
      compartmentId: ${worker_ops_image_compartment}
    visible:
      and:
        - eq: [worker_ops_image_type, Custom]
        - not: [worker_ops_image_use_uri]
  worker_ops_image_os:
    title: Operating system
    type: enum
    default: "Ubuntu"
    enum: ["Ubuntu"]
    required: true
    visible:
      or:
        - eq: [worker_ops_image_type, OKE]
        - eq: [worker_ops_image_type, Platform]
  worker_ops_image_os_version:
    title: Operating system version
    type: enum
    default: "22.04"
    enum: ["22.04"]
    required: true
    visible:
      or:
        - eq: [worker_ops_image_type, OKE]
        - eq: [worker_ops_image_type, Platform]
  worker_ops_image_platform_id:
    title: Image
    type: oci:core:image:id
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}
      operatingSystem: ${worker_ops_image_os}
      operatingSystemVersion: ${worker_ops_image_os_version}
    visible:
      eq: [worker_ops_image_type, Platform]
  worker_ops_kubernetes_version:
    title: Kubernetes version
    description: Kubernetes version for the system worker pool. Defaults to the cluster version.
    type: enum
    required: false
    default: ${kubernetes_version}
    enum:
      - "v1.35.2"
      - "v1.34.2"
      - "v1.33.10"
  worker_ops_secondary_vnic_enabled:
    title: Configure secondary VNIC for pod IPs
    description: Add a GVA secondary VNIC profile to the system node pool.
    type: boolean
    default: false
  worker_ops_secondary_vnic_subnet_cidr:
    title: Advanced secondary subnet range
    description: >-
      Hidden advanced Terraform input. The Resource Manager UI uses derived two-CIDR-block defaults for new VCNs, or an existing subnet selection for existing VCNs.
    type: string
    required: false
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-2]?[0-9])|(?:3[0-2])$"
    visible: false
  worker_ops_secondary_vnic_subnet_id:
    title: Existing secondary VNIC subnet
    description: >-
      For an existing VCN, select a subnet for the system pool secondary VNIC. The subnet should already have two IPv4 CIDR blocks: a smaller first block for normal VNIC private IPs and a larger second block for private IP CIDR allocation. Leave blank when creating a new VCN so Terraform creates the default two-CIDR-block subnet.
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
        - ${worker_ops_secondary_vnic_enabled}
        - { not: [create_vcn] }
  worker_ops_secondary_vnic_ip_count:
    title: Pod IPs per secondary VNIC
    description: Number of pod IPs allocated on each secondary VNIC.
    type: enum
    enum: [1, 2, 4, 8, 16, 32, 64, 128, 256]
    default: 32
    visible: ${worker_ops_secondary_vnic_enabled}
  worker_ops_max_pods_per_node:
    title: Maximum pods per node
    description: Kubelet maximum pods per system node. Tune this with the secondary VNIC pod IP count.
    type: integer
    minimum: 1
    maximum: 110
    default: 110
    visible: ${worker_ops_secondary_vnic_enabled}
  worker_ops_secondary_vnic_nsg_ids:
    title: Secondary VNIC NSG OCIDs
    description: Optional network security group OCIDs to attach to the system pool secondary VNIC.
    type: array
    items:
      type: string
    unique_items: true
    minItems: 0
    visible: ${worker_ops_secondary_vnic_enabled}

