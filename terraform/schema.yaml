      - bastion_nsg_id
      - bastion_public_ip
      - bastion_ssh_command
      - bastion_image_type
      - bastion_image_id
      - bastion_image_os
      - bastion_image_os_version
      - bastion_ssh_user
      - bastion_ssh_secret_id

  - title: Bastion Service
    outputs:
      - bastion_service_id
      - bastion_service_subnet_id
      - bastion_service_subnet_cidr
      - oke_private_endpoint_ip
      - bastion_service_session_command
      - bastion_service_worker_ssh_command

  - title: Operator instance
    outputs:
      - operator_id
      - operator_subnet_id
      - operator_subnet_cidr
      - operator_nsg_id
      - operator_private_ip
      - operator_ssh_command
      - operator_image_type
      - operator_image_id
      - operator_image_os
      - operator_image_os_version
      - operator_ssh_user

#  - title: File Storage Service (FSS)
