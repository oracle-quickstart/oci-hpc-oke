    title: CPU worker node pool OCID
    type: ocid
    visible: ${worker_cpu_enabled}
  worker_gpu_pool_id:
    title: GPU worker node pool OCID
    type: ocid
    visible: worker_gpu_enabled
  worker_rdma_pool_id:
    title: RDMA worker node pool OCID
    type: ocid
    visible: ${worker_rdma_enabled}

  # Pods
  pod_subnet_id:
    title: Subnet
    type: ocid
    visible: false
  pod_subnet_cidr:
    title: Subnet CIDR
    type: string
    visible: false
  pod_nsg_id:
    title: Network security group
    type: ocid
    visible: false

  # Slurm Operator
  slinky_openldap_admin_password:
    title: OpenLDAP adminPassword
    type: copyableString
    sensitive: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_identity_enabled}
  slinky_openldap_config_password:
    title: OpenLDAP configPassword
    type: copyableString
    sensitive: true
    visible:
      and:
        - ${install_slinky}
        - ${slinky_identity_enabled}

  # Monitoring
  grafana_url:
      title: Grafana URL
      type: string
      visible:
        and:
        - install_node_problem_detector_kube_prometheus_stack
  grafana_fetch_endpoint_command:
      title: Command to get the Grafana endpoint
      type: string
      visible:
        and:
        - install_node_problem_detector_kube_prometheus_stack
  grafana_admin_username:
    title: Grafana admin username
    type: copyableString
    default: "admin"
    visible:
      and:
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana
  grafana_admin_password:
    title: Grafana admin password
    type: copyableString
    visible:
      and:
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana
  grafana_port_forward:
     title: Grafana port forward command
     visible:
       and:
       - install_node_problem_detector_kube_prometheus_stack
       - install_grafana
  prom_server_port_forward:
      title: Prometheus server port forward command
      type: string
      visible:
        and:
        - install_node_problem_detector_kube_prometheus_stack
  prometheus_stack_chart_version:
      title: Prometheus stack chart version
      type: string
      visible: false
