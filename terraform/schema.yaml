  cp_sn_cidr:
    title: Subnet CIDR for the OKE control plane subnet
    description: CIDR subnet to use for the OKE control plane subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  workers_sn_cidr:
    title: Subnet CIDR for the workers subnet
    description: CIDR subnet to use for the workers subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  pods_sn_cidr:
    title: Subnet CIDR for the pods subnet
    description: CIDR subnet to use for the pods subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  fss_sn_cidr:
    title: Subnet CIDR for the FSS subnet
    description: CIDR subnet to use for the FSS subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  lustre_sn_cidr:
    title: Subnet CIDR for the Lustre subnet
    description: CIDR subnet to use for the Lustre subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  private_subnet_route_table:
    title: OCID of the route table to be used with the private subnets
    description: If not provided, a new NAT GW and Service GW will be created.
    type: string
    required: false
    visible:
      and:
      - { not: [create_vcn] }
      - { not: [custom_subnet_ids] }
      - networking_advanced_options
  public_subnet_route_table:
    title: OCID of the route table to be used with the public subnets
    description: If not provided, a new Internet GW will be created.
    type: string
    required: false
    visible:
      and:
      - { not: [create_vcn] }
      - { not: [custom_subnet_ids] }
      - networking_advanced_options
  vcn_name:
    title: Virtual Cloud Network (VCN) name
    description: Display name for the created VCN. Defaults to 'oke' suffixed with the generated Terraform 'state_id' value.
    type: string
    required: true
    visible: ${create_vcn}
  vcn_cidrs:
    title: VCN CIDR ranges
    description: Comma-separated list of CIDR blocks for the created VCN.
    type: string
    required: true
    visible: ${create_vcn}
  create_public_subnets:
    title: Create public subnets
    description: Whether to create public subnets to host Internet-addressable resources.
    type: boolean
    default: true
    visible: ${create_vcn}

  # Bastion
  create_bastion:
    title: Create bastion instance
    type: boolean
    description: Create a Compute instance for public SSH access to VCN.
    default: true
    visible: true
  bastion_is_public:
    title: Create the bastion in a public subnet
    type: boolean
    visible: false
  bastion_allowed_cidrs:
    title: Bastion allowed CIDRs
    description: List of CIDR ranges for allowed SSH communication to the bastion instance.
    required: false
    type: array
    items:
      type: string
      pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-2]?[0-9])|(?:3[0-2])$"
    unique_items: true
    minItems: 0
    visible:
      and:
      - create_bastion
  bastion_shape_config:
    title: Configure bastion instance shape
    type: boolean
    default: false
    required: false
    visible:
      and:
      - create_bastion
  bastion_shape_name:
    title: Bastion instance shape
    type: oci:core:instanceshape:name
    pattern: "^(VM|BM)\\.Standard.*$"
    required: true
    visible:
      and:
      - create_bastion
      - bastion_shape_config
    dependsOn:
      compartmentId: ${compartment_ocid}
  bastion_shape_ocpus:
    title: Bastion OCPUs
    type: integer
    required: true
    default: 1
    minimum: 1
    maximum: 64
    visible:
      and:
      - create_bastion
      - bastion_shape_config
      - or:
          - eq: [bastion_shape_name, "VM.Standard3.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.A1.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.A2.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.E4.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.E5.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.E6.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.x86.Generic"]
          - eq: [bastion_shape_name, "VM.Standard.AMD.Generic"]
          - eq: [bastion_shape_name, "VM.Standard.Ampere.Generic"]
          - eq: [bastion_shape_name, "VM.Standard.Intel.Generic"]
  bastion_shape_memory:
    title: Bastion Memory (GB)
    type: integer
    required: true
    default: 8
    visible:
      and:
      - create_bastion
      - bastion_shape_config
      - or:
          - eq: [bastion_shape_name, "VM.Standard3.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.A1.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.A2.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.E4.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.E5.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.E6.Flex"]
          - eq: [bastion_shape_name, "VM.Standard.x86.Generic"]
          - eq: [bastion_shape_name, "VM.Standard.AMD.Generic"]
          - eq: [bastion_shape_name, "VM.Standard.Ampere.Generic"]
          - eq: [bastion_shape_name, "VM.Standard.Intel.Generic"]
          - eq: [bastion_shape_name, "VM.Standard.E3.Flex"]
  bastion_image_type:
    title: Bastion image type
    description: Use the latest platform image for the selected OS and version, select an image OCID, or import a custom image from an Object Storage URI.
    type: enum
    default: Platform
    enum: [Platform, Custom]
    required: true
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}
  bastion_image_os:
    title: Bastion operating system
    type: enum
    default: "Canonical Ubuntu"
    enum: ["Canonical Ubuntu"]
    required: true
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}
        - eq: [bastion_image_type, Platform]
  bastion_image_os_version:
    title: Bastion operating system version
    type: enum
    default: "22.04"
    enum: ["22.04", "24.04"]
    required: true
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}
        - eq: [bastion_image_type, Platform]
  bastion_image_use_uri:
    title: Import custom image from URI
    type: boolean
    default: false
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}
        - eq: [bastion_image_type, Custom]
  bastion_image_custom_uri:
    title: Bastion image URI
    type: string
    pattern: "^(http|https)://.+"
    required: true
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}
        - eq: [bastion_image_type, Custom]
        - ${bastion_image_use_uri}
  bastion_image_compartment:
    title: Bastion image compartment
    type: oci:identity:compartment:id
    required: true
    default: ${compartment_ocid}
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}
        - eq: [bastion_image_type, Custom]
        - not: [bastion_image_use_uri]
  bastion_image_id:
    title: Bastion image
    type: oci:core:image:id
    required: true
    dependsOn:
      compartmentId: ${bastion_image_compartment}
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}
        - eq: [bastion_image_type, Custom]
        - not: [bastion_image_use_uri]
  bastion_user:
    title: Bastion SSH user
    description: SSH user for the bastion image. Use auto to select opc for Oracle Linux images and ubuntu for all other images, or override with your own username.
    type: string
    pattern: "^(auto|AUTO|Auto|[a-z_][a-z0-9_-]{0,31})$"
    required: true
    default: "auto"
    visible:
      and:
        - ${create_bastion}
        - ${bastion_shape_config}

  # Bastion Service
  create_oci_bastion_service:
    title: Use OCI Bastion Service
    type: boolean
    description: Create an OCI Bastion service in a dedicated subnet for private endpoint access.
    default: false
  bastion_service_allowed_cidrs:
    title: Bastion service CIDR allowlist
    description: CIDR ranges allowed to initiate OCI Bastion sessions.
    required: true
    type: array
    items:
      type: string
      pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-2]?[0-9])|(?:3[0-2])$"
    unique_items: true
    minItems: 1
    default: ["0.0.0.0/0"]
    visible: ${create_oci_bastion_service}
  bastion_service_allow_worker_ssh:
    title: Allow SSH access to worker nodes via OCI Bastion Service
    type: boolean
    description: Add security list rules to allow SSH connections from the bastion service subnet to worker nodes. Enable this to use the bastion service worker SSH command.
    default: false
    visible: ${create_oci_bastion_service}
  bastion_service_max_session_ttl:
    title: Bastion service max session TTL
    type: integer
    visible: false

  # Operator
  create_operator:
    title: Create operator instance
    description: Provision an OCI Compute instance configured with access to interact with the OKE Kubernetes endpoint.
    type: boolean
    default: true
    required: false
    visible: true
  operator_shape_config:
    title: Configure operator instance shape
    type: boolean
    default: false
    required: false
    visible:
      and:
      - create_operator
  operator_shape_name:
    title: Shape
    type: oci:core:instanceshape:name
    pattern: "^(VM|BM)\\.(?!GPU).*$"
    required: true
    visible:
      and:
      - create_operator
      - operator_shape_config
    dependsOn:
      compartmentId: ${compartment_ocid}
  operator_shape_ocpus:
    title: OCPUs
    type: integer
    required: true
    default: 1
    visible:
      and:
      - create_operator
      - operator_shape_config
      - or:
          - eq: [operator_shape_name, "VM.Standard3.Flex"]
          - eq: [operator_shape_name, "VM.Standard.A1.Flex"]
          - eq: [operator_shape_name, "VM.Standard.A2.Flex"]
          - eq: [operator_shape_name, "VM.Standard.E4.Flex"]
          - eq: [operator_shape_name, "VM.Standard.E5.Flex"]
          - eq: [operator_shape_name, "VM.Standard.E6.Flex"]
          - eq: [operator_shape_name, "VM.Standard.x86.Generic"]
          - eq: [operator_shape_name, "VM.Standard.AMD.Generic"]
          - eq: [operator_shape_name, "VM.Standard.Ampere.Generic"]
          - eq: [operator_shape_name, "VM.Standard.Intel.Generic"]
          - eq: [operator_shape_name, "VM.Standard.E3.Flex"]
          - eq: [operator_shape_name, "VM.Optimized3.Flex"]

  operator_shape_ocpus_denseIO_e4_flex:
    title: OCPUs
    type: enum
    description: Number of OCPUs for Dense IO E4 Flex shape
    required: true
    enum:
      - 8
      - 16
      - 32
    default: 8
    visible:
      and:
      - create_operator
      - operator_shape_config
      - or:
          - eq: [operator_shape_name, "VM.DenseIO.E4.Flex"]

  operator_shape_ocpus_denseIO_e5_flex:
    title: OCPUs
    type: enum
    description: Number of OCPUs for Dense IO E5 Flex shape
    required: true
    enum:
      - 8
      - 16
      - 24
      - 32
      - 40
      - 48
    default: 8
    visible:
      and:
      - create_operator
      - operator_shape_config
      - or:
          - eq: [operator_shape_name, "VM.DenseIO.E5.Flex"]

  operator_shape_memory:
    title: Memory (GB)
    type: integer
    required: true
    default: 8
    visible:
      and:
      - create_operator
      - operator_shape_config
      - or:
          - eq: [operator_shape_name, "VM.Standard3.Flex"]
          - eq: [operator_shape_name, "VM.Standard.A1.Flex"]
          - eq: [operator_shape_name, "VM.Standard.A2.Flex"]
          - eq: [operator_shape_name, "VM.Standard.E4.Flex"]
          - eq: [operator_shape_name, "VM.Standard.E5.Flex"]
          - eq: [operator_shape_name, "VM.Standard.E6.Flex"]
          - eq: [operator_shape_name, "VM.Standard.x86.Generic"]
          - eq: [operator_shape_name, "VM.Standard.AMD.Generic"]
          - eq: [operator_shape_name, "VM.Standard.Ampere.Generic"]
          - eq: [operator_shape_name, "VM.Standard.Intel.Generic"]
          - eq: [operator_shape_name, "VM.Standard.E3.Flex"]
          - eq: [operator_shape_name, "VM.Optimized3.Flex"]
  operator_shape_boot:
    title: Boot volume size (GB)
    type: integer
    required: true
    visible:
      and:
      - create_operator
      - operator_shape_config
  operator_image_type:
    title: Operator image type
    description: Use the latest platform image for the selected OS and version, select an image OCID, or import a custom image from an Object Storage URI.
    type: enum
    default: Platform
    enum: [Platform, Custom]
    required: true
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}
  operator_image_os:
    title: Operator operating system
    type: enum
    default: "Canonical Ubuntu"
    enum: ["Canonical Ubuntu"]
    required: true
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}
        - eq: [operator_image_type, Platform]
  operator_image_os_version:
    title: Operator operating system version
    type: enum
    default: "22.04"
    enum: ["22.04", "24.04"]
    required: true
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}
        - eq: [operator_image_type, Platform]
  operator_image_use_uri:
    title: Import custom image from URI
    type: boolean
    default: false
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}
        - eq: [operator_image_type, Custom]
  operator_allow_image_drift:
    title: Allow operator image drift
    type: boolean
    default: true
    visible: false
  operator_image_custom_uri:
    title: Operator image URI
    type: string
    pattern: "^(http|https)://.+"
    required: true
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}
        - eq: [operator_image_type, Custom]
        - ${operator_image_use_uri}
  operator_image_compartment:
    title: Operator image compartment
    type: oci:identity:compartment:id
    required: true
    default: ${compartment_ocid}
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}
        - eq: [operator_image_type, Custom]
        - not: [operator_image_use_uri]
  operator_image_id:
    title: Operator image
    type: oci:core:image:id
    required: true
    dependsOn:
      compartmentId: ${operator_image_compartment}
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}
        - eq: [operator_image_type, Custom]
        - not: [operator_image_use_uri]
  operator_user:
    title: Operator SSH user
    description: SSH user for the operator image. Use auto to select opc for Oracle Linux images and ubuntu for all other images, or override with your own username.
    type: string
    pattern: "^(auto|AUTO|Auto|[a-z_][a-z0-9_-]{0,31})$"
    required: true
    default: "auto"
    visible:
      and:
        - ${create_operator}
        - ${operator_shape_config}

  # Storage
  create_fss:
    title: Create a File Storage Service (FSS) file system
    description: Provision a shared File Storage Service (FSS) file system, mount target, and PersistentVolume. This is also enabled automatically when Slurm Operator full suite uses the default FSS-backed home directory.
    type: boolean
    default: true
    required: true
  fss_ad:
    title: FSS availability domain
    type: oci:identity:availabilitydomain:name
    required: true
    default: worker_ops_ad
    visible: ${create_fss}
    dependsOn:
      compartmentId: ${compartment_ocid}
  fss_mount_path:
    title: FSS mount point
    type: string
    default: "/mnt/oci-fss"
    required: true
    visible: ${create_fss}
  nvme_raid_enabled:
    type: boolean
    title: Create a RAID array using local NVMe drives
    description: If the instance has local NVMe drives, create a RAID 10 or 0 array with bind mounts for container runtime (/var/lib/containers), Kubelet ephemeral storage (/var/lib/kubelet), and logs (/var/log/pods).
    default: true
  nvme_raid_level:
    title: RAID Level
    type: enum
    default: "10"
    enum: ["0", "10"]
    required: true
    visible: nvme_raid_enabled
  create_lustre:
    title: Create a File Storage with Lustre file system
    description: Provision a shared Lustre file system and a PV backed by the Lustre file system. The OS images used for the worker nodes must have the Lustre client installed.
    type: boolean
    default: false
    required: true
    visible: true
  create_lustre_pv:
    title: Create Lustre PV
    description: Create a Kubernetes PersistentVolume backed by the Lustre file system.
    type: boolean
    default: true
    required: true
    visible: ${create_lustre}
  lustre_ad:
    title: Availability domain
    type: oci:identity:availabilitydomain:name
    required: ${create_lustre}
    default: ${worker_ops_ad}
    visible: ${create_lustre}
    dependsOn:
      compartmentId: ${compartment_ocid}
  lustre_size_in_tb:
    title: Lustre file system size in TB
    description: Starting from minimum 31.2 TB, increment step must be 10.4 TB when the capacity is less than or equal to 124.8 TB. Increment step must be 41.6 TB when the capacity is greater than 124.8 TB.
    type: number
    minimum: 31.2
    default: 31.2
    multipleOf: 10.4
    required: ${create_lustre}
    visible: ${create_lustre}
  lustre_performance_tier:
    title: Lustre Performance Tier
    description: Specify the performance tier for the Lustre file system [MB/s/TB].
    type: enum
    enum: [125, 250, 500, 1000]
    default: 125
    required: ${create_lustre}
    visible: ${create_lustre}
  lustre_mount_path:
    title: Lustre mount path
    type: string
    default: "/mnt/oci-lustre"
    description: Local directory where the Lustre file system will be mounted on worker nodes.
    required: ${create_lustre}
    visible: ${create_lustre}

  # Monitoring
  install_monitoring:
    type: boolean
    title: Install Monitoring Stack
    description: Install the Prometheus stack with Grafana, NVIDIA DCGM Exporter, Node Problem Detector, and AMD device metrics exporter.
    default: true
    visible: true
  monitoring_advanced_options:
    title: Advanced options
    type: boolean
    default: false
    required: false
    visible: true
  monitoring_namespace:
    title: Monitoring namespace
    description: The Kubernetes namespace for cluster monitoring resources.
    default: "monitoring"
    type: string
    pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
    required: true
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
  install_node_problem_detector_kube_prometheus_stack:
    type: boolean
    title: Install Node Problem Detector & Kube Prometheus Stack
    description: Install Node Problem Detector with the Kubernetes Prometheus stack to run GPU & RDMA health checks and use automated alerting in Grafana.
    default: true
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
  nvidia_gpu_operator_configuration:
    title: NVIDIA GPU Operator add-on advanced configurations
    type: map(string)
    description: Additional configuration key-value pairs for the NVIDIA GPU Operator OKE add-on.
    visible: false
  install_amd_device_metrics_exporter:
    title: Install AMD Device Metrics Exporter
    type: boolean
    required: true
    default: ${install_monitoring}
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
  amd_device_metrics_exporter_chart_version:
    title: AMD Device Metrics Exporter chart version
    type: string
    required: true
    default: "v1.5.0"
    visible: false
      # and:
      # - monitoring_advanced_options
      # - install_amd_device_metrics_exporter
  node_problem_detector_chart_version:
    title: Node Problem Detector chart version
    type: string
    required: true
    default: "2.4.1"
    visible: false
      # and:
      # - monitoring_advanced_options
      # - install_node_problem_detector
  prometheus_stack_chart_version:
    title: Prometheus stack chart version
    type: string
    required: true
    default: "87.2.1"
    visible: false
      # and:
      # - monitoring_advanced_options
      # - install_amd_device_metrics_exporter
  ingress_chart_version:
    title: Ingress Controller helm chart version
    type: string
    required: true
    default: "0.6.0"
    visible: false
      # and:
      # - monitoring_advanced_options
      # - install_amd_device_metrics_exporter
  install_grafana:
    title: Grafana
    description: Install Grafana
    type: boolean
    required: true
    default: ${install_monitoring}
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
      - install_node_problem_detector_kube_prometheus_stack
  install_grafana_dashboards:
    title: Grafana dashboards
    description: Install Grafana dashboards
    type: boolean
    required: true
    default: ${install_monitoring}
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana
  setup_oci_metrics_exporter:
    title: Install OCI Metrics Exporter
    description: Deploy OCI Metrics Exporter to enable ingestion of OCI metrics into Prometheus.
    type: boolean
    required: true
    default: ${install_monitoring}
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana
  use_lets_encrypt_prod_endpoint:
    title: Use Let's Encrypt production endpoint
    description: Use Let's Encrypt production endpoint instead of staging.
    type: boolean
    default: true
    required: false
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana
      - create_public_subnets
  setup_alerting:
    title: Enable Grafana Alerting
    description: Configure Grafana to send notifications to an OCI Notification Topic.
    type: boolean
    required: true
    default: ${install_monitoring}
    visible:
      and:
      - install_monitoring
      - monitoring_advanced_options
      - install_node_problem_detector_kube_prometheus_stack
      - install_grafana
  avoid_waiting_for_delete_target:
    type: boolean
    title: Accelerate Oracle Notifications Service (ONS) topic deletion on stack destroy
    description: Terminate the topic asynchronously. Don't wait for 15 minutes until the topic is deleted. Supported only via Resource Manager.
    default: true
    visible:
      and:
        - install_monitoring
        - install_node_problem_detector_kube_prometheus_stack
        - setup_alerting
  deploy_to_oke_from_orm:
      title: Securely deploy the monitoring stack via ORM Private Endpoint.
      description: It's <strong>necessary to enable</strong> this option for <strong>clusters without a public endpoint</strong>. More details about <a href='https://docs.oracle.com/en-us/iaas/Content/ResourceManager/Tasks/private-endpoints.htm'>private endpoints</a>.
      visible:
        and:
        - or:
          - orm_create_mode
          - install_monitoring
        - not:
          - create_bastion
          - create_operator
      type: boolean
      required: true
      default: true

  # OKE Cluster Setup
  cluster_name:
    type: string
    title: Cluster name prefix
    description: The Container Engine for Kubernetes cluster name.
    required: true
  kubernetes_version:
    type: enum
    title: Kubernetes version
    description: The Kubernetes version for the created OKE cluster and managed nodes.
    required: true
    default: "v1.35.2"
    enum:
      - "v1.35.2"
      - "v1.34.2"
      - "v1.33.10"
  control_plane_allowed_cidrs:
    title: Kubernetes endpoint allowed CIDRs
    description: List of CIDR ranges for allowed Kubernetes endpoint communication.
    required: false
    type: array
    items:
      type: string
      pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:[0-2]?[0-9])|(?:3[0-2])$"
    unique_items: true
    minItems: 0
  cni_type:
    title: CNI to use for pod networking
    description: CNI plugin to be used for pod communication on worker nodes.
    required: true
    type: enum
    enum:
    - VCN-Native Pod Networking
    - Flannel
    default: VCN-Native Pod Networking
  control_plane_is_public:
    title: Create the Kubernetes control plane endpoint in a public subnet and assign it a public IP address
    type: boolean
    default: true
    visible: true
  max_pods_per_node:
    title: Maximum number of pods per node
    description: The default maximum number of pods to deploy per node when unspecified on a pool.
    type: number
    visible: false
  services_cidr:
    title: Services CIDR
    description: CIDR block for Kubernetes services.
    type: string
    default: "10.96.0.0/16"
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
  preferred_kubernetes_services:
    type: enum
    enum:
    - internal
    - public
    default: public
    title: Preferred Load Balancer kind
    description: The kind of load balancers that should be provisioned by default for services of type Load Balancer.
    required: true
  setup_credential_provider_for_ocir:
    title: Install Image Credential Provider for Container Registry (OCIR)
    description: Install the image credential provider so OKE worker nodes can authenticate with OCIR using instance principal authentication. If Create Policies is disabled, create a policy that allows worker nodes to read repositories in the compartment.
    type: boolean
    default: true

  disable_gpu_device_plugin:
    title: Disable OKE GPU device plugin
    type: boolean
    description: Disable the NVIDIA GPU device plugin that is deployed by OKE. This is required if you want to use the NVIDIA GPU Operator to deploy the GPU device plugin.
    default: false
    visible: false
  deploy_node_feature_discovery:
    title: Install Node Feature Discovery add-on
    type: boolean
    description: Install the Node Feature Discovery OKE add-on. This is a prerequisite for NVIDIA GPU Operator and Network Operator add-ons.
    default: true
  deploy_nvidia_gpu_operator:
    title: Install NVIDIA GPU Operator add-on
    type: boolean
    description: Install the NVIDIA GPU Operator OKE add-on. Requires the Node Feature Discovery add-on.
    default: true
    visible:
      - deploy_node_feature_discovery
  nvidia_gpu_operator_advanced_options:
    title: NVIDIA GPU Operator advanced options
    type: boolean
    description: Show advanced NVIDIA GPU Operator configuration options.
    default: false
    required: false
    visible:
      - deploy_nvidia_gpu_operator
  nvidia_gpu_operator_addon_version:
    title: NVIDIA GPU Operator add-on version
    type: enum
    description: Version of the NVIDIA GPU Operator OKE add-on.
    default: "v25.10.1"
    required: true
    enum:
      - "v25.10.1"
      - "v25.3.4"
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
  nvidia_gpu_operator_disable_plugin:
    title: Disable NVIDIA GPU plugin in NVIDIA GPU Operator
    type: boolean
    description: Disable the NVIDIA GPU plugin when using the NVIDIA GPU Operator add-on.
    default: true
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
  nvidia_gpu_operator_cdi_enabled:
    title: Enable CDI in NVIDIA GPU Operator
    type: boolean
    description: Enable CDI (Container Device Interface) in the NVIDIA GPU Operator add-on.
    default: true
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
  nvidia_gpu_operator_cdi_default:
    title: Use CDI as the default device-injection mode
    type: boolean
    description: Set cdi.default in the NVIDIA GPU Operator add-on. Requires CDI enabled and a CDI-capable device list strategy (cdi-cri); otherwise GPU pods fail with "unresolvable CDI devices".
    default: true
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
      - nvidia_gpu_operator_cdi_enabled
  nvidia_gpu_operator_device_list_strategy:
    title: Device plugin DEVICE_LIST_STRATEGY
    type: enum
    description: DEVICE_LIST_STRATEGY for the NVIDIA device plugin. cdi-cri (the default) makes the device plugin generate the workload CDI spec and pass devices via CRI, required when CDI is enabled. envvar passes bare GPU UUIDs and is incompatible with CDI mode.
    default: cdi-cri
    enum:
      - envvar
      - cdi-cri
      - cdi-annotations
      - volume-mounts
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
  nvidia_gpu_operator_toolkit_enabled:
    title: Enable NVIDIA toolkit in NVIDIA GPU Operator
    type: boolean
    description: Enable the NVIDIA container toolkit in the NVIDIA GPU Operator add-on.
    default: true
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
  nvidia_gpu_operator_skip_nfd_dependency_check:
    title: Skip NFD dependency check in NVIDIA GPU Operator
    type: boolean
    description: Skip the Node Feature Discovery dependency check in the NVIDIA GPU Operator add-on.
    default: true
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
  nvidia_gpu_operator_mig_manager_enabled:
    title: Enable MIG Manager in NVIDIA GPU Operator
    type: boolean
    description: Enable the NVIDIA MIG Manager in the NVIDIA GPU Operator add-on.
    default: false
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
  nvidia_gpu_operator_mig_strategy:
    title: MIG strategy
    type: enum
    description: MIG strategy for GFD and Device Plugin.
    default: single
    enum:
      - none
      - single
      - mixed
    visible:
      and:
      - deploy_nvidia_gpu_operator
      - nvidia_gpu_operator_advanced_options
      - nvidia_gpu_operator_mig_manager_enabled

