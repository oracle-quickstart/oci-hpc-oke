      - worker_gpu_pool_id
      - worker_gpu_image_id
      - worker_rdma_pool_id
      - worker_rdma_image_id

  - title: Slurm Operator
    outputs:
      - slinky_openldap_admin_password
      - slinky_openldap_config_password

  - title: Monitoring
    outputs:
      - grafana_url
      - grafana_admin_username
      - grafana_admin_password
      - grafana_port_forward
      - grafana_fetch_endpoint_command
      - prom_server_port_forward
      - prom_pushgateway_port_forward
      - prom_pushgateway_port_forward
      - prometheus_pushgateway_version
      - prometheus_adapter_version
      - metrics_server_version
      - dcgm_exporter_version

outputs:
  # Terraform
  state_id:
    title: State ID
    type: copyableString
  stack_version:
    title: Stack Version
    type: copyableString

  # Network
  vcn_id:
    title: VCN
    type: ocid
  vcn_name:
    title: VCN name
    type: string
  ig_route_table_id:
    title: Internet gateway route table
    type: ocid
  nat_route_table_id:
    title: NAT gateway route table
    type: ocid
  subnet_cidrs:
    visible: false
  subnet_ids:
    visible: false
  network_security_rules:
    visible: false

  # Bastion
  bastion_id:
    title: Bastion instance OCID
    type: ocid
  bastion_subnet_id:
    title: Bastion subnet OCID
    type: ocid
  bastion_subnet_cidr:
    title: Bastion subnet CIDR
    type: string
  bastion_nsg_id:
    title: Bastion network security group OCID
    type: ocid
  bastion_public_ip:
    title: Bastion public IP address
    type: copyableString
  bastion_ssh_command:
    title: Bastion SSH command
    type: copyableString
  bastion_image_type:
    title: Bastion image type
    type: string
  bastion_image_id:
    title: Bastion image OCID
    type: ocid
  bastion_image_os:
    title: Bastion image operating system
    type: string
  bastion_image_os_version:
    title: Bastion image operating system version
    type: string
  bastion_ssh_user:
    title: Bastion SSH user
    type: string

# Bastion Service
  bastion_service_id:
    title: Bastion service
    type: ocid
  bastion_service_subnet_id:
    title: Bastion service subnet
    type: ocid
  bastion_service_subnet_cidr:
    title: Bastion service subnet CIDR
    type: string
  oke_private_endpoint_ip:
    title: OKE private endpoint IP
    type: string
  bastion_service_session_command:
    title: Bastion service Kubernetes endpoint session command
    type: copyableString
  bastion_service_worker_ssh_command:
    title: Bastion service worker SSH command
    type: copyableString

  # Operator
  operator_id:
    title: Operator instance OCID
    type: ocid
  operator_subnet_id:
    title: Operator subnet OCID
    type: ocid
  operator_subnet_cidr:
    title: Operator subnet CIDR
    type: string
  operator_nsg_id:
    title: Operator network security group OCID
    type: ocid
  operator_private_ip:
    title: Operator private IP address
    type: copyableString
  operator_ssh_command:
    title: Operator SSH command
    type: copyableString
  operator_image_type:
    title: Operator image type
    type: string
  operator_image_id:
    title: Operator image OCID
    type: ocid
  operator_image_os:
    title: Operator image operating system
    type: string
  operator_image_os_version:
    title: Operator image operating system version
    type: string
  operator_ssh_user:
    title: Operator SSH user
    type: string

  # Cluster
  cluster_id:
    title: Cluster ID
    type: ocid
  cluster_name:
    title: Cluster name
    type: string
  cluster_public_endpoint:
    title: Public endpoint
    type: copyableString
  cluster_private_endpoint:
    title: Private endpoint
    type: copyableString
  control_plane_subnet_id:
    title: Subnet
    type: ocid
  control_plane_subnet_cidr:
    title: Subnet CIDR
    type: string
  control_plane_nsg_id:
    title: Network security group
    type: ocid
  access_k8s_public_endpoint:
    title: OCI CLI command to access the kubeconfig for your cluster via the public endpoint
    type: copyableString
  access_k8s_private_endpoint:
