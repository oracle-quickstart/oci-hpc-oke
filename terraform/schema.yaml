variables:
  # Injected by ORM
  current_user_ocid:
    title: User
    type: ocid
  tenancy_ocid:
    title: Tenancy
    type: oci:identity:compartment:id
    required: true
  compartment_ocid:
    title: Compartment
    description: The default compartment for created resources.
    type: oci:identity:compartment:id
    required: true
  region:
    required: true
    title: Region
    type: oci:identity:region:name

  # Provider auth variables
  oci_auth:
    default: null
  oci_profile:
    default: null

  # Identity
  create_policies:
    title: Create Policies
    description: "Create IAM policies for Cluster Autoscaler, Self-managed nodes, etc. This option assumes your user has the necessary permissions to create policies in the compartment."
    type: boolean
    default: true
  create_dynamic_group:
    title: Create Dynamic Group
    description: "Create a new Dynamic Group for OKE resources. This option assumes your user has the necessary permissions to create a dynamic group."
    type: boolean
    default: true
    visible:
      not:
        - use_existing_dynamic_group
  use_existing_dynamic_group:
    title: Use existing Dynamic Group
    description: "Select an existing dynamic group instead of creating a new one."
    type: boolean
    default: false
  dynamic_group_id:
    title: Dynamic Group
    description: "Select an existing dynamic group."
    type: oci:identity:dynamicgroups:id
    required: true
    default: ""
    dependsOn:
      compartmentId: tenancy_ocid
    visible:
      and:
        - use_existing_dynamic_group
        - use_default_identity_domain
  use_default_identity_domain:
    title: Use the Default Identity Domain
    description: "Use the default identity domain of the tenancy. Disable to select a different identity domain."
    type: boolean
    default: true
    visible:
      or:
        - create_policies
        - create_dynamic_group
  identity_domain_compartment_id:
    title: Identity Domain Compartment
    description: "Select the compartment where your identity domain is located."
    type: oci:identity:compartment:id
    required: true
    default: ${tenancy_ocid}
    visible:
      not:
        - use_default_identity_domain
  identity_domain_id:
    title: Identity Domain
    description: "Select an identity domain."
    type: oci:identity:domains:id
    required: true
    dependsOn:
      compartmentId: identity_domain_compartment_id
    visible:
      not:
        - use_default_identity_domain
  dynamic_group_id_input:
    title: Dynamic Group OCID
    description: "Paste the OCID of an existing dynamic group from the selected identity domain."
    type: string
    required: false
    pattern: "^ocid1\\.dynamicgroup\\..*$"
    visible:
      and:
        - use_existing_dynamic_group
        - not: [use_default_identity_domain]

  # VCN
  create_vcn:
    title: Create VCN
    type: boolean
    default: true
  vcn_compartment_ocid:
    title: VCN Compartment
    type: oci:identity:compartment:id
    required: false
    default: ${compartment_ocid}
    dependsOn:
      compartmentId: ${compartment_ocid}
    visible: { not: [create_vcn] }
  vcn_id:
    title: Existing VCN
    type: oci:core:vcn:id
    required: true
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
    visible: { not: [create_vcn] }
  networking_advanced_options:
    title: Subnets advanced settings
    type: boolean
    default: false
    required: false
  custom_subnet_ids:
    title: Select existing subnets
    type: boolean
    default: true
    required: false
    visible:
      and:
      - { not: [create_vcn] }
      - networking_advanced_options
  bastion_sn_id:
    title: Existing subnet to use for the bastion
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  bastion_service_sn_id:
    title: Existing subnet to use for the bastion service
    type: oci:core:subnet:id
    required: false
    description: "NOTE: When using custom_subnet_ids=true (existing subnet), attach the security list output `bastion_service_security_list_id` to your bastion-service subnet outside of this module."
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  operator_sn_id:
    title: Existing subnet to use for the operator
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  int_lb_sn_id:
    title: Existing subnet to use for the internal load balancers
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  pub_lb_sn_id:
    title: Existing subnet to use for the public load balancers
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  cp_sn_id:
    title: Existing subnet to use for the OKE control plane
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  workers_sn_id:
    title: Existing subnet to use for the worker nodes
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  pods_sn_id:
    title: Existing subnet to use for the pods
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  fss_sn_id:
    title: Existing subnet to use for the FSS
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  lustre_sn_id:
    title: Existing subnet to use for the Lustre File System
    type: oci:core:subnet:id
    required: false
    dependsOn:
      compartmentId: ${vcn_compartment_ocid}
      vcnId: ${vcn_id}
    visible:
      and:
      - { not: [create_vcn] }
      - custom_subnet_ids
      - networking_advanced_options
  bastion_sn_cidr:
    title: Subnet CIDR for the bastion subnet
    description: CIDR subnet to use for the bastion subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  bastion_service_sn_cidr:
    title: Subnet CIDR for the bastion service subnet
    description: CIDR subnet to use for the bastion service subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  operator_sn_cidr:
    title: Subnet CIDR for the operator subnet
    description: CIDR subnet to use for the operator subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
      - and:
        - { not: [create_vcn] }
        - { not: [custom_subnet_ids] }
        - networking_advanced_options
      - and:
        - create_vcn
        - networking_advanced_options
  int_lb_sn_cidr:
    title: Subnet CIDR for the internal load balancer subnet
    description: CIDR subnet to use for the internal load balancer subnet. If not provided a dynamic subnet will be created if required.
    type: string
    pattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\/(?:1[6-9])|(?:2[0-9])|(?:30)$"
    required: false
    visible:
      or:
