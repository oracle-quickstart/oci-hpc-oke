name: CI - Release (All Topologies)
# Triggered on pre-release: runs all ORM apply topologies in parallel.

on:
  release:
    types: [prereleased]

jobs:
  # ---------------------------------------------------------------------------
  # ORM apply — all topologies
  # ---------------------------------------------------------------------------
  orm-all-public-base:
    name: ORM / all-public-base-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: all-public-base-orm
    secrets: inherit

  orm-all-public-fss-monitoring:
    name: ORM / all-public-fss-monitoring-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: all-public-fss-monitoring-orm
    secrets: inherit

  orm-all-public-lustre:
    name: ORM / all-public-lustre-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: all-public-lustre-orm
    secrets: inherit

  orm-all-private-base:
    name: ORM / all-private-base-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: all-private-base-orm
    secrets: inherit

  orm-all-private-fss-monitoring:
    name: ORM / all-private-fss-monitoring-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: all-private-fss-monitoring-orm
    secrets: inherit

  orm-all-private-lustre:
    name: ORM / all-private-lustre-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: all-private-lustre-orm
    secrets: inherit
