name: CI - Release (All Topologies)
# Triggered on pre-release: runs all ORM and Terraform apply topologies in parallel.

on:
  release:
    types: [prereleased]

jobs:
  # ---------------------------------------------------------------------------
  # ORM apply — all topologies
  # ---------------------------------------------------------------------------
  orm-public-base:
    name: ORM / public-base-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-base-orm
    secrets: inherit

  orm-public-fss-monitoring:
    name: ORM / public-fss-monitoring-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-fss-monitoring-orm
    secrets: inherit

  orm-public-lustre:
    name: ORM / public-lustre-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-lustre-orm
    secrets: inherit

  orm-private-base:
    name: ORM / private-base-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-base-orm
    secrets: inherit

  orm-private-fss-monitoring:
    name: ORM / private-fss-monitoring-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-fss-monitoring-orm
    secrets: inherit

  orm-private-lustre:
    name: ORM / private-lustre-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-lustre-orm
    secrets: inherit

  orm-public-fss-lustre-monitoring:
    name: ORM / public-fss-lustre-monitoring-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-fss-lustre-monitoring-orm
    secrets: inherit

  orm-private-fss-lustre-monitoring:
    name: ORM / private-fss-lustre-monitoring-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-fss-lustre-monitoring-orm
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Terraform apply — all topologies
  # ---------------------------------------------------------------------------
  tf-public-base:
    name: TF / public-base-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-base-tf
    secrets: inherit

  tf-public-bastion-operator:
    name: TF / public-bastion-operator-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-bastion-operator-tf
    secrets: inherit

  tf-public-fss-monitoring:
    name: TF / public-fss-monitoring-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-fss-monitoring-tf
    secrets: inherit

  tf-public-lustre:
    name: TF / public-lustre-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-lustre-tf
    secrets: inherit

  tf-private-base:
    name: TF / private-base-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-base-tf
    secrets: inherit

  tf-private-bastion-operator:
    name: TF / private-bastion-operator-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-bastion-operator-tf
    secrets: inherit

  tf-private-fss-monitoring:
    name: TF / private-fss-monitoring-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-fss-monitoring-tf
    secrets: inherit

  tf-private-lustre:
    name: TF / private-lustre-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-lustre-tf
    secrets: inherit
