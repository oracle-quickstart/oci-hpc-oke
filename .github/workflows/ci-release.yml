name: CI - Release (All Topologies)
# Triggered on pre-release: runs all ORM and Terraform apply topologies.
# Runs 4 at a time, with at most 2 Lustre topologies per batch
# (Lustre capacity is limited in each region).

on:
  release:
    types: [prereleased]

jobs:
  # ---------------------------------------------------------------------------
  # Batch 1 — 2 non-Lustre + 2 Lustre
  # ---------------------------------------------------------------------------
  orm-public-base:
    name: ORM / public-base-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-base-orm
    secrets: inherit

  tf-public-base:
    name: TF / public-base-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-base-tf
    secrets: inherit

  orm-public-lustre:
    name: ORM / public-lustre-orm
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-lustre-orm
    secrets: inherit

  tf-public-lustre:
    name: TF / public-lustre-tf
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-lustre-tf
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Batch 2 — 2 non-Lustre + 2 Lustre
  # ---------------------------------------------------------------------------
  orm-public-fss-monitoring:
    name: ORM / public-fss-monitoring-orm
    if: always()
    needs: [orm-public-base, tf-public-base, orm-public-lustre, tf-public-lustre]
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-fss-monitoring-orm
    secrets: inherit

  tf-public-bastion-operator:
    name: TF / public-bastion-operator-tf
    if: always()
    needs: [orm-public-base, tf-public-base, orm-public-lustre, tf-public-lustre]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-bastion-operator-tf
    secrets: inherit

  orm-private-lustre:
    name: ORM / private-lustre-orm
    if: always()
    needs: [orm-public-base, tf-public-base, orm-public-lustre, tf-public-lustre]
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-lustre-orm
    secrets: inherit

  tf-private-lustre:
    name: TF / private-lustre-tf
    if: always()
    needs: [orm-public-base, tf-public-base, orm-public-lustre, tf-public-lustre]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-lustre-tf
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Batch 3 — 2 non-Lustre + 2 Lustre (fss-lustre-monitoring ORM)
  # ---------------------------------------------------------------------------
  orm-private-base:
    name: ORM / private-base-orm
    if: always()
    needs: [orm-public-fss-monitoring, tf-public-bastion-operator, orm-private-lustre, tf-private-lustre]
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-base-orm
    secrets: inherit

  tf-public-fss-monitoring:
    name: TF / public-fss-monitoring-tf
    if: always()
    needs: [orm-public-fss-monitoring, tf-public-bastion-operator, orm-private-lustre, tf-private-lustre]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-fss-monitoring-tf
    secrets: inherit

  orm-public-fss-lustre-monitoring:
    name: ORM / public-fss-lustre-monitoring-orm
    if: always()
    needs: [orm-public-fss-monitoring, tf-public-bastion-operator, orm-private-lustre, tf-private-lustre]
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: public-fss-lustre-monitoring-orm
    secrets: inherit

  orm-private-fss-lustre-monitoring:
    name: ORM / private-fss-lustre-monitoring-orm
    if: always()
    needs: [orm-public-fss-monitoring, tf-public-bastion-operator, orm-private-lustre, tf-private-lustre]
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-fss-lustre-monitoring-orm
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Batch 4 — 2 non-Lustre + 2 Lustre (fss-lustre-monitoring TF)
  # ---------------------------------------------------------------------------
  orm-private-fss-monitoring:
    name: ORM / private-fss-monitoring-orm
    if: always()
    needs: [orm-private-base, tf-public-fss-monitoring, orm-public-fss-lustre-monitoring, orm-private-fss-lustre-monitoring]
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: private-fss-monitoring-orm
    secrets: inherit

  tf-private-base:
    name: TF / private-base-tf
    if: always()
    needs: [orm-private-base, tf-public-fss-monitoring, orm-public-fss-lustre-monitoring, orm-private-fss-lustre-monitoring]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-base-tf
    secrets: inherit

  tf-public-fss-lustre-monitoring:
    name: TF / public-fss-lustre-monitoring-tf
    if: always()
    needs: [orm-private-base, tf-public-fss-monitoring, orm-public-fss-lustre-monitoring, orm-private-fss-lustre-monitoring]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: public-fss-lustre-monitoring-tf
    secrets: inherit

  tf-private-fss-lustre-monitoring:
    name: TF / private-fss-lustre-monitoring-tf
    if: always()
    needs: [orm-private-base, tf-public-fss-monitoring, orm-public-fss-lustre-monitoring, orm-private-fss-lustre-monitoring]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-fss-lustre-monitoring-tf
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Batch 5 — remaining 2 non-Lustre
  # ---------------------------------------------------------------------------
  tf-private-bastion-operator:
    name: TF / private-bastion-operator-tf
    if: always()
    needs: [orm-private-fss-monitoring, tf-private-base, tf-public-fss-lustre-monitoring, tf-private-fss-lustre-monitoring]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-bastion-operator-tf
    secrets: inherit

  tf-private-fss-monitoring:
    name: TF / private-fss-monitoring-tf
    if: always()
    needs: [orm-private-fss-monitoring, tf-private-base, tf-public-fss-lustre-monitoring, tf-private-fss-lustre-monitoring]
    uses: ./.github/workflows/ci-apply-tf.yml
    with:
      topology: private-fss-monitoring-tf
    secrets: inherit
