name: CI - Apply (ORM)

on:
  workflow_dispatch:
    inputs:
      topology:
        description: "ORM topology to test"
        required: true
        type: choice
        default: "public-fss-monitoring-orm"
        options:
          - public-base-orm
          - public-fss-monitoring-orm
          - public-lustre-orm
          - public-fss-lustre-monitoring-orm
          - private-base-orm
          - private-fss-monitoring-orm
          - private-lustre-orm
          - private-fss-lustre-monitoring-orm
      overrides:
        description: 'Extra variable overrides as JSON (e.g. {"worker_gpu_enabled":"true"})'
        required: false
        type: string
        default: '{}'

  issue_comment:
    types: [created]

  workflow_call:
    inputs:
      topology:
        type: string
        default: 'public-fss-monitoring-orm'
      overrides:
        type: string
        default: '{}'
      pr_number:
        type: number
        default: 0

# Never run two ORM apply jobs at the same time.
# PR-triggered runs get their own concurrency group per PR number.
concurrency:
  group: >-
    ${{
      github.event_name == 'issue_comment' && format('ci-apply-orm-pr-{0}', github.event.issue.number) ||
      github.event_name == 'workflow_call' && inputs.pr_number != 0 && format('ci-apply-orm-pr-{0}-{1}', inputs.pr_number, inputs.topology) ||
      format('ci-apply-orm-{0}', inputs.topology || github.run_id)
    }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_TEMPLATE_DIR: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate: verify /ok-to-run-apply-orm comment is authorized. Skipped for
  # workflow_dispatch so the apply job runs unconditionally in that case.
  # ---------------------------------------------------------------------------
  check-orm-trigger:
    name: Check ORM trigger
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ok-to-run-apply-orm') &&
      contains(fromJSON('["OguzPastirmaci","arnaudfroidmont","robo-cap"]'), github.event.comment.user.login)
    runs-on: ubuntu-latest
    outputs:
      topology: ${{ steps.parse.outputs.topology }}
      overrides: ${{ steps.parse.outputs.overrides }}
    steps:
      - name: React to trigger comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Parse topology and overrides from comment
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          # Extract the command line (everything from /ok-to-run-apply-orm onwards)
          cmd_line=$(echo "$COMMENT" | grep -oP '/ok-to-run-apply-orm.*' | head -1 || true)
          read -ra words <<< "$cmd_line"

          # words[0] = /ok-to-run-apply-orm, words[1] = topology, words[2+] = key=value
          topology="${words[1]:-public-fss-monitoring-orm}"

          case "$topology" in
            public-base-orm|public-fss-monitoring-orm|public-lustre-orm|public-fss-lustre-monitoring-orm|private-base-orm|private-fss-monitoring-orm|private-lustre-orm|private-fss-lustre-monitoring-orm)
              ;;
            *)
              echo "Unsupported ORM topology: $topology"
              exit 1
              ;;
          esac

          # Build overrides JSON from key=value pairs using jq for safe escaping
          overrides='{}'
          for word in "${words[@]:2}"; do
            if [[ "$word" =~ ^[a-zA-Z_][a-zA-Z0-9_]*=.+$ ]]; then
              key="${word%%=*}"
              val="${word#*=}"
              overrides=$(jq -n --argjson base "$overrides" --arg k "$key" --arg v "$val" '$base + {($k): $v}')
            fi
          done

          echo "topology=$topology" >> "$GITHUB_OUTPUT"
          echo "overrides=$overrides" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Apply: create ORM stack, apply, assert outputs, then always destroy + delete.
  # ---------------------------------------------------------------------------
  apply-orm:
    name: ORM provisioning / ${{ inputs.topology || needs.check-orm-trigger.outputs.topology || 'public-fss-monitoring-orm' }}
    needs: [check-orm-trigger]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.check-orm-trigger.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TOPOLOGY: ${{ inputs.topology || needs.check-orm-trigger.outputs.topology || 'public-fss-monitoring-orm' }}
      OVERRIDES_JSON: ${{ inputs.overrides || needs.check-orm-trigger.outputs.overrides || '{}' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: >-
            ${{
              github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) ||
              github.event_name == 'workflow_call' && inputs.pr_number != 0 && format('refs/pull/{0}/head', inputs.pr_number) ||
              github.ref
            }}

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Set up OCI credentials
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_API_KEY_FINGERPRINT: ${{ secrets.OCI_API_KEY_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_API_KEY_PRIVATE_KEY: ${{ secrets.OCI_API_KEY_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER_OCID" \
            "$OCI_API_KEY_FINGERPRINT" \
            "$OCI_TENANCY_OCID" \
            "$OCI_REGION" \
            "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          printf '%s' "$OCI_API_KEY_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Generate ephemeral SSH key for bastion tunnel
        if: startsWith(env.TOPOLOGY, 'private')
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/bastion_key -N "" -q

      - name: Build variables JSON
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          WORKER_OPS_AD: ${{ vars.WORKER_OPS_AD }}
          WORKER_OPS_IMAGE_CUSTOM_ID: ${{ vars.WORKER_OPS_IMAGE_CUSTOM_ID }}
          SSH_PUBLIC_KEY: ${{ vars.SSH_PUBLIC_KEY }}
        run: |
          TFVARS_FILE="test/tfvars/orm/${TOPOLOGY}.json"
          if [ ! -f "$TFVARS_FILE" ]; then
            echo "Unknown topology: $TOPOLOGY (no file at $TFVARS_FILE)" && exit 1
          fi

          # Secrets/vars that can't be stored in the file
          jq -n \
            --arg tenancy_ocid               "$OCI_TENANCY_OCID" \
            --arg region                     "$OCI_REGION" \
            --arg compartment_ocid           "$OCI_COMPARTMENT_OCID" \
            --arg current_user_ocid          "$OCI_USER_OCID" \
            --arg worker_ops_ad              "$WORKER_OPS_AD" \
            --arg worker_ops_image_custom_id "$WORKER_OPS_IMAGE_CUSTOM_ID" \
            --arg ssh_public_key             "$SSH_PUBLIC_KEY" \
            '{
              tenancy_ocid:               $tenancy_ocid,
              region:                     $region,
              compartment_ocid:           $compartment_ocid,
              current_user_ocid:          $current_user_ocid,
              worker_ops_ad:              $worker_ops_ad,
              worker_ops_image_custom_id: $worker_ops_image_custom_id,
              ssh_public_key:             $ssh_public_key
            }' > secrets.json

          # Merge topology vars + secrets + comment/dispatch overrides (last one wins)
          echo "$OVERRIDES_JSON" > overrides.json
          jq -s '.[0] * .[1] * .[2]' "$TFVARS_FILE" secrets.json overrides.json > variables.json
          echo "Variables for topology '$TOPOLOGY' (secrets redacted):"
          jq 'del(.ssh_public_key, .tenancy_ocid, .compartment_ocid, .current_user_ocid)' variables.json

      - name: Zip Terraform directory
        run: |
          cd terraform
          zip -r ../stack.zip . -x "*.terraform/*" -x "*.tfstate*"

      - name: Create ORM stack
        shell: python3 {0}
        env:
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          import oci, base64, json, os

          config = oci.config.from_file()
          client = oci.resource_manager.ResourceManagerClient(config)

          with open('stack.zip', 'rb') as f:
              zip_b64 = base64.b64encode(f.read()).decode()

          with open('variables.json') as f:
              variables = json.load(f)

          details = oci.resource_manager.models.CreateStackDetails(
              compartment_id=os.environ['OCI_COMPARTMENT_OCID'],
              display_name='ci-orm-{}-{}'.format(
                  os.environ['GITHUB_RUN_ID'],
                  os.environ['TOPOLOGY']
              ),
              config_source=oci.resource_manager.models.CreateZipUploadConfigSourceDetails(
                  config_source_type='ZIP_UPLOAD',
                  zip_file_base64_encoded=zip_b64
              ),
              variables=variables,
              terraform_version='1.5.x'
          )

          response = client.create_stack(details)
          stack_id = response.data.id

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('STACK_ID={}\n'.format(stack_id))

          print('Created stack: {}'.format(stack_id))

      - name: Apply stack
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          # For lustre topologies, fetch ADs dynamically and retry on capacity errors.
          # For all other topologies, a single apply with no AD override.
          if [[ "$TOPOLOGY" == *lustre* ]]; then
            mapfile -t ADS < <(oci iam availability-domain list \
              --compartment-id "$OCI_COMPARTMENT_OCID" \
              --query 'data[*].name' \
              --raw-output | jq -r '.[]')
          else
            ADS=("")
          fi

          APPLY_SUCCESS=false
          for AD in "${ADS[@]}"; do
            if [ -n "$AD" ]; then
              echo "Setting lustre_ad=$AD"
              jq --arg ad "$AD" '. + {lustre_ad: $ad}' variables.json > vars_ad.json
              oci resource-manager stack update \
                --stack-id "$STACK_ID" \
                --variables "$(cat vars_ad.json)" \
                --force
            fi

            JOB_ID=$(oci resource-manager job create-apply-job \
              --stack-id "$STACK_ID" \
              --execution-plan-strategy AUTO_APPROVED \
              --query 'data.id' \
              --raw-output)
            echo "APPLY_JOB_ID=$JOB_ID" >> "$GITHUB_ENV"
            echo "Apply job: $JOB_ID (AD: ${AD:-default})"

            MAX_POLLS=120  # 120 x 30s = 60 minutes
            POLL=0
            JOB_STATUS=""
            while true; do
              POLL=$((POLL + 1))
              if [ "$POLL" -gt "$MAX_POLLS" ]; then
                echo "Timed out waiting for apply job after $MAX_POLLS polls"
                exit 1
              fi
              JOB_STATUS=$(oci resource-manager job get \
                --job-id "$JOB_ID" \
                --query 'data."lifecycle-state"' \
                --raw-output)
              echo "  [$POLL/$MAX_POLLS] AD=${AD:-default} Status: $JOB_STATUS"
              case "$JOB_STATUS" in
                SUCCEEDED) APPLY_SUCCESS=true; break ;;
                FAILED|CANCELING|CANCELED) break ;;
              esac
              sleep 30
            done

            if $APPLY_SUCCESS; then
              echo "Apply succeeded."
              break
            fi

            LOGS=$(oci resource-manager job get-job-logs --all \
              --job-id "$JOB_ID" \
              --query 'data[*].message' --raw-output 2>/dev/null | tail -100 || true)
            echo "$LOGS"

            if echo "$LOGS" | grep -q "Not enough capacity to create Lustre file system"; then
              echo "No Lustre capacity in AD '${AD:-default}', trying next..."
              continue
            fi

            echo "Apply job failed with status: $JOB_STATUS"
            exit 1
          done

          if ! $APPLY_SUCCESS; then
            echo "Apply failed: no Lustre capacity available in any AD."
            exit 1
          fi

      - name: Assert outputs
        run: |
          oci resource-manager job get-job-tf-state \
            --job-id "$APPLY_JOB_ID" \
            --file state.json

          FAILED=0

          check_ocid() {
            local key=$1
            local val
            val=$(jq -r ".outputs.${key}.value // empty" state.json)
            if [[ -z "$val" || "$val" == "null" ]]; then
              echo "FAIL: $key is empty"
              FAILED=1; return
            fi
            if [[ "$val" != ocid1.* ]] || [[ $(echo "$val" | tr -cd '.' | wc -c) -lt 4 ]]; then
              echo "FAIL: $key is not a valid OCID: $val"
              FAILED=1; return
            fi
            echo "OK:   $key = $val"
          }

          # Common checks for all topologies
          check_ocid cluster_id
          check_ocid vcn_id
          check_ocid worker_subnet_id
          check_ocid worker_nsg_id
          check_ocid control_plane_subnet_id
          check_ocid control_plane_nsg_id
          check_ocid int_lb_subnet_id
          check_ocid int_lb_nsg_id
          check_ocid worker_ops_pool_id

          PRIVATE_EP=$(jq -r '.outputs.cluster_private_endpoint.value // empty' state.json)
          if [[ "$PRIVATE_EP" != https://* ]]; then
            echo "FAIL: cluster_private_endpoint does not start with https://: $PRIVATE_EP"
            FAILED=1
          else
            echo "OK:   cluster_private_endpoint = $PRIVATE_EP"
          fi

          # Public topology checks
          if [[ "$TOPOLOGY" == public* ]]; then
            PUBLIC_EP=$(jq -r '.outputs.cluster_public_endpoint.value // empty' state.json)
            if [[ "$PUBLIC_EP" != https://* ]]; then
              echo "FAIL: cluster_public_endpoint does not start with https://: $PUBLIC_EP"
              FAILED=1
            else
              echo "OK:   cluster_public_endpoint = $PUBLIC_EP"
            fi
            check_ocid pub_lb_subnet_id
            check_ocid pub_lb_nsg_id
          fi

          # Private topology checks
          if [[ "$TOPOLOGY" == private* ]]; then
            PUBLIC_EP=$(jq -r '.outputs.cluster_public_endpoint.value // empty' state.json)
            if [ -n "$PUBLIC_EP" ]; then
              echo "FAIL: cluster_public_endpoint should be empty for private topology: $PUBLIC_EP"
              FAILED=1
            else
              echo "OK:   cluster_public_endpoint is empty (private topology)"
            fi
          fi

          # FSS topology checks
          if [[ "$TOPOLOGY" == *fss* ]]; then
            check_ocid fss_file_system_id
            check_ocid fss_nsg_id
            check_ocid fss_subnet_id

            FSS_MT_IP=$(jq -r '.outputs.fss_mount_target_ip.value // empty' state.json)
            if [[ -z "$FSS_MT_IP" || ! "$FSS_MT_IP" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
              echo "FAIL: fss_mount_target_ip is not a valid IPv4: $FSS_MT_IP"
              FAILED=1
            else
              echo "OK:   fss_mount_target_ip = $FSS_MT_IP"
            fi

            FSS_EXPORT_PATH=$(jq -r '.outputs.fss_export_path.value // empty' state.json)
            if [[ -z "$FSS_EXPORT_PATH" || "$FSS_EXPORT_PATH" != /oke-gpu-* ]]; then
              echo "FAIL: fss_export_path has unexpected format: $FSS_EXPORT_PATH"
              FAILED=1
            else
              echo "OK:   fss_export_path = $FSS_EXPORT_PATH"
            fi

            PV_COUNT=$(jq '[.resources[] | select(.type == "kubernetes_persistent_volume_v1" and .name == "fss")] | length' state.json)
            if [[ "$PV_COUNT" -lt 1 ]]; then
              echo "FAIL: kubernetes_persistent_volume_v1.fss not found in state"
              FAILED=1
            else
              echo "OK:   FSS PersistentVolume resource found in state"
            fi
          fi

          # Lustre topology checks
          if [[ "$TOPOLOGY" == *lustre* ]]; then
            check_ocid lustre_subnet_id
            check_ocid lustre_nsg_id
            check_ocid lustre_file_system_id

            LUSTRE_MGS=$(jq -r '.outputs.lustre_management_service_address.value // empty' state.json)
            if [[ -z "$LUSTRE_MGS" || ! "$LUSTRE_MGS" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
              echo "FAIL: lustre_management_service_address is not a valid IPv4: $LUSTRE_MGS"
              FAILED=1
            else
              echo "OK:   lustre_management_service_address = $LUSTRE_MGS"
            fi

            PV_COUNT=$(jq '[.resources[] | select(.type == "kubectl_manifest" and .name == "lustre_pv")] | length' state.json)
            if [[ "$PV_COUNT" -lt 1 ]]; then
              echo "FAIL: kubectl_manifest.lustre_pv not found in state"
              FAILED=1
            else
              echo "OK:   Lustre PersistentVolume resource found in state"
            fi
          fi

          # Monitoring topology checks
          if [[ "$TOPOLOGY" == *monitoring* ]]; then
            check_ocid pub_lb_subnet_id
            check_ocid pub_lb_nsg_id

            GRAFANA_URL=$(jq -r '.outputs.grafana_url.value // empty' state.json)
            if [[ "$GRAFANA_URL" != http* ]]; then
              echo "FAIL: grafana_url is not a valid URL: $GRAFANA_URL"
              FAILED=1
            else
              echo "OK:   grafana_url = $GRAFANA_URL"
            fi

            GRAFANA_PASS=$(jq -r '.outputs.grafana_admin_password.value // empty' state.json)
            if [ -z "$GRAFANA_PASS" ]; then
              echo "FAIL: grafana_admin_password is empty"
              FAILED=1
            else
              echo "OK:   grafana_admin_password is set"
            fi
          fi

          [ "$FAILED" -eq 0 ] || exit 1

      - name: Generate kubeconfig
        env:
          OCI_REGION: ${{ vars.OCI_REGION }}
        run: |
          CLUSTER_ID=$(jq -r '.outputs.cluster_id.value' state.json)
          mkdir -p "$HOME/.kube"

          if [[ "$TOPOLOGY" == public* ]]; then
            oci ce cluster create-kubeconfig \
              --cluster-id "$CLUSTER_ID" \
              --file "$HOME/.kube/config" \
              --region "$OCI_REGION" \
              --token-version 2.0.0 \
              --kube-endpoint PUBLIC_ENDPOINT
          else
            BASTION_ID=$(jq -r '.outputs.bastion_service_id.value // empty' state.json)
            ENDPOINT_IP=$(jq -r '.outputs.oke_private_endpoint_ip.value // empty' state.json)

            if [ -z "$BASTION_ID" ] || [ -z "$ENDPOINT_IP" ]; then
              echo "FAIL: bastion_service_id or oke_private_endpoint_ip is empty -- is create_oci_bastion_service enabled?"
              exit 1
            fi

            ./files/oke-bastion-service-session.sh \
              --bastion-ocid "$BASTION_ID" \
              --cluster-ocid "$CLUSTER_ID" \
              --oke-endpoint-ip "$ENDPOINT_IP" \
              --region "$OCI_REGION" \
              --ssh-key ~/.ssh/bastion_key \
              --local-port 6443 \
              --ttl-seconds 10800 \
              --auto-tunnel \
              --non-interactive

            BASTION_KCFG="$HOME/.kube/oke-bastion/${CLUSTER_ID}.yaml"
            if [ ! -f "$BASTION_KCFG" ]; then
              echo "ERROR: bastion script did not produce kubeconfig at $BASTION_KCFG"
              ls -la "$HOME/.kube/oke-bastion/" || true
              exit 1
            fi
            cp "$BASTION_KCFG" "$HOME/.kube/config"
            echo "Verifying tunnel connectivity..."
            kubectl --kubeconfig "$HOME/.kube/config" cluster-info
          fi

      - name: Cluster health checks
        run: |
          echo "Health check: API server connectivity"
          kubectl cluster-info

          echo "Health check: waiting for nodes to be Ready"
          kubectl wait --for=condition=Ready nodes --all --timeout=300s

          echo "Health check: node count"
          NODE_COUNT=$(kubectl get nodes --no-headers | wc -l)
          echo "  $NODE_COUNT node(s) ready"
          [ "$NODE_COUNT" -ge 1 ] || { echo "FAIL: no nodes found"; exit 1; }

          echo "Health check: node count matches expected pool sizes"
          EXPECTED=0
          for pool_key in worker_ops_pool_id worker_cpu_pool_id worker_gpu_pool_id; do
            POOL_ID=$(jq -r ".outputs.${pool_key}.value // empty" state.json)
            if [ -n "$POOL_ID" ] && [ "$POOL_ID" != "null" ]; then
              SIZE=$(oci ce node-pool get --node-pool-id "$POOL_ID" --query 'data."node-config-details".size' --raw-output 2>/dev/null || echo "0")
              echo "  $pool_key: size=$SIZE"
              EXPECTED=$((EXPECTED + SIZE))
            fi
          done
          echo "  expected=$EXPECTED"
          MAX_POLLS=60
          POLL=0
          while true; do
            ACTUAL=$(kubectl get nodes --no-headers | wc -l | tr -d ' ')
            if [ "$ACTUAL" -eq "$EXPECTED" ]; then
              echo "OK:   node count ($ACTUAL) matches expected ($EXPECTED)"
              break
            fi
            POLL=$((POLL + 1))
            if [ "$POLL" -gt "$MAX_POLLS" ]; then
              echo "FAIL: node count ($ACTUAL) does not match expected ($EXPECTED) after 30 minutes"
              exit 1
            fi
            echo "  [$POLL/$MAX_POLLS] actual=$ACTUAL expected=$EXPECTED, waiting 30s..."
            sleep 30
          done

          kubectl wait --for=condition=Ready nodes --all --timeout=300s

          echo "Health check: CoreDNS pods"
          kubectl wait --for=condition=Ready pods -l k8s-app=kube-dns -n kube-system --timeout=120s

          echo "Health check: kube-proxy pods"
          kubectl wait --for=condition=Ready pods -l k8s-app=kube-proxy -n kube-system --timeout=120s

          echo "Health check: all kube-system pods healthy"
          for i in $(seq 1 20); do
            BAD_PODS=$(kubectl get pods -n kube-system --no-headers | grep -v -E 'Running|Completed' || true)
            if [ -z "$BAD_PODS" ]; then
              echo "OK:   all kube-system pods are Running or Completed"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "FAIL: unhealthy pods in kube-system after 5 minutes:"
              echo "$BAD_PODS"
              exit 1
            fi
            echo "  waiting for pods to be ready (attempt $i/20)..."
            sleep 15
          done

          echo "Health check: all cluster health checks passed"

      - name: Network health checks
        run: |
          echo "Health check: pod-to-pod connectivity"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: net-server
          spec:
            restartPolicy: Never
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: server
              image: busybox
              command: ["sh", "-c", "echo 'net-check-ok' > /tmp/index.html && httpd -f -p 8080 -h /tmp"]
          EOF

          kubectl wait --for=condition=Ready pod/net-server --timeout=120s
          SERVER_IP=$(kubectl get pod net-server -o jsonpath='{.status.podIP}')
          echo "  server pod IP: $SERVER_IP"

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: net-client
          spec:
            restartPolicy: Never
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: client
              image: busybox
              command: ["sh", "-c", "for i in \$(seq 1 30); do RESULT=\$(wget -qO- -T 5 http://${SERVER_IP}:8080/index.html 2>/dev/null) && echo \"\$RESULT\" && exit 0; sleep 2; done; echo 'timeout'; exit 1"]
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/net-client --timeout=120s
          CLIENT_OUTPUT=$(kubectl logs net-client)
          if [[ "$CLIENT_OUTPUT" != *"net-check-ok"* ]]; then
            echo "FAIL: pod-to-pod connectivity failed: $CLIENT_OUTPUT"
            exit 1
          fi
          echo "OK:   pod-to-pod connectivity verified"

          echo "Health check: DNS resolution"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: dns-checker
          spec:
            restartPolicy: Never
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: dns
              image: busybox
              command: ["sh", "-c", "nslookup kubernetes.default.svc.cluster.local"]
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/dns-checker --timeout=120s
          DNS_OUTPUT=$(kubectl logs dns-checker)
          if echo "$DNS_OUTPUT" | grep -q 'NXDOMAIN'; then
            echo "FAIL: DNS resolution failed: $DNS_OUTPUT"
            exit 1
          fi
          echo "OK:   DNS resolution verified"
          echo "Health check: all network health checks passed"

      - name: GPU resource health checks
        run: |
          GPU_POOL_ID=$(jq -r '.outputs.worker_gpu_pool_id.value // empty' state.json)
          RDMA_POOL_ID=$(jq -r '.outputs.worker_rdma_pool_id.value // empty' state.json)

          if [ -z "$GPU_POOL_ID" ] && [ -z "$RDMA_POOL_ID" ]; then
            echo "No GPU or RDMA pools enabled, skipping GPU resource check"
            exit 0
          fi

          echo "Health check: GPU resources advertised on nodes"
          GPU_NODES=$(kubectl get nodes -o json | jq -r '
            .items[] |
            select(
              (.status.allocatable["nvidia.com/gpu"] // "0" | tonumber) > 0 or
              (.status.allocatable["amd.com/gpu"] // "0" | tonumber) > 0
            ) |
            "\(.metadata.name) nvidia=\(.status.allocatable["nvidia.com/gpu"] // "0") amd=\(.status.allocatable["amd.com/gpu"] // "0")"
          ')

          if [ -z "$GPU_NODES" ]; then
            echo "FAIL: GPU/RDMA pool(s) exist but no nodes advertise GPU resources"
            kubectl get nodes -o custom-columns='NAME:.metadata.name,NVIDIA:.status.allocatable.nvidia\.com/gpu,AMD:.status.allocatable.amd\.com/gpu'
            exit 1
          fi

          echo "  GPU nodes found:"
          echo "$GPU_NODES" | while read -r line; do echo "    $line"; done
          echo "OK:   GPU resources advertised on nodes"

      - name: FSS health checks
        if: contains(env.TOPOLOGY, 'fss')
        run: |
          echo "Health check: PVC binding"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: fss-test-pvc
          spec:
            accessModes:
              - ReadWriteMany
            storageClassName: ""
            resources:
              requests:
                storage: 50Gi
            volumeName: fss-pv
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Bound' pvc/fss-test-pvc --timeout=120s
          echo "OK:   FSS PVC bound"

          echo "Health check: FSS write"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: fss-writer
            labels:
              app.kubernetes.io/name: fss-test
              app.kubernetes.io/component: writer
          spec:
            restartPolicy: Never
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: writer
              image: busybox
              command: ["sh", "-c", "echo 'fss-test-content' > /mnt/fss/testfile.txt"]
              volumeMounts:
              - name: fss
                mountPath: /mnt/fss
            volumes:
            - name: fss
              persistentVolumeClaim:
                claimName: fss-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/fss-writer --timeout=120s
          FSS_WRITER_NODE=$(kubectl get pod fss-writer -o jsonpath='{.spec.nodeName}')
          echo "OK:   FSS writer pod completed (node: $FSS_WRITER_NODE)"

          echo "Health check: FSS read"
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: fss-reader
            labels:
              app.kubernetes.io/name: fss-test
              app.kubernetes.io/component: reader
          spec:
            restartPolicy: Never
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: fss-test
                      app.kubernetes.io/component: writer
                  topologyKey: kubernetes.io/hostname
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: reader
              image: busybox
              command: ["sh", "-c", "cat /mnt/fss/testfile.txt"]
              volumeMounts:
              - name: fss
                mountPath: /mnt/fss
            volumes:
            - name: fss
              persistentVolumeClaim:
                claimName: fss-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/fss-reader --timeout=120s
          CONTENT=$(kubectl logs fss-reader)
          if [[ "$CONTENT" != *"fss-test-content"* ]]; then
            echo "FAIL: reader pod output does not contain expected content: $CONTENT"
            exit 1
          fi
          echo "OK:   FSS reader output: $CONTENT"

          echo "Health check: FSS OS-level mount (hostPath)"
          FSS_MOUNT_PATH=$(jq -r '.outputs.fss_mount_path.value // "/mnt/oci-fss"' state.json)
          echo "  host mount path: $FSS_MOUNT_PATH"
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: fss-hostpath-reader
          spec:
            restartPolicy: Never
            nodeName: ${FSS_WRITER_NODE}
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: reader
              image: busybox
              command: ["sh", "-c", "cat /mnt/fss-host/testfile.txt"]
              volumeMounts:
              - name: fss-host
                mountPath: /mnt/fss-host
            volumes:
            - name: fss-host
              hostPath:
                path: ${FSS_MOUNT_PATH}
                type: Directory
          EOF
          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/fss-hostpath-reader --timeout=120s
          HOST_CONTENT=$(kubectl logs fss-hostpath-reader)
          if [[ "$HOST_CONTENT" != *"fss-test-content"* ]]; then
            echo "FAIL: FSS hostPath reader output does not contain expected content: $HOST_CONTENT"
            exit 1
          fi
          echo "OK:   FSS hostPath reader output: $HOST_CONTENT"
          echo "Health check: all FSS health checks passed"

      - name: Lustre health checks
        if: contains(env.TOPOLOGY, 'lustre')
        run: |
          echo "Health check: PVC binding"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: lustre-test-pvc
          spec:
            accessModes:
              - ReadWriteMany
            storageClassName: ""
            resources:
              requests:
                storage: 50Gi
            volumeName: lustre-pv
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Bound' pvc/lustre-test-pvc --timeout=120s
          echo "OK:   Lustre PVC bound"

          echo "Health check: Lustre write"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: lustre-writer
            labels:
              app.kubernetes.io/name: lustre-test
              app.kubernetes.io/component: writer
          spec:
            restartPolicy: Never
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: writer
              image: busybox
              command: ["sh", "-c", "echo 'lustre-test-content' > /mnt/lustre/testfile.txt"]
              volumeMounts:
              - name: lustre
                mountPath: /mnt/lustre
            volumes:
            - name: lustre
              persistentVolumeClaim:
                claimName: lustre-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/lustre-writer --timeout=120s
          LUSTRE_WRITER_NODE=$(kubectl get pod lustre-writer -o jsonpath='{.spec.nodeName}')
          echo "OK:   Lustre writer pod completed (node: $LUSTRE_WRITER_NODE)"

          echo "Health check: Lustre read"
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: lustre-reader
            labels:
              app.kubernetes.io/name: lustre-test
              app.kubernetes.io/component: reader
          spec:
            restartPolicy: Never
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: lustre-test
                      app.kubernetes.io/component: writer
                  topologyKey: kubernetes.io/hostname
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: reader
              image: busybox
              command: ["sh", "-c", "cat /mnt/lustre/testfile.txt"]
              volumeMounts:
              - name: lustre
                mountPath: /mnt/lustre
            volumes:
            - name: lustre
              persistentVolumeClaim:
                claimName: lustre-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/lustre-reader --timeout=120s
          CONTENT=$(kubectl logs lustre-reader)
          if [[ "$CONTENT" != *"lustre-test-content"* ]]; then
            echo "FAIL: reader pod output does not contain expected content: $CONTENT"
            exit 1
          fi
          echo "OK:   Lustre reader output: $CONTENT"

          echo "Health check: Lustre OS-level mount (hostPath)"
          LUSTRE_MOUNT_PATH=$(jq -r '.outputs.lustre_mount_path.value // "/mnt/oci-lustre"' state.json)
          echo "  host mount path: $LUSTRE_MOUNT_PATH"
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: lustre-hostpath-reader
          spec:
            restartPolicy: Never
            nodeName: ${LUSTRE_WRITER_NODE}
            tolerations:
            - key: nvidia.com/gpu
              operator: Exists
            - key: amd.com/gpu
              operator: Exists
            containers:
            - name: reader
              image: busybox
              command: ["sh", "-c", "for i in \$(seq 1 20); do content=\$(cat /mnt/lustre-host/testfile.txt 2>/dev/null); if [ -n \"\$content\" ]; then echo \"\$content\"; exit 0; fi; sleep 3; done; echo 'file not found after 60s'; exit 1"]
              volumeMounts:
              - name: lustre-host
                mountPath: /mnt/lustre-host
            volumes:
            - name: lustre-host
              hostPath:
                path: ${LUSTRE_MOUNT_PATH}
                type: Directory
          EOF
          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/lustre-hostpath-reader --timeout=120s
          HOST_CONTENT=$(kubectl logs lustre-hostpath-reader)
          if [[ "$HOST_CONTENT" != *"lustre-test-content"* ]]; then
            echo "FAIL: Lustre hostPath reader output does not contain expected content: $HOST_CONTENT"
            exit 1
          fi
          echo "OK:   Lustre hostPath reader output: $HOST_CONTENT"
          echo "Health check: all Lustre health checks passed"

      - name: Monitoring health checks
        if: contains(env.TOPOLOGY, 'monitoring')
        run: |
          echo "Health check: Grafana API"
          GRAFANA_URL=$(jq -r '.outputs.grafana_url.value' state.json)
          GRAFANA_PASS=$(jq -r '.outputs.grafana_admin_password.value' state.json)
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u "admin:${GRAFANA_PASS}" "${GRAFANA_URL}/api/org" --insecure || true)
            if [ "$STATUS" = "200" ]; then
              echo "OK:   Grafana API responded 200"
              break
            fi
            echo "  attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "FAIL: Grafana API did not respond 200 after 30 attempts"; exit 1; }

          echo "Health check: Grafana dashboards"
          DASH_COUNT=$(curl -s --insecure -u "admin:${GRAFANA_PASS}" "${GRAFANA_URL}/api/search?type=dash-db" | jq 'length')
          if [ "$DASH_COUNT" -gt 0 ] 2>/dev/null; then
            echo "OK:   $DASH_COUNT dashboard(s) found"
          else
            echo "FAIL: no dashboards found"
            exit 1
          fi

          echo "Health check: Grafana → Prometheus query"
          QUERY_STATUS=$(curl -s --insecure -u "admin:${GRAFANA_PASS}" "${GRAFANA_URL}/api/datasources/proxy/uid/prometheus/api/v1/query?query=up" | jq -r '.status // empty')
          if [ "$QUERY_STATUS" = "success" ]; then
            echo "OK:   Prometheus query via Grafana returned success"
          else
            echo "FAIL: Prometheus query via Grafana returned: $QUERY_STATUS"
            exit 1
          fi

          echo "Health check: node-exporter DaemonSet"
          DS_DESIRED=$(kubectl get daemonset -n monitoring -l app.kubernetes.io/name=prometheus-node-exporter -o jsonpath='{.items[0].status.desiredNumberScheduled}')
          DS_READY=$(kubectl get daemonset -n monitoring -l app.kubernetes.io/name=prometheus-node-exporter -o jsonpath='{.items[0].status.numberReady}')
          echo "  desired=$DS_DESIRED ready=$DS_READY"
          if [ "$DS_DESIRED" != "$DS_READY" ] || [ "$DS_DESIRED" -lt 1 ]; then
            echo "FAIL: node-exporter DaemonSet desired ($DS_DESIRED) != ready ($DS_READY)"
            exit 1
          fi
          echo "OK:   node-exporter DaemonSet $DS_READY/$DS_DESIRED pods ready"

          echo "Health check: all monitoring health checks passed"

      - name: Clean up network test resources
        if: always()
        run: |
          if [ -f "$HOME/.kube/config" ]; then
            kubectl delete pod net-server net-client dns-checker --ignore-not-found --wait=true --timeout=60s || true
          fi

      - name: Clean up FSS test resources
        if: always() && contains(env.TOPOLOGY, 'fss')
        run: |
          if [ -f "$HOME/.kube/config" ]; then
            kubectl delete pod fss-writer fss-reader fss-hostpath-reader --ignore-not-found --wait=true --timeout=60s || true
            kubectl delete pvc fss-test-pvc --ignore-not-found --wait=true --timeout=120s || true
          fi

      - name: Clean up Lustre test resources
        if: always() && contains(env.TOPOLOGY, 'lustre')
        run: |
          if [ -f "$HOME/.kube/config" ]; then
            kubectl delete pod lustre-writer lustre-reader lustre-hostpath-reader --ignore-not-found --wait=true --timeout=60s || true
            kubectl delete pvc lustre-test-pvc --ignore-not-found --wait=true --timeout=120s || true
          fi

      - name: Tear down bastion tunnel
        if: always() && startsWith(env.TOPOLOGY, 'private')
        run: |
          for pidfile in /tmp/oke-bastion-tunnel-*.pid; do
            [ -f "$pidfile" ] || continue
            PID=$(cat "$pidfile")
            if [ -n "$PID" ] && kill -0 "$PID" 2>/dev/null; then
              kill "$PID" 2>/dev/null || true
              echo "Killed SSH tunnel (PID: $PID)"
            fi
            rm -f "$pidfile"
          done
          rm -f "$HOME/.kube/config" "$HOME/.kube/oke-bastion/"*.yaml 2>/dev/null || true

      - name: Destroy stack
        if: always() && env.STACK_ID != ''
        run: |
          DESTROY_JOB_ID=$(oci resource-manager job create-destroy-job \
            --stack-id "$STACK_ID" \
            --execution-plan-strategy AUTO_APPROVED \
            --query 'data.id' \
            --raw-output)
          echo "DESTROY_JOB_ID=$DESTROY_JOB_ID" >> "$GITHUB_ENV"
          echo "Destroy job: $DESTROY_JOB_ID"

      - name: Wait for destroy to complete
        if: always() && env.DESTROY_JOB_ID != ''
        run: |
          echo "Waiting for destroy job $DESTROY_JOB_ID..."
          MAX_POLLS=120
          POLL=0
          while true; do
            POLL=$((POLL + 1))
            if [ "$POLL" -gt "$MAX_POLLS" ]; then
              echo "Timed out waiting for destroy job after $MAX_POLLS polls"
              exit 1
            fi
            STATUS=$(oci resource-manager job get \
              --job-id "$DESTROY_JOB_ID" \
              --query 'data."lifecycle-state"' \
              --raw-output)
            echo "  [$POLL/$MAX_POLLS] Status: $STATUS"
            case "$STATUS" in
              SUCCEEDED) echo "Destroy succeeded."; echo "DESTROY_SUCCEEDED=true" >> "$GITHUB_ENV"; break ;;
              FAILED|CANCELING|CANCELED)
                echo "Destroy job failed with status: $STATUS"
                exit 1 ;;
            esac
            sleep 30
          done

      - name: Fetch destroy job logs on failure
        if: always() && env.DESTROY_JOB_ID != '' && failure()
        run: |
          echo "=== ORM destroy job logs ==="
          oci resource-manager job get-job-logs --all \
            --job-id "$DESTROY_JOB_ID" \
            --query 'data[*].message' \
            --raw-output 2>&1 | tail -100 || echo "Could not fetch destroy job logs."

      - name: Delete stack
        if: always() && env.STACK_ID != '' && env.DESTROY_SUCCEEDED == 'true'
        run: |
          oci resource-manager stack delete \
            --stack-id "$STACK_ID" \
            --force
          echo "Stack $STACK_ID deleted."

      - name: Post result comment
        if: always() && (github.event_name == 'issue_comment' || (github.event_name == 'workflow_call' && inputs.pr_number != 0))
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ github.event_name == 'workflow_call' && inputs.pr_number != 0 && inputs.pr_number || github.event.issue.number }}
          OVERRIDES_JSON: ${{ env.OVERRIDES_JSON }}
        with:
          script: |
            const status    = process.env.JOB_STATUS
            const icon      = status === 'success' ? '✅' : '❌'
            const topology  = process.env.TOPOLOGY
            const overrides = process.env.OVERRIDES_JSON
            const runUrl    = process.env.RUN_URL
            const rows = [
              `| Topology  | \`${topology}\` |`,
              `| Result    | ${icon} ${status} |`,
            ]
            if (overrides && overrides !== '{}') {
              rows.push(`| Overrides | \`${overrides}\` |`)
            }
            const body = [
              `### ${icon} CI - Apply (ORM) results`,
              '',
              `| | |`,
              `|---|---|`,
              ...rows,
              '',
              `[View full run log](${runUrl})`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            })
