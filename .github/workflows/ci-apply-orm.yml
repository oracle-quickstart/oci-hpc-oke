name: CI - Apply (ORM)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to test (leave empty to use current branch)"
        required: false
        type: number
      topology:
        description: "ORM topology to test"
        required: true
        type: choice
        default: "public-fss-monitoring-orm"
        options:
          - public-base-orm
          - public-fss-monitoring-orm
          - public-lustre-orm
          - public-fss-lustre-monitoring-orm
          - private-base-orm
          - private-fss-monitoring-orm
          - private-lustre-orm
          - private-fss-lustre-monitoring-orm
      overrides:
        description: 'Extra variable overrides as JSON (e.g. {"worker_gpu_enabled":"true"})'
        required: false
        type: string
        default: '{}'

  issue_comment:
    types: [created]

  workflow_call:
    inputs:
      topology:
        type: string
        default: 'public-fss-monitoring-orm'
      overrides:
        type: string
        default: '{}'
      pr_number:
        type: number
        default: 0

# Never run two ORM apply jobs at the same time.
# PR-triggered runs get their own concurrency group per PR number.
concurrency:
  group: >-
    ${{
      github.event_name == 'issue_comment' && format('ci-apply-orm-pr-{0}', github.event.issue.number) ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != '' && format('ci-apply-orm-pr-{0}', github.event.inputs.pr_number) ||
      github.event_name == 'workflow_call' && inputs.pr_number != 0 && format('ci-apply-orm-pr-{0}', inputs.pr_number) ||
      format('ci-apply-orm-{0}', inputs.topology || github.run_id)
    }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_TEMPLATE_DIR: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Resolve PR context for PR-linked runs and verify /ok-to-run-apply-orm
  # comments are authorized.
  # ---------------------------------------------------------------------------
  check-orm-trigger:
    name: Check ORM trigger
    if: >-
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/ok-to-run-apply-orm') &&
      contains(fromJSON('["OguzPastirmaci","arnaudfroidmont","robo-cap"]'), github.event.comment.user.login)) ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_call' && inputs.pr_number != 0)
    runs-on: ubuntu-latest
    outputs:
      topology: ${{ steps.parse.outputs.topology || steps.manual.outputs.topology }}
      overrides: ${{ steps.parse.outputs.overrides || steps.manual.outputs.overrides }}
      pr_number: ${{ steps.pr-comment.outputs.pr_number || steps.pr-dispatch.outputs.pr_number || steps.pr-call.outputs.pr_number }}
      pr_head_sha: ${{ steps.pr-comment.outputs.head_sha || steps.pr-dispatch.outputs.head_sha || steps.pr-call.outputs.head_sha }}
    steps:
      - name: React to trigger comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Resolve PR context from comment
        id: pr-comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Resolve PR context from workflow dispatch
        id: pr-dispatch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Resolve PR context from workflow call
        id: pr-call
        if: github.event_name == 'workflow_call'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.data.head.sha);

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: github.event_name == 'issue_comment'

      - name: Parse topology and overrides from comment
        id: parse
        if: github.event_name == 'issue_comment'
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: .github/scripts/parse-comment.sh "/ok-to-run-apply-orm" "public-base-orm|public-fss-monitoring-orm|public-lustre-orm|public-fss-lustre-monitoring-orm|private-base-orm|private-fss-monitoring-orm|private-lustre-orm|private-fss-lustre-monitoring-orm" "public-fss-monitoring-orm"

      - name: Use workflow inputs
        id: manual
        if: github.event_name != 'issue_comment'
        run: |
          echo "topology=${{ inputs.topology }}" >> "$GITHUB_OUTPUT"
          echo "overrides=${{ inputs.overrides }}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Apply: create ORM stack, apply, assert outputs, then always destroy + delete.
  # ---------------------------------------------------------------------------
  apply-orm:
    name: ORM provisioning / ${{ inputs.topology || needs.check-orm-trigger.outputs.topology || 'public-fss-monitoring-orm' }}
    needs: [check-orm-trigger]
    if: >-
      always() && (
        (github.event_name == 'workflow_call' && inputs.pr_number == 0) ||
        needs.check-orm-trigger.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TOPOLOGY: ${{ inputs.topology || needs.check-orm-trigger.outputs.topology || 'public-fss-monitoring-orm' }}
      OVERRIDES_JSON: ${{ inputs.overrides || needs.check-orm-trigger.outputs.overrides || '{}' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: >-
            ${{
              needs.check-orm-trigger.outputs.pr_number != '' && format('refs/pull/{0}/head', needs.check-orm-trigger.outputs.pr_number) ||
              github.ref
            }}

      - name: Verify checked-out PR SHA
        if: needs.check-orm-trigger.outputs.pr_head_sha != ''
        env:
          EXPECTED_SHA: ${{ needs.check-orm-trigger.outputs.pr_head_sha }}
        run: |
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "Expected PR head SHA $EXPECTED_SHA but checked out $ACTUAL_SHA."
            echo "The PR changed after this run started. Re-run against the latest commit."
            exit 1
          fi

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Set up OCI credentials
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_API_KEY_FINGERPRINT: ${{ secrets.OCI_API_KEY_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_API_KEY_PRIVATE_KEY: ${{ secrets.OCI_API_KEY_PRIVATE_KEY }}
        run: .github/scripts/setup-oci-credentials.sh

      - name: Generate ephemeral SSH key for bastion tunnel
        if: startsWith(env.TOPOLOGY, 'private')
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/bastion_key -N "" -q

      - name: Build variables JSON
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          WORKER_OPS_AD: ${{ vars.WORKER_OPS_AD }}
          WORKER_OPS_IMAGE_CUSTOM_ID: ${{ vars.WORKER_OPS_IMAGE_CUSTOM_ID }}
          WORKER_CPU_AD: ${{ vars.WORKER_CPU_AD }}
          WORKER_CPU_IMAGE_CUSTOM_ID: ${{ vars.WORKER_CPU_IMAGE_CUSTOM_ID }}
          WORKER_GPU_AD: ${{ vars.WORKER_GPU_AD }}
          WORKER_GPU_IMAGE_CUSTOM_ID: ${{ vars.WORKER_GPU_IMAGE_CUSTOM_ID }}
          SSH_PUBLIC_KEY: ${{ vars.SSH_PUBLIC_KEY }}
        run: .github/scripts/build-variables-orm.sh

      - name: Zip Terraform directory
        run: |
          cd terraform
          zip -r ../stack.zip . -x "*.terraform/*" -x "*.tfstate*"

      - name: Create ORM stack
        env:
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: .github/scripts/create-orm-stack.sh

      - name: Apply stack
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          # For lustre topologies, fetch ADs dynamically and retry on capacity errors.
          # For all other topologies, a single apply with no AD override.
          if [[ "$TOPOLOGY" == *lustre* ]]; then
            mapfile -t ADS < <(oci iam availability-domain list \
              --compartment-id "$OCI_COMPARTMENT_OCID" \
              --query 'data[*].name' \
              --raw-output | jq -r '.[]')
          else
            ADS=("")
          fi

          APPLY_SUCCESS=false
          for AD in "${ADS[@]}"; do
            if [ -n "$AD" ]; then
              echo "Setting lustre_ad=$AD"
              jq --arg ad "$AD" '. + {lustre_ad: $ad}' variables.json > vars_ad.json
              oci resource-manager stack update \
                --stack-id "$STACK_ID" \
                --variables "$(cat vars_ad.json)" \
                --force
            fi

            JOB_ID=$(oci resource-manager job create-apply-job \
              --stack-id "$STACK_ID" \
              --execution-plan-strategy AUTO_APPROVED \
              --query 'data.id' \
              --raw-output)
            echo "APPLY_JOB_ID=$JOB_ID" >> "$GITHUB_ENV"
            echo "Apply job: $JOB_ID (AD: ${AD:-default})"

            MAX_POLLS=120  # 120 x 30s = 60 minutes
            POLL=0
            JOB_STATUS=""
            while true; do
              POLL=$((POLL + 1))
              if [ "$POLL" -gt "$MAX_POLLS" ]; then
                echo "Timed out waiting for apply job after $MAX_POLLS polls"
                exit 1
              fi
              JOB_STATUS=$(oci resource-manager job get \
                --job-id "$JOB_ID" \
                --query 'data."lifecycle-state"' \
                --raw-output)
              echo "  [$POLL/$MAX_POLLS] AD=${AD:-default} Status: $JOB_STATUS"
              case "$JOB_STATUS" in
                SUCCEEDED) APPLY_SUCCESS=true; break ;;
                FAILED|CANCELING|CANCELED) break ;;
              esac
              sleep 30
            done

            if $APPLY_SUCCESS; then
              echo "Apply succeeded."
              break
            fi

            LOGS=$(oci resource-manager job get-job-logs --all \
              --job-id "$JOB_ID" \
              --query 'data[*].message' --raw-output 2>/dev/null | tail -100 || true)
            echo "$LOGS"

            if echo "$LOGS" | grep -q "Not enough capacity to create Lustre file system"; then
              echo "No Lustre capacity in AD '${AD:-default}', trying next..."
              continue
            fi

            echo "Apply job failed with status: $JOB_STATUS"
            exit 1
          done

          if ! $APPLY_SUCCESS; then
            echo "Apply failed: no Lustre capacity available in any AD."
            exit 1
          fi

      - name: Assert outputs
        run: |
          oci resource-manager job get-job-tf-state \
            --job-id "$APPLY_JOB_ID" \
            --file state.json
          .github/scripts/assert-outputs.sh state.json "outputs."

      - name: Generate kubeconfig
        env:
          OCI_REGION: ${{ vars.OCI_REGION }}
        run: .github/scripts/generate-kubeconfig.sh state.json "outputs."

      - name: Cluster health checks
        run: .github/scripts/check-cluster-health.sh state.json "outputs."

      - name: Network health checks
        run: .github/scripts/check-network-health.sh state.json "outputs."

      - name: GPU resource health checks
        run: .github/scripts/check-gpu-health.sh state.json "outputs."

      - name: FSS health checks
        if: contains(env.TOPOLOGY, 'fss')
        run: .github/scripts/check-fss-health.sh state.json "outputs."

      - name: Lustre health checks
        if: contains(env.TOPOLOGY, 'lustre')
        run: .github/scripts/check-lustre-health.sh state.json "outputs."

      - name: Monitoring health checks
        if: contains(env.TOPOLOGY, 'monitoring')
        run: .github/scripts/check-monitoring-health.sh state.json "outputs."

      - name: Clean up test resources
        if: always()
        run: .github/scripts/cleanup-test-resources.sh

      - name: Tear down bastion tunnel
        if: always() && startsWith(env.TOPOLOGY, 'private')
        run: .github/scripts/teardown-bastion-tunnel.sh

      - name: Destroy stack
        if: always() && env.STACK_ID != ''
        run: |
          DESTROY_JOB_ID=$(oci resource-manager job create-destroy-job \
            --stack-id "$STACK_ID" \
            --execution-plan-strategy AUTO_APPROVED \
            --query 'data.id' \
            --raw-output)
          echo "Destroy job: $DESTROY_JOB_ID"
          .github/scripts/wait-for-orm-job.sh "$DESTROY_JOB_ID" 120 30
          oci resource-manager stack delete --stack-id "$STACK_ID" --force
          echo "Stack $STACK_ID deleted."

      - name: Post result comment
        if: always() && needs.check-orm-trigger.outputs.pr_number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ needs.check-orm-trigger.outputs.pr_number }}
          OVERRIDES_JSON: ${{ env.OVERRIDES_JSON }}
        with:
          script: |
            const status    = process.env.JOB_STATUS
            const icon      = status === 'success' ? '✅' : '❌'
            const topology  = process.env.TOPOLOGY
            const overrides = process.env.OVERRIDES_JSON
            const runUrl    = process.env.RUN_URL
            const rows = [
              `| Topology  | \`${topology}\` |`,
              `| Result    | ${icon} ${status} |`,
            ]
            if (overrides && overrides !== '{}') {
              rows.push(`| Overrides | \`${overrides}\` |`)
            }
            const body = [
              `### ${icon} CI - Apply (ORM) results`,
              '',
              `| | |`,
              `|---|---|`,
              ...rows,
              '',
              `[View full run log](${runUrl})`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            })
