name: CI - Apply (Terraform)

on:
  workflow_dispatch:
    inputs:
      topology:
        description: "Terraform topology to test"
        required: true
        type: choice
        default: "public-fss-monitoring-tf"
        options:
          - public-base-tf
          - public-bastion-operator-tf
          - public-fss-monitoring-tf
          - public-lustre-tf
          - private-base-tf
          - private-bastion-operator-tf
          - private-fss-monitoring-tf
          - private-lustre-tf
      overrides:
        description: 'Extra variable overrides as JSON (e.g. {"worker_gpu_enabled":"true"})'
        required: false
        type: string
        default: '{}'

  issue_comment:
    types: [created]

  workflow_call:
    inputs:
      topology:
        type: string
        default: 'public-fss-monitoring-tf'
      overrides:
        type: string
        default: '{}'
      pr_number:
        type: number
        default: 0

concurrency:
  group: >-
    ${{
      github.event_name == 'issue_comment' && format('ci-apply-tf-pr-{0}', github.event.issue.number) ||
      github.event_name == 'workflow_call' && inputs.pr_number != 0 && format('ci-apply-tf-pr-{0}-{1}', inputs.pr_number, inputs.topology) ||
      format('ci-apply-tf-{0}', inputs.topology || github.run_id)
    }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_TEMPLATE_DIR: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate: verify /ok-to-run-apply-tf comment is authorized.
  # ---------------------------------------------------------------------------
  check-tf-trigger:
    name: Check TF trigger
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ok-to-run-apply-tf') &&
      contains(fromJSON('["OguzPastirmaci","arnaudfroidmont","robo-cap"]'), github.event.comment.user.login)
    runs-on: ubuntu-latest
    outputs:
      topology: ${{ steps.parse.outputs.topology }}
      overrides: ${{ steps.parse.outputs.overrides }}
    steps:
      - name: React to trigger comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Parse topology and overrides from comment
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          cmd_line=$(echo "$COMMENT" | grep -oP '/ok-to-run-apply-tf.*' | head -1 || true)
          read -ra words <<< "$cmd_line"

          topology="${words[1]:-public-fss-monitoring-tf}"

          overrides='{}'
          for word in "${words[@]:2}"; do
            if [[ "$word" =~ ^[a-zA-Z_][a-zA-Z0-9_]*=.+$ ]]; then
              key="${word%%=*}"
              val="${word#*=}"
              overrides=$(jq -n --argjson base "$overrides" --arg k "$key" --arg v "$val" '$base + {($k): $v}')
            fi
          done

          echo "topology=$topology" >> "$GITHUB_OUTPUT"
          echo "overrides=$overrides" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Apply: init, apply, assert outputs, health checks, then always destroy.
  # ---------------------------------------------------------------------------
  apply-tf:
    name: Terraform / ${{ inputs.topology || needs.check-tf-trigger.outputs.topology || 'public-fss-monitoring-tf' }}
    needs: [check-tf-trigger]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.check-tf-trigger.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TOPOLOGY: ${{ inputs.topology || needs.check-tf-trigger.outputs.topology || 'public-fss-monitoring-tf' }}
      OVERRIDES_JSON: ${{ inputs.overrides || needs.check-tf-trigger.outputs.overrides || '{}' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: >-
            ${{
              github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) ||
              github.event_name == 'workflow_call' && inputs.pr_number != 0 && format('refs/pull/{0}/head', inputs.pr_number) ||
              github.ref
            }}

      - name: Install Terraform
        run: |
          TF_VERSION="1.5.7"
          curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o tf.zip
          unzip -o tf.zip -d /usr/local/bin
          rm tf.zip
          terraform version

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Set up OCI credentials
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_API_KEY_FINGERPRINT: ${{ secrets.OCI_API_KEY_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_API_KEY_PRIVATE_KEY: ${{ secrets.OCI_API_KEY_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER_OCID" \
            "$OCI_API_KEY_FINGERPRINT" \
            "$OCI_TENANCY_OCID" \
            "$OCI_REGION" \
            "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          printf '%s' "$OCI_API_KEY_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Cache Terraform providers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/versions.tf', 'terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Build variable files
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          WORKER_OPS_AD: ${{ vars.WORKER_OPS_AD }}
          WORKER_OPS_IMAGE_CUSTOM_ID: ${{ vars.WORKER_OPS_IMAGE_CUSTOM_ID }}
          SSH_PUBLIC_KEY: ${{ vars.SSH_PUBLIC_KEY }}
        run: |
          TFVARS_FILE="test/tfvars/tf/${TOPOLOGY}.tfvars"
          if [ ! -f "$TFVARS_FILE" ]; then
            echo "Unknown topology: $TOPOLOGY (no file at $TFVARS_FILE)" && exit 1
          fi

          jq -n \
            --arg tenancy_ocid               "$OCI_TENANCY_OCID" \
            --arg region                     "$OCI_REGION" \
            --arg compartment_ocid           "$OCI_COMPARTMENT_OCID" \
            --arg current_user_ocid          "$OCI_USER_OCID" \
            --arg worker_ops_ad              "$WORKER_OPS_AD" \
            --arg worker_ops_image_custom_id "$WORKER_OPS_IMAGE_CUSTOM_ID" \
            --arg ssh_public_key             "$SSH_PUBLIC_KEY" \
            '{
              tenancy_ocid:               $tenancy_ocid,
              region:                     $region,
              compartment_ocid:           $compartment_ocid,
              current_user_ocid:          $current_user_ocid,
              worker_ops_ad:              $worker_ops_ad,
              worker_ops_image_custom_id: $worker_ops_image_custom_id,
              ssh_public_key:             $ssh_public_key
            }' > secrets.tfvars.json

          echo "$OVERRIDES_JSON" > overrides.tfvars.json
          echo "Variables for topology '$TOPOLOGY' (secrets redacted):"
          jq 'del(.ssh_public_key, .tenancy_ocid, .compartment_ocid, .current_user_ocid)' secrets.tfvars.json

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Apply
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          # For lustre topologies, fetch ADs dynamically and retry on capacity errors.
          # For all other topologies, a single apply with no AD override.
          if [[ "$TOPOLOGY" == *lustre* ]]; then
            mapfile -t ADS < <(oci iam availability-domain list \
              --compartment-id "$OCI_COMPARTMENT_OCID" \
              --query 'data[*].name' \
              --raw-output | jq -r '.[]')
          else
            ADS=("")
          fi

          APPLY_SUCCESS=false
          for AD in "${ADS[@]}"; do
            if [ -n "$AD" ]; then
              echo "Setting lustre_ad=$AD"
              jq --arg ad "$AD" '. + {lustre_ad: $ad}' overrides.tfvars.json > overrides_ad.tfvars.json
              OVERRIDE_FILE="overrides_ad.tfvars.json"
            else
              OVERRIDE_FILE="overrides.tfvars.json"
            fi

            set +e
            terraform -chdir=terraform apply -auto-approve \
              -var-file="../secrets.tfvars.json" \
              -var-file="../test/tfvars/tf/${TOPOLOGY}.tfvars" \
              -var-file="../${OVERRIDE_FILE}" 2>&1 | tee apply.log
            APPLY_EXIT=${PIPESTATUS[0]}
            set -e

            if [ "$APPLY_EXIT" -eq 0 ]; then
              APPLY_SUCCESS=true
              break
            fi

            if grep -q "Not enough capacity to create Lustre file system" apply.log; then
              echo "No Lustre capacity in AD '${AD:-default}', trying next..."
              continue
            fi

            cat apply.log
            echo "Apply failed"
            exit 1
          done

          if ! $APPLY_SUCCESS; then
            echo "Apply failed: no Lustre capacity available in any AD."
            exit 1
          fi

      - name: Capture outputs
        run: terraform -chdir=terraform output -json > state.json

      - name: Assert outputs
        run: |
          FAILED=0

          check_ocid() {
            local key=$1
            local val
            val=$(jq -r ".${key}.value // empty" state.json)
            if [[ -z "$val" || "$val" == "null" ]]; then
              echo "FAIL: $key is empty"
              FAILED=1; return
            fi
            if [[ "$val" != ocid1.* ]] || [[ $(echo "$val" | tr -cd '.' | wc -c) -lt 4 ]]; then
              echo "FAIL: $key is not a valid OCID: $val"
              FAILED=1; return
            fi
            echo "OK:   $key = $val"
          }

          # Common checks for all topologies
          check_ocid cluster_id
          check_ocid vcn_id
          check_ocid worker_subnet_id
          check_ocid worker_nsg_id
          check_ocid control_plane_subnet_id
          check_ocid control_plane_nsg_id
          check_ocid int_lb_subnet_id
          check_ocid int_lb_nsg_id
          check_ocid worker_ops_pool_id

          PRIVATE_EP=$(jq -r '.cluster_private_endpoint.value // empty' state.json)
          if [[ "$PRIVATE_EP" != https://* ]]; then
            echo "FAIL: cluster_private_endpoint does not start with https://: $PRIVATE_EP"
            FAILED=1
          else
            echo "OK:   cluster_private_endpoint = $PRIVATE_EP"
          fi

          # Public topology checks
          if [[ "$TOPOLOGY" == public* ]]; then
            PUBLIC_EP=$(jq -r '.cluster_public_endpoint.value // empty' state.json)
            if [[ "$PUBLIC_EP" != https://* ]]; then
              echo "FAIL: cluster_public_endpoint does not start with https://: $PUBLIC_EP"
              FAILED=1
            else
              echo "OK:   cluster_public_endpoint = $PUBLIC_EP"
            fi
            check_ocid pub_lb_subnet_id
            check_ocid pub_lb_nsg_id
          fi

          # Private topology checks
          if [[ "$TOPOLOGY" == private* ]]; then
            PUBLIC_EP=$(jq -r '.cluster_public_endpoint.value // empty' state.json)
            if [ -n "$PUBLIC_EP" ]; then
              echo "FAIL: cluster_public_endpoint should be empty for private topology: $PUBLIC_EP"
              FAILED=1
            else
              echo "OK:   cluster_public_endpoint is empty (private topology)"
            fi
          fi

          # FSS topology checks
          if [[ "$TOPOLOGY" == *fss* ]]; then
            check_ocid fss_file_system_id
            check_ocid fss_nsg_id
            check_ocid fss_subnet_id

            FSS_MT_IP=$(jq -r '.fss_mount_target_ip.value // empty' state.json)
            if [[ -z "$FSS_MT_IP" || ! "$FSS_MT_IP" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
              echo "FAIL: fss_mount_target_ip is not a valid IPv4: $FSS_MT_IP"
              FAILED=1
            else
              echo "OK:   fss_mount_target_ip = $FSS_MT_IP"
            fi

            FSS_EXPORT_PATH=$(jq -r '.fss_export_path.value // empty' state.json)
            if [[ -z "$FSS_EXPORT_PATH" || "$FSS_EXPORT_PATH" != /oke-gpu-* ]]; then
              echo "FAIL: fss_export_path has unexpected format: $FSS_EXPORT_PATH"
              FAILED=1
            else
              echo "OK:   fss_export_path = $FSS_EXPORT_PATH"
            fi
          fi

          # Lustre topology checks
          if [[ "$TOPOLOGY" == *lustre* ]]; then
            check_ocid lustre_subnet_id
            check_ocid lustre_nsg_id
            check_ocid lustre_file_system_id

            LUSTRE_MGS=$(jq -r '.lustre_management_service_address.value // empty' state.json)
            if [[ -z "$LUSTRE_MGS" || ! "$LUSTRE_MGS" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
              echo "FAIL: lustre_management_service_address is not a valid IPv4: $LUSTRE_MGS"
              FAILED=1
            else
              echo "OK:   lustre_management_service_address = $LUSTRE_MGS"
            fi
          fi

          # Monitoring topology checks
          if [[ "$TOPOLOGY" == *monitoring* ]]; then
            check_ocid pub_lb_subnet_id
            check_ocid pub_lb_nsg_id

            GRAFANA_URL=$(jq -r '.grafana_url.value // empty' state.json)
            if [[ "$GRAFANA_URL" != http* ]]; then
              echo "FAIL: grafana_url is not a valid URL: $GRAFANA_URL"
              FAILED=1
            else
              echo "OK:   grafana_url = $GRAFANA_URL"
            fi

            GRAFANA_PASS=$(jq -r '.grafana_admin_password.value // empty' state.json)
            if [ -z "$GRAFANA_PASS" ]; then
              echo "FAIL: grafana_admin_password is empty"
              FAILED=1
            else
              echo "OK:   grafana_admin_password is set"
            fi
          fi

          [ "$FAILED" -eq 0 ] || exit 1

      - name: Generate kubeconfig
        if: startsWith(env.TOPOLOGY, 'public')
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          CLUSTER_ID=$(jq -r '.cluster_id.value' state.json)
          mkdir -p "$HOME/.kube"
          oci ce cluster create-kubeconfig \
            --cluster-id "$CLUSTER_ID" \
            --file "$HOME/.kube/config" \
            --region "$OCI_REGION" \
            --token-version 2.0.0 \
            --kube-endpoint PUBLIC_ENDPOINT

      - name: Cluster health checks
        if: startsWith(env.TOPOLOGY, 'public')
        run: |
          echo "Health check: API server connectivity"
          kubectl cluster-info

          echo "Health check: waiting for nodes to be Ready"
          kubectl wait --for=condition=Ready nodes --all --timeout=300s

          NODE_COUNT=$(kubectl get nodes --no-headers | wc -l)
          echo "  $NODE_COUNT node(s) ready"
          [ "$NODE_COUNT" -ge 1 ] || { echo "FAIL: no nodes found"; exit 1; }

          kubectl wait --for=condition=Ready pods -l k8s-app=kube-dns -n kube-system --timeout=120s
          kubectl wait --for=condition=Ready pods -l k8s-app=kube-proxy -n kube-system --timeout=120s
          echo "Health check: all cluster health checks passed"

      - name: FSS health checks
        if: startsWith(env.TOPOLOGY, 'public') && contains(env.TOPOLOGY, 'fss')
        run: |
          echo "Health check: PVC binding"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: fss-test-pvc
          spec:
            accessModes:
              - ReadWriteMany
            storageClassName: ""
            resources:
              requests:
                storage: 50Gi
            volumeName: fss-pv
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Bound' pvc/fss-test-pvc --timeout=120s
          echo "OK:   FSS PVC bound"

          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: fss-writer
          spec:
            restartPolicy: Never
            containers:
            - name: writer
              image: busybox
              command: ["sh", "-c", "echo 'fss-test-content' > /mnt/fss/testfile.txt"]
              volumeMounts:
              - name: fss
                mountPath: /mnt/fss
            volumes:
            - name: fss
              persistentVolumeClaim:
                claimName: fss-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/fss-writer --timeout=120s

          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: fss-reader
          spec:
            restartPolicy: Never
            containers:
            - name: reader
              image: busybox
              command: ["sh", "-c", "cat /mnt/fss/testfile.txt"]
              volumeMounts:
              - name: fss
                mountPath: /mnt/fss
            volumes:
            - name: fss
              persistentVolumeClaim:
                claimName: fss-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/fss-reader --timeout=120s
          CONTENT=$(kubectl logs fss-reader)
          if [[ "$CONTENT" != *"fss-test-content"* ]]; then
            echo "FAIL: reader pod output does not contain expected content: $CONTENT"
            exit 1
          fi
          echo "OK:   FSS reader output: $CONTENT"
          echo "Health check: all FSS health checks passed"

      - name: Lustre health checks
        if: startsWith(env.TOPOLOGY, 'public') && contains(env.TOPOLOGY, 'lustre')
        run: |
          echo "Health check: PVC binding"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: lustre-test-pvc
          spec:
            accessModes:
              - ReadWriteMany
            storageClassName: ""
            resources:
              requests:
                storage: 50Gi
            volumeName: lustre-pv
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Bound' pvc/lustre-test-pvc --timeout=120s
          echo "OK:   Lustre PVC bound"

          echo "Health check: Lustre write"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: lustre-writer
          spec:
            restartPolicy: Never
            containers:
            - name: writer
              image: busybox
              command: ["sh", "-c", "echo 'lustre-test-content' > /mnt/lustre/testfile.txt"]
              volumeMounts:
              - name: lustre
                mountPath: /mnt/lustre
            volumes:
            - name: lustre
              persistentVolumeClaim:
                claimName: lustre-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/lustre-writer --timeout=120s
          echo "OK:   Lustre writer pod completed"

          echo "Health check: Lustre read"
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: lustre-reader
          spec:
            restartPolicy: Never
            containers:
            - name: reader
              image: busybox
              command: ["sh", "-c", "cat /mnt/lustre/testfile.txt"]
              volumeMounts:
              - name: lustre
                mountPath: /mnt/lustre
            volumes:
            - name: lustre
              persistentVolumeClaim:
                claimName: lustre-test-pvc
          EOF

          kubectl wait --for='jsonpath={.status.phase}=Succeeded' pod/lustre-reader --timeout=120s
          CONTENT=$(kubectl logs lustre-reader)
          if [[ "$CONTENT" != *"lustre-test-content"* ]]; then
            echo "FAIL: reader pod output does not contain expected content: $CONTENT"
            exit 1
          fi
          echo "OK:   Lustre reader output: $CONTENT"
          echo "Health check: all Lustre health checks passed"

      - name: Monitoring health checks
        if: contains(env.TOPOLOGY, 'monitoring')
        run: |
          GRAFANA_URL=$(jq -r '.grafana_url.value' state.json)
          GRAFANA_PASS=$(jq -r '.grafana_admin_password.value' state.json)
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u "admin:${GRAFANA_PASS}" "${GRAFANA_URL}/api/org" --insecure || true)
            if [ "$STATUS" = "200" ]; then
              echo "OK:   Grafana API responded 200"
              break
            fi
            echo "  attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "FAIL: Grafana API did not respond 200 after 60 attempts"; exit 1; }
          echo "Health check: all monitoring health checks passed"

      - name: Clean up FSS test resources
        if: always() && startsWith(env.TOPOLOGY, 'public') && contains(env.TOPOLOGY, 'fss')
        run: |
          if [ -f "$HOME/.kube/config" ]; then
            kubectl delete pod fss-writer fss-reader --ignore-not-found --wait=true --timeout=60s || true
            kubectl delete pvc fss-test-pvc --ignore-not-found --wait=true --timeout=120s || true
          fi

      - name: Clean up Lustre test resources
        if: always() && startsWith(env.TOPOLOGY, 'public') && contains(env.TOPOLOGY, 'lustre')
        run: |
          if [ -f "$HOME/.kube/config" ]; then
            kubectl delete pod lustre-writer lustre-reader --ignore-not-found --wait=true --timeout=60s || true
            kubectl delete pvc lustre-test-pvc --ignore-not-found --wait=true --timeout=120s || true
          fi

      - name: Destroy
        if: always()
        run: |
          OVERRIDE_FILE="overrides.tfvars.json"
          if [ -f "overrides_ad.tfvars.json" ]; then
            OVERRIDE_FILE="overrides_ad.tfvars.json"
          fi
          terraform -chdir=terraform destroy -auto-approve \
            -var-file="../secrets.tfvars.json" \
            -var-file="../test/tfvars/tf/${TOPOLOGY}.tfvars" \
            -var-file="../${OVERRIDE_FILE}"

      - name: Show state on destroy failure
        if: always() && failure()
        run: terraform -chdir=terraform show 2>/dev/null | tail -50 || true

      - name: Post result comment
        if: always() && (github.event_name == 'issue_comment' || (github.event_name == 'workflow_call' && inputs.pr_number != 0))
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ github.event_name == 'workflow_call' && inputs.pr_number != 0 && inputs.pr_number || github.event.issue.number }}
          OVERRIDES_JSON: ${{ env.OVERRIDES_JSON }}
        with:
          script: |
            const status    = process.env.JOB_STATUS
            const icon      = status === 'success' ? '✅' : '❌'
            const topology  = process.env.TOPOLOGY
            const overrides = process.env.OVERRIDES_JSON
            const runUrl    = process.env.RUN_URL
            const rows = [
              `| Topology  | \`${topology}\` |`,
              `| Result    | ${icon} ${status} |`,
            ]
            if (overrides && overrides !== '{}') {
              rows.push(`| Overrides | \`${overrides}\` |`)
            }
            const body = [
              `### ${icon} CI - Apply (Terraform) results`,
              '',
              `| | |`,
              `|---|---|`,
              ...rows,
              '',
              `[View full run log](${runUrl})`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            })
