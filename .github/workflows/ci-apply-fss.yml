name: CI - Apply (FSS)

on:
  workflow_dispatch:

  issue_comment:
    types: [created]

  workflow_call:
    inputs:
      pr_number:
        type: number
        default: 0

concurrency:
  group: >-
    ${{
      github.event_name == 'issue_comment' && format('ci-apply-fss-pr-{0}', github.event.issue.number) ||
      github.event_name == 'workflow_call' && inputs.pr_number != 0 && format('ci-apply-fss-pr-{0}', inputs.pr_number) ||
      'ci-apply-fss'
    }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_TEMPLATE_DIR: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate: verify the /ok-to-run-apply-fss comment is authorized. Skipped entirely
  # for workflow_dispatch so the apply job runs unconditionally in that case.
  # ---------------------------------------------------------------------------
  check-fss-trigger:
    name: Check FSS trigger
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ok-to-run-apply-fss') &&
      !contains(github.event.comment.body, '/ok-to-run-apply-fss-orm') &&
      contains(fromJSON('["OguzPastirmaci","arnaudfroidmont","robo-cap"]'), github.event.comment.user.login)
    runs-on: ubuntu-latest
    steps:
      - name: React to trigger comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

  apply-fss:
    name: FSS provisioning
    needs: [check-fss-trigger]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.check-fss-trigger.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: >-
            ${{
              github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) ||
              github.event_name == 'workflow_call' && inputs.pr_number != 0 && format('refs/pull/{0}/head', inputs.pr_number) ||
              github.ref
            }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: test/go.mod
          cache: true
          cache-dependency-path: test/go.sum

      - name: Install Terraform
        run: |
          TF_VERSION="1.5.7"
          curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o tf.zip
          unzip -o tf.zip -d /usr/local/bin
          rm tf.zip
          terraform version

      - name: Cache Terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/versions.tf', 'terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Set up OCI credentials
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_API_KEY_FINGERPRINT: ${{ secrets.OCI_API_KEY_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_API_KEY_PRIVATE_KEY: ${{ secrets.OCI_API_KEY_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER_OCID" \
            "$OCI_API_KEY_FINGERPRINT" \
            "$OCI_TENANCY_OCID" \
            "$OCI_REGION" \
            "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          printf '%s' "$OCI_API_KEY_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Run FSS provisioning test
        working-directory: test
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          WORKER_OPS_AD: ${{ vars.WORKER_OPS_AD }}
          WORKER_OPS_IMAGE_CUSTOM_ID: ${{ vars.WORKER_OPS_IMAGE_CUSTOM_ID }}
          SSH_PUBLIC_KEY: ${{ vars.SSH_PUBLIC_KEY }}
          TFVARS_FILE: tfvars/core/cluster-only.tfvars,tfvars/storage/fss.tfvars
          RUN_FSS_TESTS: "1"
        run: go test -v -count=1 -run TestStorageFSS -timeout 150m ./...
